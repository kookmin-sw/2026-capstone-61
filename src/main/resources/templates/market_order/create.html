<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">
<div layout:fragment="content">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문서 작성 - Paws Market</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

    <style>
        /* 기본 스타일 및 폰트 */
        * { box-sizing: border-box; font-family: 'Noto Sans KR', sans-serif; }
        body { background-color: #fcfcfc; color: #444; }
        
        .order-container { max-width: 1050px; margin: 60px auto 100px auto; padding: 0 20px; }
        
        /* 섹션 공통 스타일 */
        .order-section { background:#fff; padding:35px; border-radius:25px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom:25px; border: none; }
        .section-title { font-size:1.3rem; font-weight:700; margin-bottom:25px; display: flex; align-items: center; gap: 10px; color: #333; }
        .section-title::before { content:''; display:inline-block; width:6px; height:20px; background:#ff914d; border-radius:10px; }

        /* 상품 아이템 */
        .product-item { display:flex; align-items:center; gap:20px; padding:15px 0; border-bottom:1px solid #f8f8f8; }
        .product-item:last-child { border-bottom: none; }
        .product-img { width:70px; height:70px; border-radius:15px; object-fit:cover; border: 1px solid #eee; }

        /* 입력 폼 스타일 */
        .form-label { font-weight: 700; font-size: 0.9rem; color: #666; margin-bottom: 8px; margin-left: 5px; }
        .form-control { border-radius: 12px; padding: 12px 15px; border: 1px solid #eee; background-color: #f9f9f9; transition: 0.3s; }
        .form-control:focus { background-color: #fff; border-color: #ff914d; box-shadow: none; outline: none; }
        
        /* 우측 결제 카드 */
        .total-card { background:#fff; border: 2px solid #fff5ed; padding:30px; border-radius:25px; position: sticky; top: 110px; box-shadow: 0 10px 30px rgba(255, 145, 77, 0.1); }
        .btn-pay { background:#ff914d; color:#fff; font-weight:bold; border:none; padding:18px; border-radius:15px; width:100%; font-size: 1.2rem; transition: 0.3s; cursor: pointer; margin-top: 10px; }
        .btn-pay:hover { background:#e87d3a; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(232, 125, 58, 0.3); }

        /* 주소 레이어 모달 */
        #addrLayer { display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; }
        #addrLayerInner { width:450px; background:#fff; border-radius:25px; overflow:hidden; animation: fadeInUp 0.3s ease; }

        /* 결제 수단 라디오 버튼 커스텀 */
        .pay-method-group { display: flex; flex-direction: column; gap: 10px; }
        .pay-method-item { border: 1px solid #eee; padding: 15px; border-radius: 15px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.2s; background: #fafafa; }
        .pay-method-item:has(input:checked) { background-color: #fff8f4; border-color: #ff914d; }
        .pay-method-item input[type="radio"] { accent-color: #ff914d; width: 18px; height: 18px; }
        
        /* 커스텀 모달 스타일 */
        #pawsModal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-content { background-color: #fff; padding: 30px; border-radius: 25px; width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); animation: fadeInUp 0.3s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .modal-icon { font-size: 40px; color: #ff914d; margin-bottom: 15px; }
        .modal-text { font-weight: 700; color: #444; margin-bottom: 20px; white-space: pre-line; line-height: 1.5; }
        .m-btn { padding: 10px 30px; border-radius: 12px; cursor: pointer; font-weight: bold; border: none; font-size: 15px; background: #ff914d; color: #fff; }

        @media (max-width: 992px) { .total-card { position: static; margin-top: 20px; } }
    </style>
</head>

<body>

<!-- 커스텀 모달 구조 -->
<div id="pawsModal">
    <div class="modal-content">
        <div class="modal-icon"><i class="bi bi-info-circle-fill"></i></div>
        <div class="modal-text" id="modalMessage">알림 메시지</div>
        <button class="m-btn" onclick="closePawsModal()">확인</button>
    </div>
</div>

<!-- 주소 검색 레이어 -->
<div id="addrLayer">
    <div id="addrLayerInner">
        <div style="background:#ff914d; color:#fff; padding:20px; display:flex; justify-content:space-between; align-items:center;">
            <b style="font-size: 1.1rem;">주소 찾기 🐾</b>
            <i class="bi bi-x-lg" onclick="closeDaumPostcode()" style="cursor:pointer; font-size: 1.2rem;"></i>
        </div>
        <div id="postcode_wrap" style="height:480px;"></div>
    </div>
</div>

<div class="order-container">
    <h3 class="fw-bold mb-5 text-center" style="color: #333;">주문서 작성</h3>

    <form id="frm" method="post" action="/market_order/create.do">
        <input type="hidden" name="cart_ids" th:value="${cart_ids}">
        <input type="hidden" id="original_total" th:value="${total_price}"> 
        <input type="hidden" id="final_total_price" name="total_price" th:value="${total_price}"> 
        <input type="hidden" id="delivery_fee_input" name="delivery_fee" value="0">

        <div class="row">
            <!-- 왼쪽: 주문 정보 영역 -->
            <div class="col-lg-8">
                <div class="order-section">
                    <div class="section-title">주문 상품 (<span th:text="${list != null ? list.size() : 0}">0</span>)</div>
                    
                    <!-- 상품 리스트 출력부 -->
                    <th:block th:if="${list != null and !list.isEmpty()}">
                        <div th:each="cartVO : ${list}" class="product-item">
                            <img th:src="${cartVO.file_name != null ? '/product/storage/' + cartVO.file_name : '/images/no_image.png'}" class="product-img">
                            <div style="flex:1;">
                                <div class="fw-bold" th:text="${cartVO.product_name}" style="font-size: 1.05rem;">상품명</div>
                                <div class="text-muted small mt-1">
                                    <span th:text="${cartVO.quantity}">1</span>개 / 
                                    <span th:text="|${#numbers.formatInteger(cartVO.price, 0, 'COMMA')}원|">0원</span>
                                </div>
                            </div>
                            <div class="fw-bold" style="color: #ff914d;" th:text="|${#numbers.formatInteger(cartVO.total_price, 0, 'COMMA')}원|">0원</div>
                        </div>
                    </th:block>
                    
                    <!-- 상품이 없을 경우 -->
                    <div th:if="${list == null or list.isEmpty()}" class="text-center py-5">
                        <i class="bi bi-cart-x" style="font-size: 3rem; color: #ddd;"></i>
                        <p class="mt-3 text-muted">주문할 상품이 없습니다.</p>
                    </div>
                </div>

                <div class="order-section">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="section-title mb-0">배송 정보</div>
                        <button type="button" class="btn btn-outline-warning btn-sm" onclick="loadMyAddress()" style="border-radius: 10px; font-weight: 600; color: #ff914d; border-color: #ff914d;">
                            <i class="bi bi-person-check"></i> 내 주소 불러오기
                        </button>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">받는 분</label>
                            <input type="text" id="receiver_name" name="receiver_name" class="form-control" th:value="${session.mname}" placeholder="이름을 입력하세요">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">연락처</label>
                            <input type="text" id="receiver_tel" name="receiver_tel" class="form-control" th:value="${session.tel}" oninput="cleanTel(this)" placeholder="숫자만 입력하세요" maxlength="11">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">배송 주소</label>
                        <div class="input-group mb-2" style="width: 280px;">
                            <input type="text" id="zipcode" name="zipcode" class="form-control" th:value="${session.zipcode}" readonly placeholder="우편번호">
                            <button type="button" class="btn btn-dark" onclick="DaumPostcode()" style="border-radius: 0 12px 12px 0;">검색</button>
                        </div>
                        <input type="text" id="address1" name="address1" class="form-control mb-2" th:value="${session.address1}" readonly placeholder="기본 주소">
                        <input type="text" id="address2" name="address2" class="form-control" th:value="${session.address2}" placeholder="나머지 상세 주소를 입력해주세요">
                    </div>
                </div>
            </div>

            <!-- 오른쪽: 결제 요약 영역 -->
            <div class="col-lg-4">
                <div class="total-card">
                    <h5 class="fw-bold mb-4" style="color: #333;">결제 상세</h5>
                    <div class="d-flex justify-content-between mb-2">
                        <span style="color: #888;">상품 총액</span>
                        <span class="fw-bold" th:text="|${#numbers.formatInteger(total_price != null ? total_price : 0, 0, 'COMMA')}원|">0원</span>
                    </div>
                    <div class="d-flex justify-content-between mb-3">
                        <span style="color: #888;">배송비</span>
                        <span th:if="${total_price >= 50000}" class="text-success fw-bold">무료</span>
                        <span th:unless="${total_price >= 50000}" class="text-dark fw-bold">3,000원</span>
                    </div>

                    <hr style="border-top: 1px dashed #eee; margin: 25px 0;">

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <span class="fw-bold">최종 결제 금액</span>
                        <span class="text-danger fs-3 fw-bold" id="display_final_total"
                              th:with="fee=${total_price >= 50000 ? 0 : 3000}"
                              th:text="|${#numbers.formatInteger((total_price != null ? total_price : 0) + fee, 0, 'COMMA')}원|">0원</span>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">결제 방법</label>
                        <div class="pay-method-group">
                            <label class="pay-method-item">
                                <input type="radio" name="payment_method" value="CARD" checked> 
                                <span><i class="bi bi-credit-card"></i> 신용/체크카드</span>
                            </label>
                            <label class="pay-method-item">
                                <input type="radio" name="payment_method" value="KAKAO"> 
                                <span><i class="bi bi-chat-fill" style="color: #fee500; -webkit-text-stroke: 1px #000;"></i> 카카오페이</span>
                            </label>
                            <label class="pay-method-item">
                                <input type="radio" name="payment_method" value="BANK"> 
                                <span><i class="bi bi-bank"></i> 무통장입금</span>
                            </label>
                        </div>
                    </div>

                    <div class="agree-section mb-4 text-center" style="background: #f9f9f9; padding: 15px; border-radius: 12px;">
                        <input type="checkbox" id="agree_check" style="accent-color: #ff914d;">
                        <label class="small fw-bold" for="agree_check" style="cursor:pointer; color: #555;"> 위 주문 내용을 확인했습니다 (필수)</label>
                    </div>

                    <button type="submit" class="btn-pay">결제하기</button>
                </div>
            </div>
        </div>
    </form>
</div>

<script th:inline="javascript">
    /* --- 커스텀 모달 제어 --- */
    function showPawsModal(msg) {
        document.getElementById('modalMessage').innerText = msg;
        document.getElementById('pawsModal').style.display = 'flex';
    }
    function closePawsModal() {
        document.getElementById('pawsModal').style.display = 'none';
    }

    /* 1. 전화번호 입력 제어 */
    function cleanTel(input){
        input.value = input.value.replace(/[^0-9]/g,"").substring(0,11);
    }

    /* 2. 내 주소 불러오기 로직 */
    function loadMyAddress(){
        const sZip = [[${session.zipcode}]] || '';
        if(!sZip) { 
            showPawsModal("가입 시 등록된 주소가 없습니다.\n직접 입력해주세요! 🐾"); 
            return; 
        }
        document.getElementById("receiver_name").value = [[${session.mname}]];
        document.getElementById("receiver_tel").value = [[${session.tel}]];
        document.getElementById("zipcode").value = sZip;
        document.getElementById("address1").value = [[${session.address1}]];
        document.getElementById("address2").value = [[${session.address2}]];
    }

    /* 3. 폼 제출 및 유효성 검사 */
    document.getElementById("frm").addEventListener("submit", function(e){
        // 값 가져오기
        const receiverName = document.getElementById("receiver_name").value.trim();
        const receiverTel = document.getElementById("receiver_tel").value.trim();
        const zipcode = document.getElementById("zipcode").value.trim();
        const address1 = document.getElementById("address1").value.trim();
        const address2 = document.getElementById("address2").value.trim();
        const agreeCheck = document.getElementById("agree_check").checked;

        // 가격 계산 설정
        const originalTotalVal = document.getElementById("original_total").value;
        const originalPrice = originalTotalVal ? parseInt(originalTotalVal) : 0;
        let deliveryFee = originalPrice >= 50000 ? 0 : 3000;
        
        document.getElementById("delivery_fee_input").value = deliveryFee;
        document.getElementById("final_total_price").value = originalPrice + deliveryFee;

        // 검증 로직
        if(!receiverName) {
            e.preventDefault();
            showPawsModal("받는 분 성함을 입력해주세요! 🐾");
            document.getElementById("receiver_name").focus();
            return;
        }

        const telReg = /^[0-9]{10,11}$/;
        if(!receiverTel || !telReg.test(receiverTel)) {
            e.preventDefault();
            showPawsModal("올바른 연락처를 입력해주세요!\n(10~11자리 숫자) 📱");
            document.getElementById("receiver_tel").focus();
            return;
        }

        if(!zipcode || !address1) {
            e.preventDefault();
            showPawsModal("배송 주소를 검색해 주세요! 🏠");
            return;
        }

        if(!address2) {
            e.preventDefault();
            showPawsModal("상세 주소를 입력해 주세요! 📍");
            document.getElementById("address2").focus();
            return;
        }

        if(!agreeCheck) {
            e.preventDefault();
            showPawsModal("결제 진행 동의에 체크가 필요해요! 🐶");
            return;
        }
    });

    /* 4. 카카오 주소 API 제어 */
    const layer = document.getElementById("addrLayer");
    const wrap = document.getElementById("postcode_wrap");

    function DaumPostcode(){
        layer.style.display="flex";
        new daum.Postcode({
            oncomplete: function(data){
                document.getElementById("zipcode").value = data.zonecode;
                document.getElementById("address1").value = data.roadAddress;
                layer.style.display="none";
                document.getElementById("address2").focus();
            },
            width: '100%', height: '100%'
        }).embed(wrap);
    }

    function closeDaumPostcode(){ layer.style.display="none"; }
</script>

</body>
</div>
</html>
