<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">
<div layout:fragment="content">
<head>
    <meta charset="UTF-8">
    <title>나의 주문 내역 - Paws Market</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --paws-orange: #ff914d;
            --paws-orange-light: #fff5ed;
            --paws-orange-hover: #e87d3a;
            --paws-dark: #333333;
            --paws-gray: #888888;
            --paws-border: #eeeeee;
            --paws-blue: #448aff;
        }
        
        .list-container { max-width: 1050px; margin: 60px auto 100px auto; padding: 0 20px; }
        .page-header h2 { color: var(--paws-dark); font-size: 1.8rem; font-weight: 800; margin-bottom: 5px; }
        .page-header h2 span { color: var(--paws-orange); }
        
        .btn-cart-go { padding: 8px 20px; border-radius: 12px; border: 1px solid var(--paws-border); background: #fff; color: var(--paws-dark); text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .btn-cart-go:hover { border-color: var(--paws-orange); color: var(--paws-orange); background: var(--paws-orange-light); }

        /* 필터 탭 */
        .filter-tabs { display: flex; gap: 10px; margin: 30px 0; border-bottom: 2px solid #f8f8f8; padding-bottom: 15px; overflow-x: auto; }
        .filter-tabs::-webkit-scrollbar { display: none; } 
        
        .filter-btn { padding: 10px 22px; border-radius: 50px; border: 1px solid var(--paws-border); background: white; color: var(--paws-gray); text-decoration: none !important; font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .filter-btn:hover, .filter-btn.active { background: var(--paws-orange); color: white; border-color: var(--paws-orange); box-shadow: 0 4px 12px rgba(255, 145, 77, 0.2); }

        /* 주문 카드 */
        .order-card { 
            background: #fff; border-radius: 20px; padding: 30px; margin-bottom: 20px; 
            border: 1px solid #f2f2f2 !important; transition: 0.3s; 
            display: flex; align-items: center; justify-content: space-between; 
            cursor: pointer;
        }
        .order-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-color: var(--paws-orange) !important; }
        
        .product-title { font-size: 1.1rem; font-weight: 700; color: var(--paws-dark); margin-bottom: 8px; }
        .order-meta { font-size: 0.85rem; color: var(--paws-gray); margin-bottom: 12px; }
        
        /* 상태 텍스트 */
        .status-text { font-size: 0.9rem; font-weight: 700; display: flex; align-items: center; gap: 5px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .bg-paid { background: #4caf50; }
        .bg-shipping { background: var(--paws-blue); }
        .bg-delivered { background: #673ab7; }
        .bg-waiting { background: #ffc107; }
        .bg-cancel { background: #f44336; }

        /* 버튼 그룹 */
        .btn-group-custom { display: flex; flex-direction: column; gap: 8px; width: 140px; }
        
        .btn-paws-sm { 
            display: block; width: 100%; font-size: 0.8rem; padding: 10px 0; border-radius: 10px; 
            text-decoration: none !important; text-align: center; font-weight: 700; transition: 0.2s; 
        }
        
        .btn-sm-review { background: var(--paws-orange); color: #fff; border: none; }
        .btn-sm-review:hover { background: var(--paws-orange-hover); }
        
        .btn-sm-delivered { background: var(--paws-dark); color: #fff; border: none; }
        .btn-sm-delivered:hover { background: #000; }
        
        .btn-sm-return { border: 1px solid var(--paws-border); color: var(--paws-gray); background: #fff; }
        .btn-sm-return:hover { background: #f9f9f9; color: var(--paws-dark); }
        
        .btn-sm-cancel { 
            font-size: 0.8rem; color: var(--paws-gray); background: none; border: none; 
            text-decoration: underline; text-align: right; padding-right: 5px; cursor: pointer;
        }
        .btn-sm-cancel:hover { color: #f44336; }

        .price-text { font-size: 1.3rem; font-weight: 800; margin-bottom: 15px; color: var(--paws-dark); text-align: right; display: block; }

        /* 데이터 없음 */
        .no-data-wrapper { text-align: center; padding: 120px 20px; background: #fff; border-radius: 25px; border: 2px dashed #eee; margin: 40px 0; }
        .no-data-icon { font-size: 4rem; color: #ddd; margin-bottom: 20px; }

        /* 커스텀 모달 */
        #pawsModal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; backdrop-filter: blur(3px); }
        .p-modal-content { background: #fff; padding: 35px; border-radius: 25px; width: 360px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.15); animation: pModalShow 0.3s ease; }
        @keyframes pModalShow { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .p-modal-icon { font-size: 45px; color: var(--paws-orange); margin-bottom: 15px; }
        .p-modal-text { font-weight: 700; color: #333; margin-bottom: 25px; white-space: pre-line; line-height: 1.6; }
        .p-modal-btns { display: flex; gap: 12px; }
        .p-btn { flex: 1; padding: 14px; border-radius: 12px; cursor: pointer; font-weight: 700; border: none; font-size: 15px; transition: 0.2s; }
        .p-btn-confirm { background: var(--paws-orange); color: #fff; }
        .p-btn-confirm:hover { background: var(--paws-orange-hover); }
        .p-btn-cancel { background: #f1f1f1; color: #666; }
        
        @media (max-width: 768px) {
            .order-card { flex-direction: column; align-items: flex-start; gap: 20px; }
            .btn-group-custom { width: 100%; }
            .price-text { text-align: left; }
        }
    </style>
</head>
<body>

<!-- 커스텀 모달 -->
<div id="pawsModal">
    <div class="p-modal-content">
        <div class="p-modal-icon" id="modalIcon"><i class="bi bi-exclamation-circle-fill"></i></div>
        <div class="p-modal-text" id="modalMessage">알림 메시지</div>
        <div class="p-modal-btns" id="modalButtons"></div>
    </div>
</div>

<div class="list-container">
    <div class="page-header d-flex align-items-end justify-content-between">
        <div>
            <h2 class="fw-bold m-0">나의 <span>주문내역</span></h2>
            <p class="text-muted m-0 mt-2" th:text="|총 ${list.size()}개의 주문 기록이 있습니다.|"></p>
        </div>
        <a th:href="@{/market_cart/list.do}" class="btn-cart-go"><i class="bi bi-cart3 me-1"></i> 장바구니</a>
    </div>

    <!-- 필터 탭 (오렌지 스타일) -->
    <div class="filter-tabs">
        <a th:href="@{/market_order/list_by_memberno.do}" class="filter-btn" th:classappend="${param.status == null} ? 'active'">전체보기</a>
        <a th:href="@{/market_order/list_by_memberno.do(status='PAID')}" class="filter-btn" th:classappend="${param.status != null and #strings.toString(param.status) == 'PAID'} ? 'active'">결제완료</a>
        <a th:href="@{/market_order/list_by_memberno.do(status='SHIPPED')}" class="filter-btn" th:classappend="${param.status != null and #strings.toString(param.status) == 'SHIPPED'} ? 'active'">배송중</a>
        <a th:href="@{/market_order/list_by_memberno.do(status='DELIVERED')}" class="filter-btn" th:classappend="${param.status != null and #strings.toString(param.status) == 'DELIVERED'} ? 'active'">배송완료</a>
        <a th:href="@{/market_order/list_by_memberno.do(status='CANCEL')}" class="filter-btn" th:classappend="${param.status != null and #strings.toString(param.status) == 'CANCEL'} ? 'active'">취소/반품</a>
    </div>
    
    <!-- 주문 리스트 루프 -->
    <div th:each="orderVO : ${list}" class="order-card" 
         th:onclick="|location.href='/market_order/read.do?order_id=${orderVO.order_id}'|">
        <div>
            <div class="order-meta">
                <span th:text="${orderVO.order_date}"></span> <span class="mx-2">|</span> <span th:text="|주문번호 ${orderVO.order_id}|"></span>
            </div>
            <div class="product-title">
                <span th:text="${orderVO.product_name}">상품명</span>
                <span th:if="${orderVO.order_count > 1}" th:text="| 외 ${orderVO.order_count - 1}건|" style="color:var(--paws-orange);"></span>
            </div>
            
            <div class="status-text">
                <th:block th:if="${#strings.contains(orderVO.order_status, 'PAID')}">
                    <span class="dot bg-paid"></span> <span style="color:#4caf50">결제완료</span>
                </th:block>
                <th:block th:if="${#strings.contains(orderVO.order_status, 'SHIP')}">
                    <span class="dot bg-shipping"></span> <span style="color:var(--paws-blue)">배송중</span>
                </th:block>
                <th:block th:if="${#strings.contains(orderVO.order_status, 'DELIVER')}">
                    <span class="dot bg-delivered"></span> <span style="color:#673ab7">배송완료</span>
                </th:block>
                <th:block th:if="${#strings.contains(orderVO.order_status, 'CANCEL')}">
                    <span class="dot bg-cancel"></span> <span style="color:#f44336">취소완료</span>
                </th:block>
                <th:block th:if="${#strings.contains(orderVO.order_status, 'REQC')}">
                    <span class="dot bg-waiting"></span> <span style="color:#ffc107">승인대기</span>
                </th:block>
            </div>
        </div>

        <div class="text-end">
            <span class="price-text" th:text="|${#numbers.formatInteger(orderVO.total_price, 0, 'COMMA')}원|"></span>
            
            <div class="btn-group-custom" onclick="event.stopPropagation();">
                <!-- 배송중일 때 수령확인 -->
                <a th:if="${#strings.contains(orderVO.order_status, 'SHIP')}" 
                   href="javascript:void(0);" th:onclick="|askDelivered(${orderVO.order_id})|"
                   class="btn-paws-sm btn-sm-delivered">구매 확정</a>

                <!-- 배송완료일 때 리뷰/반품 -->
                <th:block th:if="${#strings.contains(orderVO.order_status, 'DELIVER')}">
                    <a th:href="@{|/market_review/create.do?product_id=${orderVO.product_id}&order_item_id=${orderVO.order_item_id}|}" 
                       class="btn-paws-sm btn-sm-review">리뷰 작성하기</a>
                    <a th:href="@{|/market_order/return.do?order_id=${orderVO.order_id}|}" 
                       class="btn-paws-sm btn-sm-return">반품 신청</a>
                </th:block>

                <!-- 결제완료일 때 주문취소 -->
                <a th:if="${orderVO.order_status == 'PAID'}" 
                   th:href="@{|/market_order/cancel.do?order_id=${orderVO.order_id}|}" 
                   class="btn-sm-cancel">주문 취소하기</a>
            </div>
        </div>
    </div>
    
    <!-- 주문 내역 없을 때 -->
    <div th:if="${list.size() == 0}" class="no-data-wrapper">
        <div class="no-data-icon"><i class="bi bi-bag-x"></i></div>
        <p class="fw-bold text-muted mb-4">주문 내역이 비어있습니다.</p>
        <a th:href="@{/market/list.do}" class="btn-paws-sm btn-sm-review" style="width: 200px; margin: 0 auto; padding: 15px;">쇼핑하러 가기</a>
    </div>
</div>

<script th:inline="javascript">
/* 커스텀 모달 제어 */
function openPawsModal(msg, confirmCallback) {
    const modal = document.getElementById('pawsModal');
    document.getElementById('modalMessage').innerText = msg;
    const btnContainer = document.getElementById('modalButtons');
    btnContainer.innerHTML = '';

    if (confirmCallback) {
        const cancelBtn = document.createElement('button');
        cancelBtn.className = 'p-btn p-btn-cancel';
        cancelBtn.innerText = '취소';
        cancelBtn.onclick = () => modal.style.display = 'none';

        const confirmBtn = document.createElement('button');
        confirmBtn.className = 'p-btn p-btn-confirm';
        confirmBtn.innerText = '확인';
        confirmBtn.onclick = () => {
            modal.style.display = 'none';
            confirmCallback();
        };

        btnContainer.appendChild(cancelBtn);
        btnContainer.appendChild(confirmBtn);
    } else {
        const okBtn = document.createElement('button');
        okBtn.className = 'p-btn p-btn-confirm';
        okBtn.innerText = '확인';
        okBtn.onclick = () => modal.style.display = 'none';
        btnContainer.appendChild(okBtn);
    }
    modal.style.display = 'flex';
}

function askDelivered(order_id) {
    openPawsModal("상품을 안전하게 받으셨나요?\n구매 확정 후에는 취소가 어렵습니다.", function() {
        updateToDelivered(order_id);
    });
}

function updateToDelivered(order_id) {
    const data = { "order_id": order_id, "order_status": "DELIVERED" };
    fetch("/market_order/update_status.do", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(data => {
        if (data.res === "success") {
            openPawsModal("구매 확정이 완료되었습니다!\n정성스러운 리뷰를 기다릴게요. 🐾", function() {
                location.reload();
            });
        } else { 
            openPawsModal("처리 중 오류가 발생했습니다."); 
        }
    });
}
</script>
</body>
</div>
</html>
