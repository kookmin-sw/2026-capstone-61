<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">
<div layout:fragment="content">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>취소 완료 - Paws Market</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --paws-orange: #ff914d;
            --paws-orange-light: #fff5ed;
            --paws-orange-hover: #e87d3a;
            --paws-dark: #333333;
            --paws-gray: #777777;
            --paws-border: #f2f2f2;
        }

        /* 반응형 컨테이너: 모바일 여백 확보 */
        .success-container { 
            max-width: 600px; 
            margin: 80px auto; 
            padding: 0 20px; 
            text-align: center; 
        }
        
        .success-box { 
            background: #fff; 
            padding: 60px 30px; 
            border-radius: 35px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.05); 
            border: 1px solid var(--paws-border);
        }

        .icon-circle { 
            width: 90px; height: 90px; 
            background: var(--paws-orange-light); 
            color: var(--paws-orange); 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 45px; margin: 0 auto 30px;
            transition: all 0.5s ease;
        }
        
        .success-box:hover .icon-circle {
            transform: scale(1.1) rotate(10deg);
        }

        .success-box h2 {
            color: var(--paws-dark);
            font-weight: 800;
            font-size: 1.6rem; /* 반응형 폰트 크기 조절 */
            word-break: keep-all; /* 한글 단어 끊김 방지 */
        }
        .success-box h2 span { color: var(--paws-orange); }

        .success-box p {
            line-height: 1.7;
            color: var(--paws-gray);
            font-size: 1rem;
            margin-top: 15px;
        }

        /* 버튼 그룹: 기본은 가로 배치 */
        .btn-group-success { 
            display: flex; 
            justify-content: center; 
            gap: 12px; 
            margin-top: 40px; 
        }

        .btn-paws {
            padding: 14px 25px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 0.95rem;
            text-decoration: none !important;
            transition: 0.3s;
            flex: 1; /* 가로일 때 균등 분할 */
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-paws-outline {
            border: 1.5px solid #ddd;
            background: white;
            color: var(--paws-gray);
        }

        .btn-paws-main {
            background: var(--paws-orange);
            color: white;
            border: none;
            box-shadow: 0 8px 20px rgba(255, 145, 77, 0.2);
        }

        .btn-paws-outline:hover {
            border-color: var(--paws-orange);
            color: var(--paws-orange);
        }

        .btn-paws-main:hover {
            background: var(--paws-orange-hover);
            transform: translateY(-3px);
        }

        /* [핵심] 반응형 미디어 쿼리 */
        @media (max-width: 576px) {
            .success-container { margin: 50px auto; }
            .success-box { padding: 40px 20px; }
            
            .success-box h2 { font-size: 1.4rem; }
            
            /* 모바일에서 버튼을 세로로 쌓음 */
            .btn-group-success { 
                flex-direction: column-reverse; /* '쇼핑 계속하기'가 위로 오도록 */
                gap: 10px; 
            }
            
            .btn-paws { 
                width: 100%; 
                padding: 16px; 
                font-size: 1rem; 
            }
            
            .icon-circle { width: 80px; height: 80px; font-size: 40px; }
        }
    </style>
</head>
<body>

<div class="success-container">
    <div class="success-box">
        <div class="icon-circle">
            <i class="bi bi-check-circle-fill"></i>
        </div>
        
        <h2 class="mb-3">주문 취소 신청이 <span>완료</span>되었습니다.</h2>
        <p>
            정상적으로 접수되었습니다. 이용해 주셔서 감사합니다.<br>
            <span style="font-size: 0.85rem; display: block; margin-top: 10px;">
                환불은 결제 수단에 따라 <strong>3~7일(영업일 기준)</strong> 정도 소요될 수 있는 점 양해 부탁드립니다.
            </span>
        </p>

        <div class="btn-group-success">
            <a th:href="@{/market_order/list_by_memberno.do}" class="btn-paws btn-paws-outline">주문 내역 확인</a>
            <a th:href="@{/market/list.do}" class="btn-paws btn-paws-main">쇼핑 계속하기 🐾</a>
        </div>
    </div>
</div>

</body>
</div>
</html>
