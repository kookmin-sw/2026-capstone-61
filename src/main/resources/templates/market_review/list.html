<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paws Market - 전체 리뷰</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --paws-orange: #ff914d;
            --paws-orange-light: #fff5ed;
            --paws-orange-hover: #e87d3a;
            --paws-dark: #333333;
            --paws-gray: #777777;
            --paws-border: #f2f2f2;
        }

        /* ---------------- 기본 컨테이너 ---------------- */
        .container-box { 
            max-width: 900px; 
            margin: 60px auto 100px auto; 
            background: #fff; 
            padding: 40px; 
            border-radius: 30px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.04); 
            border: 1px solid var(--paws-border);
        }
        
        .page-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--paws-dark); 
            padding-bottom: 20px; 
            margin-bottom: 35px; 
        }
        .page-title { 
            font-size: 24px; 
            font-weight: 900; 
            color: var(--paws-dark); 
            margin: 0; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }
        .page-title i { color: var(--paws-orange); }
        
        .btn-back { 
            font-size: 14px; 
            color: var(--paws-orange);
            text-decoration: none !important; 
            font-weight: 700; 
            padding: 10px 18px; 
            background: var(--paws-orange-light); 
            border-radius: 12px; 
            transition: 0.3s; 
            display: inline-flex; 
            align-items: center; 
            gap: 6px; 
        }
        .btn-back:hover { 
            background: var(--paws-orange); 
            color: #fff; 
            transform: translateX(-3px);
        }

        /* ---------------- 리뷰 스타일 ---------------- */
        .review-item { 
            padding: 30px; 
            background: #fff; 
            border-radius: 20px; 
            margin-bottom: 25px; 
            border: 1px solid var(--paws-border); 
            transition: 0.3s; 
            position: relative;
            overflow: hidden;
        }
        .review-item::after {
            content: '🐾';
            position: absolute;
            bottom: -10px;
            right: -5px;
            font-size: 40px;
            opacity: 0.03;
            transform: rotate(-15deg);
        }
        .review-item:hover { 
            box-shadow: 0 8px 25px rgba(255, 145, 77, 0.08); 
            border-color: var(--paws-orange); 
        }
        
        .review-user-info { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
            background: #fafafa;
            padding: 12px 20px;
            border-radius: 12px;
        }
        .review-stars { color: #ffc107; font-weight: bold; font-size: 1.1rem; letter-spacing: 1px; }
        .user-id { font-weight: 700; margin-left: 10px; color: var(--paws-dark); font-size: 14px; }
        .review-date { color: #bbb; font-size: 13px; font-weight: 500; }
        
        /* 사진 왼쪽 고정 레이아웃 */
        .review-body { display: flex; gap: 25px; align-items: flex-start; }
        
        .review-img { 
            width: 140px; 
            height: 140px; 
            object-fit: cover; 
            border-radius: 15px; 
            border: 1px solid var(--paws-border); 
            flex-shrink: 0; 
            cursor: zoom-in; 
            transition: 0.3s; 
        }
        .review-img:hover { transform: scale(1.05); }
        
        .review-text-area { 
            flex: 1; 
            cursor: pointer; 
            padding: 5px; 
            transition: 0.2s; 
        }
        .review-text { 
            white-space: pre-wrap; 
            color: #444; 
            margin: 0; 
            line-height: 1.7; 
            font-size: 15.5px; 
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .read-more-btn { 
            margin-top: 15px; 
            font-size: 13px; 
            color: var(--paws-orange); 
            font-weight: 800; 
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        /* ---------------- 이미지 확대 모달 ---------------- */
        .img-modal { 
            display: none; 
            position: fixed; 
            z-index: 10000; 
            left: 0; top: 0; 
            width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.9); 
            align-items: center; 
            justify-content: center; 
            backdrop-filter: blur(8px); 
        }
        .img-modal-content { 
            max-width: 90%; 
            max-height: 85vh; 
            border-radius: 15px; 
            animation: zoomIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .modal-close { 
            position: absolute; 
            top: 30px; right: 30px; 
            color: #fff; 
            font-size: 40px; 
            cursor: pointer; 
        }
        
        @keyframes zoomIn { from {transform: scale(0.7); opacity: 0;} to {transform: scale(1); opacity: 1;} }

        .status-msg { text-align: center; padding: 80px 0; color: var(--paws-gray); font-size: 16px; font-weight: 600; }

        /* ---------------- 반응형 수정 (모바일에서도 사진 왼쪽 유지) ---------------- */
        @media (max-width: 768px) {
            .container-box { padding: 25px 15px; margin: 20px 10px; border-radius: 20px; }
            
            .page-header { padding-bottom: 15px; margin-bottom: 25px; }
            .page-title { font-size: 20px; }
            .btn-back { padding: 8px 12px; font-size: 13px; }

            .review-item { padding: 15px; }
            .review-user-info { 
                padding: 10px; 
                margin-bottom: 15px; 
                flex-direction: row; 
                justify-content: space-between;
                font-size: 12px;
            }
            .review-stars { font-size: 0.9rem; }
            .user-id { margin-left: 5px; }

            .review-body { 
                gap: 15px; /* 사진과 텍스트 간격 축소 */
                flex-direction: row; /* 모바일에서도 가로 배치 유지(사진 왼쪽) */
                align-items: flex-start;
            }

            .review-img { 
                width: 80px;  /* 모바일에서 사진 크기 대폭 축소 */
                height: 80px; 
                border-radius: 10px;
            }

            .review-text { 
                font-size: 14px; 
                line-height: 1.5;
                -webkit-line-clamp: 3; /* 모바일에서는 3줄로 제한 */
            }
            .read-more-btn { margin-top: 8px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div layout:fragment="content">
    <div class="container-box">
        <div class="page-header">
            <h4 class="page-title"><i class="bi bi-chat-heart-fill"></i> 소중한 구매 후기</h4>
            <a href="javascript:history.back();" class="btn-back"><i class="bi bi-chevron-left"></i> 돌아가기</a>
        </div>
        
        <div id="reviewList">
            <!-- 로딩 스피너 -->
            <div class="status-msg">
                <div class="spinner-border" role="status" style="color: var(--paws-orange); margin-bottom:20px; width: 2.5rem; height: 2.5rem; border-width: 0.25em;"></div>
                <div>아이들의 후기를 가져오고 있어요... 🐾</div>
            </div>
        </div>
    </div>

    <!-- 이미지 확대 모달 -->
    <div id="imageModal" class="img-modal" onclick="closeModal()">
        <span class="modal-close"><i class="bi bi-x-lg"></i></span>
        <img class="img-modal-content" id="expandedImg" src="" alt="확대된 이미지">
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        const productId = /*[[${product_id}]]*/ null;
        
        document.addEventListener("DOMContentLoaded", function() {
            if (productId != null && productId > 0) {
                loadReviews(productId);
            } else {
                showError("상품 정보를 확인할 수 없습니다.");
            }
        });

        function loadReviews(p_id) {
            fetch('/market_review/list_by_product.do?product_id=' + p_id)
            .then(response => {
                if (!response.ok) throw new Error("서버 통신 오류");
                return response.json();
            })
            .then(list => {
                const listContainer = document.getElementById('reviewList');
                let html = '';
                
                if (list && list.length > 0) {
                    list.forEach(vo => {
                        const starText = '★'.repeat(vo.rating) + '☆'.repeat(5 - vo.rating);
                        const date = vo.reg_date ? vo.reg_date.substring(0, 10) : '';
                        const imgSrc = vo.review_img ? `/market_review/storage/${vo.review_img}` : null;

                        html += `
                        <div class="review-item">
                            <div class="review-user-info">
                                <div>
                                    <span class="review-stars">${starText}</span>
                                    <span class="user-id"><i class="bi bi-person-fill" style="color:#ddd; margin-right:4px;"></i>${vo.id}</span>
                                </div>
                                <span class="review-date">${date}</span>
                            </div>
                            <div class="review-body">
                                ${imgSrc ? `<img src="${imgSrc}" alt="후기이미지" class="review-img" onclick="openModal('${imgSrc}')">` : ''}
                                
                                <div class="review-text-area" onclick="location.href='/market_review/read.do?review_id=${vo.review_id}'">
                                    <p class="review-text">${vo.review_content}</p>
                                    <div class="read-more-btn">
                                        자세히 보기 <i class="bi bi-chevron-right"></i>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                    });
                } else {
                    html = `
                    <div class="status-msg">
                        <i class="bi bi-chat-left-dots" style="font-size:50px; display:block; margin-bottom:20px; color:#eee;"></i>
                        아직 작성된 리뷰가 없어요.<br>첫 번째 후기의 주인공이 되어주세요! 🐾
                    </div>`;
                }
                listContainer.innerHTML = html;
            })
            .catch(error => {
                console.error('Error:', error);
                showError("리뷰를 불러오는 중 오류가 발생했습니다.");
            });
        }

        function showError(msg) {
            document.getElementById('reviewList').innerHTML = `
                <div class="status-msg" style="color:#ff6b6b;">
                    <i class="bi bi-exclamation-circle" style="font-size:40px; display:block; margin-bottom:15px;"></i>
                    ${msg}
                </div>`;
        }

        function openModal(src) {
            event.stopPropagation();
            const modal = document.getElementById('imageModal');
            const expandedImg = document.getElementById('expandedImg');
            expandedImg.src = src;
            modal.style.display = "flex";
            document.body.style.overflow = "hidden";
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = "none";
            document.body.style.overflow = "auto";
        }
        /*]]>*/
    </script>
</div>

</body>
</html>
