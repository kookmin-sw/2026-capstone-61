<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">
<div layout:fragment="content">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리뷰 작성 - Paws Market</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --paws-orange: #ff914d;
            --paws-orange-light: #fff5ed;
            --paws-orange-hover: #e87d3a;
            --paws-dark: #333333;
            --paws-gray: #888888;
            --paws-border: #f2f2f2;
        }

        .review-container {
            max-width: 650px;
            margin: 60px auto 100px auto;
            padding: 0 20px;
        }

        .review-card {
            background: #fff;
            padding: 45px;
            border-radius: 35px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.05);
            border: 2px solid var(--paws-orange-light);
            position: relative;
            overflow: hidden;
        }

        /* 귀여운 상단 배경 장식 */
        .review-card::before {
            content: '🐾';
            position: absolute;
            top: -10px;
            right: 20px;
            font-size: 80px;
            opacity: 0.05;
            transform: rotate(20deg);
        }

        .review-header { text-align: center; margin-bottom: 35px; }
        .review-header h2 { color: var(--paws-dark); font-weight: 800; font-size: 1.8rem; }
        .review-header h2 span { color: var(--paws-orange); }
        .review-header p { color: var(--paws-gray); font-size: 0.95rem; margin-top: 10px; }

        /* 별점 스타일링 (인터랙티브) */
        .star-rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .star-rating input { display: none; }
        .star-rating label {
            font-size: 35px;
            color: #ddd;
            cursor: pointer;
            transition: 0.2s;
        }
        .star-rating :checked ~ label,
        .star-rating label:hover,
        .star-rating label:hover ~ label {
            color: #ffc107; /* 별색은 전통적인 황금색 */
        }
        .rating-desc { text-align: center; font-size: 0.9rem; color: var(--paws-orange); font-weight: 700; margin-bottom: 30px; }

        /* 입력 폼 스타일 */
        .form-label { font-weight: 700; color: var(--paws-dark); margin-bottom: 12px; display: block; }
        .form-control, .form-select {
            border-radius: 18px;
            border: 2px solid var(--paws-border);
            padding: 15px;
            font-size: 0.95rem;
            transition: 0.3s;
        }
        .form-control:focus {
            border-color: var(--paws-orange);
            box-shadow: 0 0 0 4px rgba(255, 145, 77, 0.1);
            outline: none;
        }

        /* 사진 첨부 커스텀 */
        .file-input-wrapper {
            background: #fdfdfd;
            border: 2px dashed #ddd;
            padding: 20px;
            border-radius: 18px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .file-input-wrapper:hover { border-color: var(--paws-orange); background: var(--paws-orange-light); }
        .file-preview {
            width: 100px; height: 100px;
            border-radius: 12px;
            object-fit: cover;
            display: none;
            margin: 15px auto 0;
            border: 1px solid var(--paws-border);
        }

        /* 버튼 그룹 */
        .btn-wrap { display: flex; gap: 15px; margin-top: 40px; }
        .btn-paws {
            flex: 1;
            padding: 16px;
            border-radius: 15px;
            font-weight: 800;
            font-size: 1.05rem;
            border: none;
            transition: 0.3s;
            cursor: pointer;
        }
        .btn-submit {
            background: var(--paws-orange);
            color: white;
            box-shadow: 0 8px 20px rgba(255, 145, 77, 0.2);
        }
        .btn-submit:hover { background: var(--paws-orange-hover); transform: translateY(-3px); }
        .btn-cancel { background: #f1f1f1; color: #666; }
        .btn-cancel:hover { background: #e5e5e5; }

        /* 커스텀 모달 */
        #pawsModal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; backdrop-filter: blur(3px); }
        .p-modal-content { background: #fff; padding: 35px; border-radius: 30px; width: 360px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.15); animation: pModalShow 0.3s ease; }
        @keyframes pModalShow { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .p-modal-icon { font-size: 45px; color: var(--paws-orange); margin-bottom: 15px; }
        .p-modal-text { font-weight: 700; color: #333; margin-bottom: 25px; line-height: 1.6; }
        .p-btn-ok { width: 100%; padding: 14px; border-radius: 12px; background: var(--paws-orange); color: white; border: none; font-weight: 700; }

        /* 반응형 */
        @media (max-width: 576px) {
            .review-container { margin: 30px auto; }
            .review-card { padding: 30px 20px; }
            .review-header h2 { font-size: 1.5rem; }
            .btn-wrap { flex-direction: column-reverse; }
        }
    </style>
</head>

<!-- 커스텀 모달 -->
<div id="pawsModal">
    <div class="p-modal-content">
        <div class="p-modal-icon"><i class="bi bi-chat-heart-fill"></i></div>
        <div class="p-modal-text" id="modalMessage">메시지</div>
        <button class="p-btn-ok" onclick="closePawsModal()">확인</button>
    </div>
</div>

<div class="review-container">
    <div class="review-card">
        <div class="review-header">
            <h2>상품 <span>리뷰 작성</span></h2>
            <p>우리 아이가 좋아하나요? 소중한 후기를 들려주세요! 🐾</p>
        </div>

        <form id="reviewForm" method="POST" action="/market_review/create.do" enctype="multipart/form-data">
            <input type="hidden" name="product_id" th:value="${product_id}">
            <input type="hidden" name="order_item_id" th:value="${order_item_id}">

            <!-- 별점 선택 -->
            <label class="form-label text-center">아이의 만족도는 어땠나요?</label>
            <div class="star-rating">
                <input type="radio" id="star5" name="rating" value="5" checked><label for="star5" title="최고예요!"><i class="bi bi-star-fill"></i></label>
                <input type="radio" id="star4" name="rating" value="4"><label for="star4" title="좋아요!"><i class="bi bi-star-fill"></i></label>
                <input type="radio" id="star3" name="rating" value="3"><label for="star3" title="보통이에요"><i class="bi bi-star-fill"></i></label>
                <input type="radio" id="star2" name="rating" value="2"><label for="star2" title="그저 그래요"><i class="bi bi-star-fill"></i></label>
                <input type="radio" id="star1" name="rating" value="1"><label for="star1" title="별로예요"><i class="bi bi-star-fill"></i></label>
            </div>
            <div class="rating-desc" id="ratingDesc">★★★★★ 최고예요!</div>

            <!-- 리뷰 내용 -->
            <div class="mb-4">
                <label class="form-label">솔직한 후기</label>
                <textarea name="review_content" id="reviewContent" class="form-control" rows="6" 
                          placeholder="다른 견주/집사님들에게 도움이 될 수 있도록 꼼꼼한 후기를 남겨주시면 큰 힘이 됩니다! (10자 이상)"></textarea>
            </div>

            <!-- 사진 첨부 -->
            <div class="mb-4">
                <label class="form-label">사진 첨부 (선택)</label>
                <div class="file-input-wrapper" onclick="document.getElementById('review_img_file').click()">
                    <i class="bi bi-camera-fill" style="font-size: 2rem; color: #bbb;"></i>
                    <p class="mb-0 text-muted small">예쁜 사진을 추가하면 베스트 리뷰 확률이 UP!</p>
                    <input type="file" name="review_img_file" id="review_img_file" style="display: none;" accept="image/*" onchange="previewImage(this)">
                    <img id="imgPreview" class="file-preview">
                </div>
            </div>

            <div class="btn-wrap">
                <button type="button" class="btn-paws btn-cancel" onclick="history.back()">다음에 적을게요</button>
                <button type="button" class="btn-paws btn-submit" onclick="validateReview()">리뷰 등록하기 🐾</button>
            </div>
        </form>
    </div>
</div>

<script>
    /* 별점 텍스트 변경 */
    const ratingTexts = {
        "5": "★★★★★ 최고예요!",
        "4": "★★★★☆ 좋아요!",
        "3": "★★★☆☆ 보통이에요",
        "2": "★★☆☆☆ 그저 그래요",
        "1": "★☆☆☆☆ 별로예요"
    };

    document.querySelectorAll('.star-rating input').forEach(input => {
        input.addEventListener('change', (e) => {
            document.getElementById('ratingDesc').innerText = ratingTexts[e.target.value];
        });
    });

    /* 이미지 미리보기 */
    function previewImage(input) {
        const preview = document.getElementById('imgPreview');
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    /* 커스텀 모달 제어 */
    function openPawsModal(msg) {
        document.getElementById('modalMessage').innerText = msg;
        document.getElementById('pawsModal').style.display = 'flex';
    }

    function closePawsModal() {
        document.getElementById('pawsModal').style.display = 'none';
    }

    /* 유효성 검사 및 등록 */
    function validateReview() {
        const content = document.getElementById('reviewContent').value.trim();
        
        if (content.length < 10) {
            openPawsModal("리뷰 내용을 10자 이상 작성해주세요! 🐾");
            return;
        }

        // 실제 등록 처리
        document.getElementById('reviewForm').submit();
    }
</script>

</body>
</div>
</html>
