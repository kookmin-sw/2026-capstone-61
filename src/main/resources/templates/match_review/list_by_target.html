<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<div layout:fragment="content">

<head>
<meta charset="UTF-8">
<title>Paws - 받은 리뷰</title>

<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<style>

:root{
  --paws-pink:#ff6b81;
  --paws-light-pink:#fff3f3;
  --paws-dark:#333;
  --paws-gray:#777;
  --paws-border:#f2f2f2;
}

/* =========================================================
   🌸 전체 컨테이너
========================================================= */
.container-box{
  max-width:720px;
  margin:60px auto 70px auto;
  background:#fff;
  padding:22px;
  border-radius:22px;
  box-shadow:0 6px 20px rgba(0,0,0,.04);
  border:1px solid var(--paws-border);
}

/* =========================================================
   🐾 상단
========================================================= */
.page-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:2px solid #222;
  padding-bottom:14px;
  margin-bottom:20px;
}

.btn-back{
  font-size:12px;
  padding:7px 13px;
  background:#f8f9fa;
  color:#666;
  border-radius:10px;
  text-decoration:none;
  font-weight:700;
  transition:.2s;
}

.btn-back:hover{
  background:#eee;
  color:#333;
}

/* =========================================================
   👤 프로필 요약
========================================================= */
.profile-summary{
  background:linear-gradient(135deg,#fff3f3 0%,#ffe9ed 100%);
  padding:16px;
  border-radius:18px;
  margin-bottom:18px;
  display:flex;
  align-items:center;
  gap:18px;
  border:1px solid #ffd9e0;
}

.manner-score{
  font-size:26px;
  font-weight:900;
  color:var(--paws-pink);
  line-height:1.1;
}

.review-count{
  font-size:11px;
  color:#888;
  margin-top:4px;
}

.summary-title{
  font-size:18px;
  font-weight:800;
  color:#222;
  line-height:1.3;
}

.summary-desc{
  font-size:12px;
  color:#888;
  margin-top:4px;
}

/* =========================================================
   📝 리뷰 카드
========================================================= */
.review-card{
  padding:13px;
  background:#fff;
  border-radius:14px;
  margin-bottom:10px;
  border:1px solid #f1f1f1;
  transition:.2s;
}

.review-card:hover{
  border-color:var(--paws-pink);
  transform:translateY(-2px);
  box-shadow:0 4px 12px rgba(255,107,129,.06);
}

/* =========================================================
   ⭐ 점수 영역
========================================================= */
.review-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.review-stars{
  color:#ffc107;
  font-size:12px;
  font-weight:800;
}

.review-date{
  color:#aaa;
  font-size:10px;
}

/* =========================================================
   👤 작성자
========================================================= */
.review-title{
  margin-top:6px;
  font-size:11px;
  color:#888;
  line-height:1.4;
}

.review-writer{
  font-weight:700;
  color:#222;
}

/* =========================================================
   📦 점수 박스
========================================================= */
.score-box{
  display:flex;
  gap:8px;
  margin-top:10px;
  flex-wrap:wrap;
}

.score-item{
  background:#fafafa;
  border-radius:9px;
  padding:6px 10px;
  font-size:11px;
  font-weight:700;
  color:#555;
  border:1px solid #f2f2f2;
  flex:1;
  min-width:220px;
}

/* =========================================================
   📄 리뷰 본문
========================================================= */
.review-text{
  margin-top:10px;
  color:#555;
  line-height:1.45;
  font-size:12px;
  white-space:pre-wrap;
  background:#fcfcfc;
  border-radius:10px;
  padding:10px;
  border:1px solid #f5f5f5;
}

/* =========================================================
   ❌ 리뷰 없음
========================================================= */
.empty-box{
  text-align:center;
  padding:60px 0;
  color:#999;
}

.empty-icon{
  font-size:50px;
}

.empty-title{
  margin-top:12px;
  font-size:16px;
  font-weight:700;
}

.empty-desc{
  margin-top:6px;
  font-size:12px;
  color:#aaa;
}

/* =========================================================
   📱 모바일 최적화
========================================================= */
@media(max-width:768px){

  .container-box{
    width:95%;
    padding:15px;
    margin-top:55px;
  }

  .profile-summary{
    flex-direction:row;
    align-items:center;
    gap:12px;
    padding:12px;
    border-radius:15px;
    margin-bottom:14px;
  }

  .manner-score{
    font-size:20px;
  }

  .summary-title{
    font-size:15px;
    margin-bottom:2px;
  }

  .summary-desc{
    font-size:11px;
    margin-top:2px;
  }

  .review-count{
    font-size:10px;
  }

  .review-card{
    padding:10px;
    border-radius:12px;
  }

  .review-top{
    flex-direction:row;
    align-items:center;
  }

  .review-stars{
    font-size:11px;
  }

  .review-date{
    font-size:9px;
  }

  .review-title{
    font-size:10px;
    margin-top:5px;
  }

  .score-box{
    gap:6px;
    margin-top:8px;
  }

  .score-item{
    padding:5px 8px;
    font-size:10px;
    border-radius:8px;
    min-width:100%;
  }

  .review-text{
    padding:8px;
    margin-top:8px;
    font-size:11px;
    line-height:1.4;
  }

}

</style>
</head>

<body>

<div class="container-box">

  <!-- 상단 -->
  <div class="page-header">

    <h4 class="fw-bold m-0">
      🐾 산책 후기
    </h4>

    <a href="javascript:history.back();"
       class="btn-back">

      <i class="bi bi-arrow-left"></i>
      뒤로

    </a>

  </div>

  <!-- 리뷰 존재 -->
  <div th:if="${list.size() > 0}">

    <!-- 프로필 요약 -->
    <div class="profile-summary">

      <div class="text-center"
           style="min-width:90px;">

        <div class="small text-muted mb-1">
          종합 매너 점수
        </div>

        <div class="manner-score">

          ★
          <span th:text="${#numbers.formatDecimal(avg_score,1,1)}">
            0.0
          </span>

        </div>

        <div class="review-count">

          리뷰
          <span th:text="${list.size()}">0</span>개

        </div>

      </div>

      <div>

        <!-- 이름 안나오는 문제 해결 -->
        <div class="summary-title">

          <span th:text="${list[0].target_nickname != null ? list[0].target_nickname : '사용자'}">
            사용자
          </span>

          님의 산책 후기

        </div>

        <div class="summary-desc">

          실제 산책 완료 후 작성된 후기입니다 🐶

        </div>

      </div>

    </div>

    <!-- 리뷰 반복 -->
    <div th:each="vo : ${list}"
         class="review-card">

      <!-- 상단 -->
      <div class="review-top">

        <div>

          <span class="review-stars">

            👤 보호자 ★
            <span th:text="${vo.owner_score}">
              0
            </span>

          </span>

          <span class="review-stars ms-2">

            🐶 반려견 ★
            <span th:text="${vo.dog_score}">
              0
            </span>

          </span>

        </div>

        <span class="review-date"
              th:text="${vo.rdate}">
          날짜
        </span>

      </div>

      <!-- 작성자 -->
      <div class="review-title">

        작성자 :
        <span class="review-writer"
              th:text="${vo.writer_nickname}">
          작성자
        </span>

        · 게시글 :
        <span th:text="${vo.match_title}">
          제목
        </span>

      </div>

      <!-- 상세 후기 -->
      <div class="score-box">

        <div class="score-item">

          🐶 반려견 :
          <span th:text="${vo.dog_comment}">
          </span>

        </div>

        <div class="score-item">

          👤 보호자 :
          <span th:text="${vo.owner_comment}">
          </span>

        </div>

      </div>

      <!-- 종합 후기 -->
      <div class="review-text"
           th:text="${vo.content}">

        종합 후기

      </div>

    </div>

  </div>

  <!-- 리뷰 없음 -->
  <div th:if="${list.size() == 0}"
       class="empty-box">

    <div class="empty-icon">
      🐾
    </div>

    <div class="empty-title">
      아직 등록된 리뷰가 없습니다.
    </div>

    <div class="empty-desc">
      첫 번째 산책 후기를 남겨보세요 :)
    </div>

  </div>

</div>

</body>
</div>
</html>
