<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:th="http://www.thymeleaf.org">

<div layout:fragment="content">

<head>
<meta charset="UTF-8">
<title>Paws - 신청 현황 관리</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<style>

.apply-container{
  max-width:850px;
  margin:40px auto;
  padding:20px;
}

.apply-card{
  background:#fff;
  border-radius:22px;
  padding:25px;
  margin-bottom:22px;
  box-shadow:0 4px 15px rgba(0,0,0,.05);
  border:1px solid #f1f2f6;
  transition:.25s;
}

.apply-card:hover{
  transform:translateY(-3px);
}

.apply-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #f5f5f5;
  padding-bottom:15px;
  margin-bottom:20px;
}

.apply-nickname{
  font-weight:800;
  font-size:18px;
  color:#2d3436;
  display:flex;
  align-items:center;
  gap:8px;
}
.manner-badge {
  font-size: 13px;
  font-weight: 700;
  color: #ff7675;
  background: #fff5f5;
  padding: 3px 10px;
  border-radius: 12px;
  border: 1px solid #ffeaa7;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.apply-date{
  font-size:13px;
  color:#b2bec3;
}

.dog-profile{
  display:flex;
  align-items:center;
  gap:18px;
  margin-bottom:18px;
  background:#fff8f9;
  border:1px solid #ffe0e5;
  border-radius:18px;
  padding:18px;
}

.dog-thumb{
  width:78px;
  height:78px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #fff;
  box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.dog-empty{
  width:78px;
  height:78px;
  border-radius:50%;
  background:#f8f9fa;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:35px;
}

.dog-name{
  font-size:20px;
  font-weight:900;
  color:#2d3436;
  margin-bottom:8px;
}

.dog-info-line{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  font-size:14px;
  color:#636e72;
}

.dog-tag{
  background:#fff;
  border:1px solid #ffd6de;
  padding:5px 12px;
  border-radius:20px;
  font-weight:700;
}

.dbti-badge{
  background:#ffeff3;
  color:#ff6b81;
  padding:6px 15px;
  border-radius:20px;
  font-size:13px;
  font-weight:800;
  display:inline-block;
  margin-top:10px;
}

.apply-msg{
  background:#fafafa;
  padding:20px;
  border-radius:16px;
  font-size:15px;
  line-height:1.7;
  white-space:pre-wrap;
  color:#4a4a4a;
  border:1px solid #f1f1f1;
}

.status-actions{
  margin-top:22px;
  display:flex;
  gap:12px;
  justify-content:flex-end;
  align-items:center;
}

.btn-status{
  padding:10px 24px;
  border-radius:12px;
  font-weight:700;
  border:none;
  cursor:pointer;
  transition:.25s;
}

.btn-status:hover{
  transform:scale(1.03);
}

.btn-accept{
  background:#ff6b81;
  color:#fff;
  box-shadow:0 4px 10px rgba(255,107,129,.3);
}

.btn-reject{
  background:#dfe6e9;
  color:#636e72;
}

.status-text{
  font-weight:900;
  padding:9px 20px;
  border-radius:12px;
  font-size:14px;
}

.status-2{
  color:#00b894;
  background:#e6fffb;
  border:1px solid #b7eb8f;
}

.status-3{
  color:#636e72;
  background:#f1f2f6;
  border:1px solid #dcdde1;
}

.modal-content{
  border-radius:25px;
  border:none;
  overflow:hidden;
}

@media(max-width:768px){

  .apply-card{
    padding:18px;
  }

  .dog-profile{
    flex-direction:column;
    text-align:center;
  }

  .dog-info-line{
    justify-content:center;
  }

}

</style>

</head>

<body>

<div class="apply-container">

  <div class="mb-5">

    <button type="button"
            class="btn btn-sm btn-outline-secondary px-3"
            th:onclick="|location.href='/match_post/read?matchno=${matchno}'|"
            style="border-radius:20px;">

      <i class="bi bi-arrow-left"></i>
      게시글로 돌아가기

    </button>

    <div class="mt-4">

      <h3 class="fw-bold mb-2">
        🐾 내 산책 모임 신청 현황
      </h3>

      <p class="text-muted">
        내 강아지와 잘 맞을 것 같은 친구의 신청을 확인해보세요.
      </p>

    </div>

  </div>

  <div th:if="${#lists.isEmpty(list)}"
       class="text-center py-5">

    <i class="bi bi-emoji-smile"
       style="font-size:4rem;color:#dfe6e9;"></i>

    <p class="mt-4 text-muted fs-5">
      아직 도착한 신청이 없어요 🐶
    </p>

  </div>

  <div th:each="vo : ${list}"
       class="apply-card">

    <div class="apply-header">

      <div class="apply-nickname">

        <i class="bi bi-person-heart"
           style="color:#ff6b81;"></i>

        <span th:text="${vo.nickname}">
          신청자
        </span>
<span class="manner-badge">
  <i class="bi bi-thermometer-half"></i>
  <!-- 🎯 복잡한 조건문 다 걷어내고, 넘겨받은 점수를 소수점 1자리까지 그대로 표현 -->
  <span th:text="${#numbers.formatDecimal(vo.manner_score, 1, 1)} + '°C'"></span>
</span>
      </div>

      <div class="apply-date">

        <i class="bi bi-clock me-1"></i>

        <span th:text="${vo.rdate != null ? vo.rdate.substring(0,16) : ''}">
        </span>

      </div>

    </div>

    <!-- 강아지 정보 -->
    <div class="dog-profile">

      <img th:if="${vo.thumb1 != null and vo.thumb1 != ''}"
           th:src="@{|/dog/storage/${vo.thumb1}|}"
           class="dog-thumb">

      <div th:if="${vo.thumb1 == null or vo.thumb1 == ''}"
           class="dog-empty">
        🐶
      </div>

      <div style="flex:1;">

        <div class="dog-name"
             th:text="${vo.dog_name}">
          강아지이름
        </div>

        <div class="dog-info-line">

          <div class="dog-tag">
            이름 :
            <span th:text="${vo.dog_name}"></span>
          </div>

          <div class="dog-tag">
            나이 :
            <span th:text="${vo.age + '살'}"></span>
          </div>

          <div class="dog-tag">
            성별 :
            <span th:text="${vo.gender == 'M' ? '수컷 ♂️' : '암컷 ♀️'}"></span>
          </div>

          <div class="dog-tag">
            견종 :
            <span th:text="${vo.breed}"></span>
          </div>

        </div>

        <div class="dbti-badge">

          <i class="bi bi-tag-fill me-1"></i>

          DBTI :
          <span th:text="${vo.dbti_type}"></span>

        </div>

      </div>

    </div>

    <!-- 메시지 -->
    <div class="apply-msg"
         th:text="${vo.msg}">
    </div>

    <!-- 버튼 -->
    <div class="status-actions"
         th:if="${vo.apply_status == 1}">

	  <button type="button"
              class="btn-status btn-reject"
              th:onclick="|updateStatus(${vo.applyno}, 6)|">거절 <!-- 💡 3에서 6으로 변경 -->
      </button>

      <button type="button"
              class="btn-status btn-accept"
              th:onclick="|updateStatus(${vo.applyno}, 2)|">수락 <!-- 2: 수락/매칭진행중 -->
      </button>

    </div>

    <div class="status-actions"
         th:if="${vo.apply_status != 1}">

		<span th:if="${vo.apply_status == 2}"
		      class="status-text status-2">
		
		  <i class="bi bi-chat-dots-fill me-1"></i>
		  매칭 진행중
		
		</span>
		
		<span th:if="${vo.apply_status == 4}"
		      class="status-text status-2">
		
		  <i class="bi bi-check-circle-fill me-1"></i>
		  산책 완료
		
		</span>

    </div>

  </div>

</div>

<!-- 확인 모달 -->
<div class="modal fade"
     id="confirmModal"
     tabindex="-1"
     aria-hidden="true">

  <div class="modal-dialog modal-dialog-centered"
       style="max-width:380px;">

    <div class="modal-content">

      <div class="modal-body text-center p-5">

        <div id="confirmIcon"
             class="mb-3"
             style="font-size:50px;">

          🤔

        </div>

        <h5 id="confirmTitle"
            class="fw-bold mb-2">

          처리 확인

        </h5>

        <p id="confirmMessage"
           class="text-muted mb-4">
        </p>

        <div class="d-flex gap-2">

          <button type="button"
                  class="btn-status btn-reject flex-fill"
                  data-bs-dismiss="modal">

            취소

          </button>

          <button type="button"
                  id="confirmSubmitBtn"
                  class="btn-status btn-accept flex-fill">

            확인

          </button>

        </div>

      </div>

    </div>

  </div>

</div>

<script th:inline="javascript">

let confirmModal;
let pendingData={};

document.addEventListener("DOMContentLoaded",function(){

  confirmModal=new bootstrap.Modal(
    document.getElementById('confirmModal')
  );

  document.getElementById('confirmSubmitBtn')
  .addEventListener('click',function(){

    executeStatusUpdate();

  });

});

/* 수락/거절 */
function updateStatus(applyno,status){

  pendingData={
    applyno,
    status
  };

  const isAccept=(status==2);

  document.getElementById("confirmTitle").innerText=
    isAccept ? "매칭 수락" : "신청 거절";

  document.getElementById("confirmMessage").innerHTML=
    isAccept
    ? "이 신청을 수락하시겠습니까?<br><b>수락 시 모집이 자동 마감됩니다.</b>"
    : "정말 거절하시겠습니까?";

  document.getElementById("confirmIcon").innerText=
    isAccept ? "🎉" : "✋";

  confirmModal.show();

}

/* 실제 처리 */
function executeStatusUpdate(){

  confirmModal.hide();

  const matchno = /*[[${matchno}]]*/ 0;
  const {applyno,status}=pendingData;

  fetch('/match_apply/update_status',{

    method:'POST',

    headers:{
      'Content-Type':'application/x-www-form-urlencoded'
    },

    body:
  		`applyno=${applyno}&apply_status=${status}`

  })

  .then(response=>{

    if(!response.ok){
      throw new Error('서버 오류');
    }

    return response.json();

  })

  .then(data=>{

    if(data.res==='success'){

      if(status==2){

        alert(
          '매칭 성공! 🎉\n채팅방이 생성되었습니다.\n메신저에서 확인해주세요.'
        );

      }else{

        alert('신청을 거절했습니다.');

      }

      location.reload();

    }else{

      alert(data.msg || '처리 실패');

    }

  })

  .catch(error=>{

    console.error(error);

    alert('서버 통신 오류');

  });

}

</script>

</body>
</html>
