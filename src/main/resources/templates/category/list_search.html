<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:th="http://www.thymeleaf.org">
<head>
<title>Paws | 카테고리 관리</title>
<style>
  body {
    font-family: 'Pretendard', sans-serif;
    background-color: #f8f9fa;
  }

  /* 메인 컨테이너 카드 */
  .paws-card {
    width: 95%;
    max-width: 950px;
    background-color: #fff;
    padding: 40px;
    border-radius: 30px;
    box-shadow: 0 15px 40px rgba(255, 182, 193, 0.15);
    margin: 60px auto 100px auto;
    border: none;
  }

  /* 상단 타이틀 영역 */
  .admin-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    flex-wrap: wrap;
    gap: 15px;
  }

  .admin-title {
    font-size: 24px;
    font-weight: 800;
    color: #333;
    display: flex;
    align-items: center;
  }

  .admin-title i {
    color: #ff6b81;
    margin-right: 10px;
  }

  /* 등록 폼 감싸는 영역 */
  .form-wrapper {
    display: none;
    justify-content: center;
    margin-bottom: 40px;
    animation: slideDown 0.4s ease-out;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .cute-form {
    width: 100%;
    max-width: 500px;
    background: #fff5f7;
    padding: 35px;
    border-radius: 25px;
    border: 2px dashed #ffccd2;
  }

  .form-label {
    font-size: 14px;
    font-weight: 700;
    color: #ff758c;
    margin-left: 5px;
    margin-bottom: 5px;
    display: block;
  }

  .cute-input {
    border-radius: 15px;
    border: 1px solid #eee;
    padding: 12px 18px;
    font-size: 15px;
    width: 100%;
    margin-bottom: 15px;
    transition: 0.3s;
  }

  .cute-input:focus {
    border-color: #ff9a9e;
    box-shadow: 0 0 0 4px rgba(255, 154, 158, 0.1);
    outline: none;
    background-color: #fff;
  }

  /* 버튼 스타일 */
  .btn-paws-group {
    display: flex;
    gap: 12px;
  }

  .btn-paws {
    padding: 10px 25px;
    border-radius: 25px;
    font-weight: 700;
    font-size: 15px;
    border: none;
    cursor: pointer;
    transition: 0.3s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .btn-paws-main {
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    color: white;
    box-shadow: 0 4px 15px rgba(255, 107, 129, 0.2);
  }

  .btn-paws-sub {
    background: #f1f2f6;
    color: #57606f;
  }

  .btn-paws:hover {
    transform: translateY(-2px);
    opacity: 0.9;
  }

  /* 에러 메시지 */
  .msg-error-cute {
    color: #ff4757;
    font-size: 13px;
    margin-top: -10px;
    margin-bottom: 10px;
    margin-left: 5px;
    display: block;
    font-weight: 500;
  }

  /* 검색 결과 안내 */
  .search-info {
    background: #f8f9fa;
    padding: 8px 15px;
    border-radius: 12px;
    font-size: 14px;
    color: #666;
  }
</style>

<script th:inline="javascript">
/* 에러 발생 시 자동으로 폼 열기 */
window.onload = function() {
    let hasErrors = [[${#fields.hasErrors('categoryVO.*')}]];
    if (hasErrors) {
        document.getElementById("insertDropdown").style.display = "flex";
    }
}

function toggleFormVisibility() {
    const form = document.getElementById("insertDropdown");
    form.style.display = (form.style.display === "none" || form.style.display === "") ? "flex" : "none";
}
</script>
</head>

<body>
<div layout:fragment="content">

  <div class="paws-card">
    
    <!-- 관리자 헤더 -->
    <div class="admin-header">
      <div class="admin-title">
        <i class="fas fa-paw"></i>
        <span>카테고리 설정</span>
      </div>
      
      <div class="btn-paws-group" th:if="${session.grade == 'admin'}">
        <button class="btn-paws btn-paws-main" type="button" onclick="toggleFormVisibility()">
          <i class="fas fa-plus me-2"></i>새 카테고리
        </button>
        <a class="btn-paws btn-paws-sub" th:href="@{/category/list_search}">
          <i class="fas fa-list me-2"></i>전체보기
        </a>
      </div>
    </div>

    <!-- 검색 정보 안내 -->
    <div class="mb-4" th:if="${word != null and word != ''}">
      <span class="search-info">
        <i class="fas fa-search me-1"></i> 
        '[[${word}]]' 검색 결과 <b style="color: #ff6b81;">[[${search_count}]]</b> 건을 찾았어요!
      </span>
    </div>

    <!-- 등록 폼 (토글 섹션) -->
    <div class="form-wrapper" id="insertDropdown">
      <form name="frm" th:object="${categoryVO}" method="post" action="/category/create" class="cute-form">
        
        <div style="text-align: center; margin-bottom: 25px;">
          <h5 style="color: #ff6b81; font-weight: 800;">데이터를 추가해 볼까요?</h5>
          <p style="font-size: 13px; color: #999;">새로운 카테고리 정보를 입력해 주세요.</p>
        </div>

        <div class="form-group">
          <label class="form-label">내부 코드</label>
          <input type="text" th:field="*{cat_code}" placeholder="예: DOG_MAP, SHOP_01" class="cute-input">
          <div th:if="${#fields.hasErrors('cat_code')}" th:errors="*{cat_code}" class="msg-error-cute"></div>
        </div>

        <div class="form-group">
          <label class="form-label">표시 이름</label>
          <input type="text" th:field="*{cat_name}" placeholder="화면에 보여질 이름" class="cute-input">
          <div th:if="${#fields.hasErrors('cat_name')}" th:errors="*{cat_name}" class="msg-error-cute"></div>
        </div>

        <div class="form-group">
          <label class="form-label">처리 유형</label>
          <select th:field="*{cat_type}" class="cute-input">
            <option value="">-- 유형 선택 --</option>
            <option value="INFO">정보(INFO)</option>
            <option value="BOARD">게시판(BOARD)</option>
            <option value="SHOP">쇼핑몰(SHOP)</option>
            <option value="PAGE">페이지(PAGE)</option>
            <option value="MAP">지도(MAP)</option>
            <option value="USER">회원관리(USER)</option>
          </select>
          <div th:if="${#fields.hasErrors('cat_type')}" th:errors="*{cat_type}" class="msg-error-cute"></div>
        </div>

        <div class="form-group">
          <label class="form-label">출력 순서</label>
          <input type="number" th:field="*{seqno}" placeholder="순서 (숫자)" class="cute-input">
          <div th:if="${#fields.hasErrors('seqno')}" th:errors="*{seqno}" class="msg-error-cute"></div>
        </div>

        <div class="btn-paws-group mt-3">
          <button type="submit" class="btn-paws btn-paws-main" style="flex: 2;">등록</button>
          <button type="button" class="btn-paws btn-paws-sub" style="flex: 1;" onclick="toggleFormVisibility()">닫기</button>
        </div>
      </form>
    </div>

    <!-- 테이블 리스트 컴포넌트 -->
    <div class="table-wrapper">
      <div th:replace="~{category/list_all_component::list_all_fragment}"></div>
    </div>

  </div>

</div>
</body>
</html>
