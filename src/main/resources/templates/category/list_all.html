<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:th="http://www.thymeleaf.org">
<div layout:fragment="content" class="container">
  <style>
    /* 상단 타이틀 및 메뉴 라인 */
    .paws-admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 15px 20px;
      background-color: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(255, 182, 193, 0.1);
      margin-bottom: 20px;
      margin-top: 20px;
    }

    .line_text {
      font-size: 18px;
      font-weight: 700;
      color: #333;
      text-decoration: none;
      transition: 0.2s;
    }

    .line_text:hover {
      color: #ff6b81;
    }

    /* 등록 폼 감싸는 영역 */
    .form-wrapper {
      display: none; /* 기본 숨김 (JS로 제어) */
      justify-content: center;
      align-items: center;
      width: 100%;
      margin: 20px 0;
      animation: fadeInDown 0.4s ease-out;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 등록 폼 스타일 (귀엽고 깔끔하게) */
    .small-form {
      width: 100%;
      max-width: 450px;
      background: linear-gradient(135deg, #ffffff, #fffafa);
      padding: 30px;
      border: 1.5px solid #ffebee;
      border-radius: 25px;
      box-shadow: 0 10px 30px rgba(255, 182, 193, 0.2);
    }

    .form-group {
      margin-bottom: 15px;
      width: 100%;
    }

    .form-group label {
      font-size: 13px;
      font-weight: 700;
      color: #ff9a9e;
      margin-left: 10px;
      margin-bottom: 5px;
      display: block;
    }

    .form-control.small {
      border-radius: 15px;
      border: 1px solid #eee;
      padding: 10px 15px;
      font-size: 14px;
      transition: all 0.3s;
    }

    .form-control.small:focus {
      border-color: #ff9a9e;
      box-shadow: 0 0 0 4px rgba(255, 154, 158, 0.1);
      outline: none;
    }

    /* 버튼 스타일 */
    .login_btn {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      width: 100%;
    }

    .registration-button {
      flex: 1;
      padding: 10px;
      border-radius: 15px;
      font-weight: bold;
      font-size: 14px;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-submit {
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: white;
    }

    .btn-cancel {
      background: #f1f2f6;
      color: #57606f;
    }

    .registration-button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    /* 등록 버튼 아이콘 애니메이션 */
    .registration-toggle {
      background: none;
      border: none;
      cursor: pointer;
      padding: 5px;
      transition: 0.3s;
    }

    .registration-toggle:hover {
      transform: rotate(90deg);
    }

    .top_icon {
      width: 35px;
      height: 35px;
    }

    .table-wrapper {
      width: 100%;
      margin-top: 20px;
    }
  </style>

  <script th:inline="javascript">
    function toggleFormVisibility() {
      const form = document.getElementById("insertDropdown");
      if (form.style.display === "none" || form.style.display === "") {
        form.style.display = "flex";
      } else {
        form.style.display = "none";
      }
    }
    
    // 페이지 로드 시 등록 폼 숨김
    document.addEventListener("DOMContentLoaded", function() {
      document.getElementById("insertDropdown").style.display = "none";
    });
  </script>

  <!-- 상단 메뉴 라인 -->
  <div class="paws-admin-header" th:if="${session.grade=='admin'}">
    <div>
      <button class="registration-toggle" type="button" onclick="toggleFormVisibility()" title="정보 등록">
        <img src="/ded/animation/menu.gif" class="top_icon">
      </button>
      <a href="javascript: location.reload();" class="line_text ms-2">전체 목록</a>
      <span th:if="${word != null and word != ''}" 
            th:text="| - ${word}(${no} 건)|" 
            style="color: #ff6b81; font-weight: bold;"></span>
    </div>
    
    <div style="color: #ff9a9e; font-size: 14px; font-weight: bold;">
      <i class="fas fa-cog fa-spin"></i> Paws 관리자 모드
    </div>
  </div>

  <!-- 등록 폼 (토글) -->
  <div class="form-wrapper" id="insertDropdown">
    <form name="frm" th:object="${dedVO}" method="post" action="/ded/create" class="small-form">
      <h5 style="text-align: center; color: #ff6b81; font-weight: 800; margin-bottom: 20px;">
        <i class="fas fa-plus-circle me-1"></i> 새 데이터 등록
      </h5>
      
      <!-- 분류 입력 -->
      <div class="form-group">
        <label>대분류</label>
        <input type="text" th:field="*{dedsize}" placeholder="예: 소형견, 사료 등" class="form-control small">
        <div th:if="${#fields.hasErrors('dedsize')}" class="text-danger small mt-1" th:errors="*{dedsize}"></div>
      </div>

      <!-- 이름 입력 -->
      <div class="form-group">
        <label>항목 이름</label>
        <input type="text" th:field="*{dedname}" placeholder="데이터 이름을 입력하세요." class="form-control small">
        <div th:if="${#fields.hasErrors('dedname')}" class="text-danger small mt-1" th:errors="*{dedname}"></div>
      </div>

      <!-- 출력 순서 입력 -->
      <div class="form-group">
        <label>출력 순서</label>
        <input type="number" th:field="*{seqno}" required class="form-control small" placeholder="순서 (숫자)">
        <div th:if="${#fields.hasErrors('seqno')}" class="text-danger small mt-1" th:errors="*{seqno}"></div>
      </div>

      <div class="login_btn">
        <button type="submit" class="registration-button btn-submit">등록하기</button>
        <button type="button" class="registration-button btn-cancel" onclick="toggleFormVisibility()">닫기</button>
      </div>
    </form>
  </div>

  <!-- 구분선 대신 여백 처리 -->
  <div style="margin-bottom: 30px;"></div>

  <div class="table-wrapper">
    <!-- 리스트 컴포넌트 호출 -->
    <div th:replace="~{ded/list_all_component::list_all_fragment}"></div>
  </div>
</div>
</html>
