<!DOCTYPE html>
<html layout:decorate="~{layout}">
<head>
<style>
/* ===============================
   전체 배경 & 레이아웃
================================ */
body {
  background: linear-gradient(135deg, #fcefee, #f8f9fa);
  margin: 0;
}

.wrapper {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

.content-box {
  width: 95%;
  max-width: 90%;
  margin: 40px auto 100px auto;
}

/* ===============================
   상단 제목 카드 (높이 최소화 및 가로 배치)
================================ */
.info-card {
  background: #fff;
  border-radius: 22px;
  padding: 8px 25px; /* 패딩을 더 줄여서 높이 감소 */
  box-shadow: 0 10px 25px rgba(255, 191, 223, 0.4);
  margin-bottom: 20px;
  min-height: 60px; /* 높이를 더 슬림하게 조절 */
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* 제목과 서브문구를 한 줄로 묶는 컨테이너 */
.title-section {
  display: flex;
  align-items: center;
  gap: 15px; /* 제목과 문구 사이 간격 */
}

.title_line {
  font-size: 19px;
  font-weight: 800;
  color: #ff6b81;
  white-space: nowrap;
}

.sub-title {
  font-size: 13px;
  color: #888;
  margin: 0;
  display: flex;
  align-items: center;
  gap: 5px;
}

/* ===============================
   커뮤니티 스타일 핑크 공통 버튼 & 검색바
================================ */
.search-box-pink { 
  display: flex; 
  position: relative; 
  width: 240px; 
  flex-shrink: 0; 
}

.search-input-pink {
  width: 100%;
  padding: 6px 15px;
  padding-right: 55px;
  border: 1.5px solid #ffeff1;
  border-radius: 25px;
  outline: none;
  font-size: 0.75rem;
  transition: all 0.3s ease;
}

.search-input-pink:focus {
  border-color: #ffb6c1;
}

.search-btn-pink, .admin-btn-pink {
  padding: 4px 12px;
  background: #ffb6c1;
  color: white !important;
  border: none;
  border-radius: 18px;
  cursor: pointer;
  font-size: 0.7rem;
  font-weight: 600;
  text-decoration: none !important;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}

.search-btn-pink {
  position: absolute;
  right: 4px; top: 3.5px; bottom: 3.5px;
}

.search-btn-pink:hover, .admin-btn-pink:hover {
  background: #ff8e99;
}

/* ===============================
   카드 그리드 & 디자인
================================ */
.grid-container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 15px; /* 6개 배치에 맞춰 간격 최적화 */
}

.breed-card {
  background: #fff;
  border-radius: 16px; /* 크기에 맞춰 라운드 소폭 축소 */
  padding: 12px;       /* 내부 여백을 줄여 카드 너비 확보 */
  box-shadow: 0 6px 15px rgba(0,0,0,0.04);
  cursor: pointer;
  transition: all 0.3s ease;
}

.breed-card:hover {
  transform: translateY(-6px);
}

.image-box {
  width: 100%;
  height: 140px; /* 6개 배치 비율에 맞게 높이를 줄여 정사각형에 가깝게 유지 */
  border-radius: 12px;
  overflow: hidden;
  background: #fff5f7;
  margin-bottom: 8px;
}

.image-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.info-box h3 {
  font-size: 15px; /* 폰트 크기 최적화 */
  font-weight: 700;
  color: #444;
  margin-bottom: 4px;
}

.badge-custom {
  display: inline-block;
  background: #fff0f2;
  color: #ff6b81;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  margin-bottom: 4px;
}

@media screen and (max-width: 768px) {
  .content-box {
    margin: 30px auto 60px auto; /* 모바일에서 위아래 여백을 줄여 전체적인 답답함 해소 */
  }

  .info-card { 
    flex-direction: column; 
    padding: 10px 15px; /* 상하 패딩을 더 줄여서 높이 감소 */
    gap: 8px;           /* 내부 요소 간격 축소 */
    min-height: auto;   /* 고정 최소 높이 해제 */
  }

  .title-section {
    flex-direction: row; /* 세로 정렬 대신 가로 정렬 유지 */
    flex-wrap: wrap;     /* 화면이 극단적으로 작아질 때를 대비하되 기본은 한 줄 */
    justify-content: center;
    align-items: center;
    gap: 8px;            /* 타이틀과 서브 문구 사이 간격 축소 */
    width: 100%;
  }

  .title_line {
    font-size: 16px;     /* 모바일 화면에 맞게 폰트 크기 살짝 축소 */
  }

  .sub-title {
    font-size: 11px;     /* 서브 문구 폰트 크기도 함께 축소하여 한 줄 유지 유도 */
    
  }

  .search-box-pink { 
    width: 100%;        /* 검색창은 모바일에서 가로로 꽉 차게 유지 */
  }
  /* ⭐️ 하단 컨텐츠: 모바일에서 무조건 한 줄에 2개씩 배치 */
  .grid-container {
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px; /* 카드 사이 간격 */
  }

  /* 모바일용 이미지 박스 및 카드 슬림화 */
  .breed-card {
    padding: 10px;
    border-radius: 14px;
  }

  .image-box {
    height: 115px; /* 모바일 비율에 맞춰 이미지 높이 축소 */
    border-radius: 10px;
    margin-bottom: 6px;
  }
  
  .image-box img[src*="no_image"] {
    padding: 25px !important; /* 이미지 없을 때 여백도 컴팩트하게 조절 */
  }

  .info-box h3 {
    font-size: 14px;
    margin-bottom: 2px;
  }

  .badge-custom {
    font-size: 10px;
    padding: 2px 8px;
    margin-bottom: 0;
  }
}
</style>
</head>

<body>
<div layout:fragment="content">

<div class="wrapper">
  <div class="content-box">
    
    <div class="info-card">
      <div class="title-section">
        
          🐾<span style="color: #ff6b81;" th:text="${categoryVO?.cat_name}">강아지 사전</span> List
        
        
      </div>
<p class="sub-title">🐾 다양한 견종 정보를 확인해보세요 🐶</p>
      <div style="display: flex; align-items: center; gap: 8px;">
        <form th:action="@{/breed/list_by_cat_no}" method="get" class="search-box-pink">
          <input type="hidden" name="cat_no" th:value="${categoryVO?.cat_no}">
          <input type="text" name="word" th:value="${word}" placeholder="견종 검색" class="search-input-pink">
          <button type="submit" class="search-btn-pink">검색</button>
        </form>

        <a th:if="${session.grade == 'admin'}"
           th:href="@{|/breed/create?cat_no=${categoryVO.cat_no}|}"
           class="admin-btn-pink">
          등록
        </a>
      </div>
    </div>

    <div class="grid-container">
      <div class="breed-card"
           th:each="breedVO : ${list}"
           th:onclick="|location.href='/breed/read?breedno=${breedVO.breedno}'|">

        <div class="image-box">
          <img th:if="${breedVO.mainImg != null}" th:src="@{|/breed/storage/${breedVO.mainImg.saved_name}|}">
          <img th:if="${breedVO.mainImg == null}" src="/images/no_image.png" style="opacity:0.3; padding: 40px;">
        </div>

        <div class="info-box">
          <h3 th:text="${breedVO.breed_name}">견종명</h3>
          <span class="badge-custom" th:text="${breedVO.size_type}">중형견</span>
        </div>
      </div>
    </div>

    <div th:if="${list == null or list.size() == 0}" style="text-align: center; padding: 60px; color: #bbb;">
      등록된 정보가 없습니다. 🐾
    </div>

  </div>
</div>

</div>
</body>
</html>
