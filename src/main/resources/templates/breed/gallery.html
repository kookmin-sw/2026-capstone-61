<!DOCTYPE html>
<html layout:decorate="~{layout}">
<head>
<style>
  .gallery-wrapper { margin: 70px auto 100px auto; margin-bottom: 80px; }
  
  .gallery-header { 
    margin-bottom: 40px; 
  }

  /* 제목과 (검색창+문구) 섹션을 양 끝으로 정렬 */
  .header-top-line {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 20px;
    margin-bottom: 15px;
  }

  .gallery-header h2 { 
    color: #ff6b81; 
    font-weight: 700; 
    font-size: 32px; 
    margin: 0;
  }

  /* 검색바와 그 밑의 문구를 감싸는 컨테이너 */
  .search-section {
    display: flex;
    flex-direction: column;
    align-items: flex-end; /* 오른쪽 정렬 */
    gap: 8px;
  }
  
  /* ============================================================
     커뮤니티 검색바 스타일 완벽 이식
     ============================================================ */
  .search-box-pink { 
    display: flex; 
    position: relative; 
    width: 280px;  /* 커뮤니티와 비슷하게 살짝 줄임 */
    flex-shrink: 0; 
  }

  .search-input-pink {
    width: 100%;
    /* 커뮤니티와 동일한 패딩과 스타일 */
    padding: 7px 15px; 
    padding-right: 60px; /* 버튼 공간 확보 */
    border: 1.5px solid #ffeff1;
    border-radius: 25px;
    outline: none;
    font-size: 0.75rem; /* 커뮤니티와 동일 */
    background-color: #ffffff;
    transition: all 0.3s ease;
  }

  .search-input-pink:focus {
    border-color: #ffb6c1;
  }

  /* 커뮤니티와 완벽하게 동일한 텍스트형 버튼 */
  .search-btn-pink {
    position: absolute;
    /* 커뮤니티 위치값 설정 */
    right: 4px; 
    top: 3.5px; 
    bottom: 3.5px;
    padding: 0 12px;
    background: #ffb6c1;
    color: white;
    border: none;
    border-radius: 18px; /* 둥근 사각형 */
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem; /* 작은 폰트 */
    font-weight: 600;
    transition: background 0.2s;
    z-index: 5; /* 검색창 버튼이 확실히 눌리도록 레이어 순서 지정 */
  }

  .search-btn-pink:hover {
    background: #ff8e99;
  }

  /* 검색 결과 문구 스타일 */
  .search-result-text {
    font-size: 0.8rem;
    margin: 0;
    padding-right: 8px;
    color: #888;
  }

  /* 갤러리 그리드 설정 */
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 15px; /* 6개 배치에 맞춰 간격 최적화 */
  }

  /* [수정] 카드 전체가 block 링크처럼 동작하도록 하고 위치 기준점 설정 */
  .gallery-card {
    background: #fff;
    border-radius: 16px; 
    padding: 12px;       
    box-shadow: 0 6px 15px rgba(0,0,0,0.04);
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .gallery-card a {
    display: block;
    text-decoration: none;
    color: inherit;
    position: relative; /* 오버레이가 카드가 아닌 이미지 영역 내에 돌도록 변경 가능 */
  }

  .gallery-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 15px 30px rgba(255, 107, 129, 0.2);
  }

  /* [수정] 이미지 랩 영역에 relative를 주어 오버레이가 이미지만 덮도록 제한 */
  .gallery-img-wrapper {
    position: relative;
    width: 100%;
    height: 140px;
    border-radius: 12px;
    overflow: hidden;
    background: #fff5f7;
    margin-bottom: 8px;
  }

  .gallery-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s ease;
  }

  .gallery-card:hover .gallery-img { 
    transform: scale(1.1); 
  }

  /* [수정] pointer-events 처리로 터치/클릭 방해 전면 차단 */
  .gallery-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 15px;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none; /* 🔥 핵심: 마우스/터치 이벤트를 통과시켜 아래의 <a> 링크가 클릭되게 함 */
  }

  .gallery-card:hover .gallery-overlay { 
    opacity: 1; 
  }
  
  .breed-title { 
    color: white; 
    font-size: 14px; 
    font-weight: bold; 
    text-align: center;
  }

  @media screen and (max-width: 768px) {
    .header-top-line { justify-content: center; text-align: center; }
    .search-section { align-items: center; width: 100%; }
    .search-box-pink { width: 100%; }
    .search-result-text { padding-right: 0; }
  }
</style>
</head>

<body>
<div layout:fragment="content" class="container gallery-wrapper">
  
  <div class="gallery-header">
    <div class="header-top-line">
      <h2>🐾 Paws 갤러리</h2>
      
      <div class="search-section">
        <!-- 폼 태그 정상 동작 확인 -->
        <form th:action="@{/breed/gallery}" method="get" class="search-box-pink">
          <input type="text" name="word" th:value="${word}" placeholder="찾으시는 견종이 있나요?" class="search-input-pink">
          <button type="submit" class="search-btn-pink">검색</button>
        </form>

        <p class="search-result-text" th:if="${word == null or word == ''}">
          전 세계의 다양한 견종들을 만나보세요.
        </p>
        <p class="search-result-text" th:if="${word != null and word != ''}">
          <span th:text="'\'' + ${word} + '\''" style="color: #ff6b81; font-weight: bold;"></span> 검색 결과입니다.
        </p>
      </div>
    </div>
  </div>

  <div class="gallery-grid">
    <div th:each="imgVO : ${list}" class="gallery-card">
      <a th:href="@{|/breed/read?breedno=${imgVO.breedno}|}">
        <!-- [구조 보완] 마우스 호버 효과와 오버레이 안정화를 위한 랩핑 클래스 적용 -->
        <div class="gallery-img-wrapper">
          <img th:src="@{|/breed/storage/${imgVO.saved_name}|}" class="gallery-img">
          <div class="gallery-overlay">
            <div class="breed-title" th:text="${imgVO.breed_name}">견종 이름</div>
          </div>
        </div>
      </a>
    </div>
  </div>
  
  <div th:if="${list.size() == 0}" class="text-center py-5">
    <p style="color: #ccc; font-size: 1.1rem;">등록된 이미지가 없습니다. 🐾</p>
  </div>

</div>
</body>
</html>
