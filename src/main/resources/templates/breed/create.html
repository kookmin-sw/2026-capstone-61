<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:th="http://www.thymeleaf.org">
<head>
<style>
  body { font-family: 'Pretendard', 'Arial', sans-serif; background: linear-gradient(135deg, #fcefee, #f8f9fa); }
  .wrapper { display: flex; justify-content: center; margin-top: 60px; margin-bottom: 60px; }
  .card-box { width: 95%; max-width: 680px; background: #fff; padding: 40px; border-radius: 22px; box-shadow: 0 14px 30px rgba(0,0,0,0.12); }
  .header-box { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
  .title { font-size: 27px; font-weight: 700; color: #ff6b81; text-align: center; }
  .menu-group { display: flex; gap: 10px; margin-top: 12px; }
  .select-box { padding: 6px 14px; border-radius: 20px; font-size: 13px; color: white; text-decoration: none; background: linear-gradient(135deg, #ff9a9e, #fad0c4); transition: 0.2s; }
  .select-box:hover { transform: scale(1.05); background: linear-gradient(135deg, #ff758c, #ff7eb3); }
  .form-control { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; font-size: 15px; margin-bottom: 15px; }
  .form-control:focus { border-color: #ff7eb3; outline: none; box-shadow: 0 0 0 3px rgba(255,126,179,0.2); }
  .item-label { font-weight: bold; display: block; margin-bottom: 5px; color: #555; font-size: 14px; }
  .btn-box { display: flex; justify-content: center; gap: 12px; margin-top: 15px; }
  .manage-btn { padding: 10px 22px; border-radius: 20px; font-size: 14px; color: white; border: none; background: linear-gradient(135deg, #ff9a9e, #fad0c4); cursor: pointer; transition: 0.3s; }
  .manage-btn:hover { opacity: 0.8; transform: translateY(-2px); }
  
  /* 상세 설명 칸 */
  #content {
    white-space: pre-wrap;
    word-break: break-all;
    line-height: 1.8;
    min-height: 400px;
  }
  .ai-btn { background: #333 !important; color: #fff !important; font-weight: bold; margin-bottom: 15px; }

  /* 모달 커스텀 스타일 */
  .modal-content { border-radius: 25px; border: none; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
  .modal-btn { background: #ff6b81; color: white; border-radius: 12px; padding: 10px; border: none; font-weight: bold; width: 100%; }
</style>

<script th:inline="javascript">
  let alertModal;

  document.addEventListener("DOMContentLoaded", function() {
      // 부트스트랩 모달 인스턴스 생성
      alertModal = new bootstrap.Modal(document.getElementById('alertModal'));
  });

  /**
   * 커스텀 알림 모달 표시 함수
   * @param title 제목
   * @param message 내용 (HTML 가능)
   * @param icon 아이콘 (이모지)
   */
  function showAlert(title, message, icon = '🐾') {
      document.getElementById('modalTitle').innerText = title;
      document.getElementById('modalMessage').innerHTML = message;
      document.getElementById('modalIcon').innerText = icon;
      alertModal.show();
  }

  function generateAI() {
      const breedName = document.getElementById('breed_name').value;
      
      if (!breedName) { 
          showAlert('입력 확인', '견종 이름을 먼저 입력해주세요!', '🐶');
          return; 
      }

      const btn = event.target;
      const originalText = btn.innerText;
      btn.innerText = "작성 중...";
      btn.disabled = true;

      fetch(`/breed/ai_draft?breed_name=${encodeURIComponent(breedName)}`)
          .then(res => res.text())
          .then(text => {
              try {
                  const data = JSON.parse(text);
                  
                  document.getElementById('title').value = data.title || (breedName + "의 정보");
                  document.getElementById('content').value = data.content;
                  document.getElementsByName('origin')[0].value = data.origin || "-";
                  document.getElementsByName('kg')[0].value = data.kg || "-";
                  document.getElementsByName('height')[0].value = data.height || "-";
                  
                  if(data.size_type) {
                      const sizeSelect = document.getElementsByName('size_type')[0];
                      if (data.size_type.includes("소형")) sizeSelect.value = "소형견";
                      else if (data.size_type.includes("대형")) sizeSelect.value = "대형견";
                      else sizeSelect.value = "중형견";
                  }
                  showAlert('생성 완료', 'AI가 견종 정보를 모두 정리했습니다!', '✨');
              } catch (e) {
                  document.getElementById('content').value = text;
                  document.getElementById('title').value = breedName + " 정보";
                  showAlert('작성 완료', '초안 생성이 완료되었습니다.', '📝');
              }
              btn.innerText = originalText;
              btn.disabled = false;
          })
          .catch(err => {
              console.error(err);
              showAlert('오류 발생', 'AI 서버와 통신 중 문제가 발생했습니다.', '🌐');
              btn.innerText = originalText;
              btn.disabled = false;
          });
  }
</script>
</head>

<body>
<div layout:fragment="content">
  <div class="wrapper">
    <div class="card-box">

      <div class="header-box">
        <div class="title">
          <span th:text="${categoryVO?.cat_name}">카테고리</span> 등록
        </div>
        <div class="menu-group">
          <a th:href="@{|/breed/list_by_cat_no?cat_no=${categoryVO.cat_no}|}" class="select-box">목록</a>
        </div>
      </div>

      <form name='frm' method='post' th:object="${breedVO}" action='/breed/create' enctype="multipart/form-data">
        <input type="hidden" name="cat_no" th:value="${categoryVO.cat_no}">

        <label class="item-label">🐾 견종 이름</label>
        <div style="display: flex; gap: 10px;">
          <input type='text' name='breed_name' id="breed_name" placeholder="예: 골든 리트리버" required class="form-control">
          <button type="button" onclick="generateAI()" class="manage-btn ai-btn" style="white-space: nowrap;">AI 초안생성</button>
        </div>

        <label class="item-label">📄 콘텐츠 제목</label>
        <input type='text' name='title' id="title" placeholder="목록에 표시될 제목" required class="form-control">

        <label class="item-label">📝 상세 설명 (AI가 분석한 양육/건강 가이드)</label>
        <textarea name='content' id="content" rows="15" required class="form-control" 
          placeholder="AI 버튼을 누르면 건강 정보와 키우기 팁까지 쏟아집니다."></textarea>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
          <div>
            <label class="item-label">🌍 원산지</label>
            <input type='text' name='origin' placeholder="예: 영국" class="form-control">
          </div>
          <div>
            <label class="item-label">📏 크기 구분</label>
            <select name="size_type" class="form-control">
              <option value="소형견">소형견</option>
              <option value="중형견" selected>중형견</option>
              <option value="대형견">대형견</option>
            </select>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
          <div>
            <label class="item-label">⚖️ 평균 몸무게</label>
            <input type='text' name='kg' placeholder="예: 25~35kg" class="form-control">
          </div>
          <div>
            <label class="item-label">📏 평균 체고(키)</label>
            <input type='text' name='height' placeholder="예: 50~60cm" class="form-control">
          </div>
        </div>

        <label class="item-label">🖼️ 견종 이미지 (여러 장 선택 가능)</label>
        <input type='file' name='file1MF' class="form-control" multiple accept="image/*">
        
        <div class="btn-box">
          <button type="submit" class="manage-btn">등록</button>
          <button type="button" onclick="history.back();" class="manage-btn" style="background: #6c757d;">취소</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 공통 알림 모달 -->
  <div class="modal fade" id="alertModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width: 380px;">
      <div class="modal-content">
        <div class="modal-body text-center p-5">
          <div id="modalIcon" class="mb-3" style="font-size: 50px;">🐾</div>
          <h5 id="modalTitle" class="fw-bold mb-2">알림</h5>
          <p id="modalMessage" class="text-muted mb-4"></p>
          <button type="button" class="modal-btn" data-bs-dismiss="modal">확인</button>
        </div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
