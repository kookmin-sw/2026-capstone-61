<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
<meta charset="UTF-8">
<title>강아지 정보 수정</title>

<style>
  /* 🐾 수정 폼 컨테이너 */
  .form-wrapper { 
    display: flex; 
    justify-content: center; 
    margin: 130px auto 100px auto; 
    padding: 0 20px; 
  }

  .form-card {
    width: 100%; 
    max-width: 480px; 
    background: white; 
    padding: 35px;
    border-radius: 30px; 
    box-shadow: 0 15px 40px rgba(0,0,0,0.06);
    border: 1.5px solid #fff;
  }

  .form-card h2 { 
    text-align: center; 
    margin-bottom: 25px; 
    color: #222; 
    font-weight: 800;
    font-size: 24px;
  }
  
  .form-card h2 b { color: #ff6b81; }

  /* 🖼️ 현재 이미지 섹션 */
  .current-img-wrapper {
    text-align: center; 
    margin-bottom: 25px; 
    padding: 15px;
    background: #fffafa; 
    border-radius: 20px;
    border: 1px dashed #ffccd5;
  }
  
  .current-img-wrapper img { 
    width: 100px; 
    height: 100px; 
    object-fit: cover; 
    border-radius: 50%; 
    border: 3px solid #fff;
    box-shadow: 0 5px 15px rgba(255, 107, 129, 0.2);
  }

  /* 📝 입력 필드 스타일 */
  .form-group { margin-bottom: 18px; }
  
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    color: #666;
    margin-bottom: 6px;
    margin-left: 5px;
  }

  .form-card input[type="text"], 
  .form-card input[type="number"],
  .form-card input[type="file"] {
    width: 100%; 
    padding: 12px; 
    border-radius: 12px;
    border: 1.5px solid #eee; 
    font-size: 14px; 
    box-sizing: border-box;
    transition: 0.3s;
    background: #fcfcfc;
  }

  .form-card input:focus {
    outline: none;
    border-color: #ff6b81;
    background: #fff;
    box-shadow: 0 0 0 4px rgba(255, 107, 129, 0.1);
  }


  .btn-group {
    display: flex;
    gap: 10px;
    margin-top: 15px;
  }

  .btn-submit {
    flex: 2; 
    padding: 11px; /* 높이 축소 */
    border: none; 
    border-radius: 12px; /* 곡률 살짝 조정 */
    background: linear-gradient(45deg, #ff6b81, #ff9a9e);
    color: white; 
    font-weight: 700; 
    font-size: 14px; /* 폰트 크기 축소 */
    cursor: pointer; 
    transition: 0.3s;
    box-shadow: 0 4px 12px rgba(255, 107, 129, 0.2);
  }

  .btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(255, 107, 129, 0.3);
  }

  .btn-cancel {
    flex: 1; 
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 11px;
    border-radius: 12px;
    background: #f1f3f5;
    color: #495057;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px; /* 폰트 크기 축소 */
    transition: 0.2s;
  }
  
  .btn-cancel:hover {
    background: #e9ecef;
    color: #212529;
  }

  /* 📱 반응형 */
  @media (max-width: 600px) {
    .form-wrapper { margin-top: 100px; }
    .form-card { padding: 25px 20px; }
  }
</style>
</head>

<body>
<div layout:fragment="content">
  <div class="form-wrapper">
    
    <form action="/dog/update.do" method="post" enctype="multipart/form-data" class="form-card">
      <input type="hidden" name="dogno" th:value="${dogVO.dogno}">
      
      <h2>📝 정보 <b>수정</b></h2>

      <!-- 현재 이미지 미리보기 -->
      <div class="current-img-wrapper">
        <img th:src="${(dogVO.file1saved != null and dogVO.file1saved != '')} 
               ? @{|/dog/storage/${dogVO.file1saved}|} 
               : @{/images/none.jpg}" alt="현재 프로필">
        <p style="font-size: 12px; color: #ff8e99; margin-top: 8px; font-weight: 600;">현재 등록된 사진</p>
      </div>

      <!-- 이름 입력 -->
      <div class="form-group">
        <label>강아지 이름</label>
        <input type="text" name="name" th:value="${dogVO.name}" placeholder="이름을 입력해주세요" required>
      </div>

      <!-- 품종 입력 -->
      <div class="form-group">
        <label>품종</label>
        <input type="text" name="breed" th:value="${dogVO.breed}" placeholder="예: 골든 리트리버" required>
      </div>

      <!-- 나이 입력 -->
      <div class="form-group">
        <label>나이 (살)</label>
        <input type="number" name="age" th:value="${dogVO.age}" min="0" max="30" required>
      </div>

      <!-- 파일 업로드 -->
      <div class="form-group">
        <label>새 프로필 사진 <span style="font-weight: normal; color: #bbb;">(선택 사항)</span></label>
        <input type="file" name="file1MF" accept="image/*">
      </div>

      <!-- 버튼 그룹 (콤팩트한 사이즈) -->
      <div class="btn-group">
        <button type="submit" class="btn-submit">저장</button>
        <a th:href="@{|/dog/read.do?dogno=${dogVO.dogno}|}" class="btn-cancel">취소</a>
      </div>
      
    </form>
  </div>
</div>
</body>
</html>
