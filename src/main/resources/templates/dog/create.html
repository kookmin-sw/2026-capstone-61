<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
<meta charset="UTF-8">
<title>새 강아지 등록</title>

<style>

  /* =========================================================
     🐶 전체 레이아웃
  ========================================================= */
  .create-dog-wrapper {
    max-width: 500px;
    margin: 50px auto;
    padding: 0 16px;
  }

  /* =========================================================
     🐶 카드
  ========================================================= */
  .form-card {
    background: white;

    padding: 28px;

    border-radius: 24px;

    box-shadow: 0 8px 30px rgba(0,0,0,0.05);

    border: 1px solid #fff;
  }

  /* =========================================================
     🐶 제목
  ========================================================= */
  .form-card h2 {
    text-align: center;

    font-size: 22px;
    font-weight: 800;

    color: #333;

    margin-bottom: 24px;
  }

  .form-card h2 b {
    color: #ff6b81;
  }

  /* =========================================================
     🐶 폼 그룹
  ========================================================= */
  .form-group {
    margin-bottom: 18px;
  }

  /* =========================================================
     🐶 라벨
  ========================================================= */
  .form-label {
    display: block;

    font-weight: 700;
    color: #555;

    margin-bottom: 6px;

    font-size: 13px;

    padding-left: 4px;
  }

  /* =========================================================
     🐶 입력창
  ========================================================= */
  .form-control {
    width: 100%;

    padding: 11px 14px;

    border: 1.5px solid #eee;
    border-radius: 13px;

    font-size: 13px;

    transition: 0.25s;

    outline: none;

    box-sizing: border-box;
  }

  .form-control:focus {
    border-color: #ffb6c1;

    box-shadow: 0 0 8px rgba(255,182,193,0.18);
  }

  /* =========================================================
     🐶 성별
  ========================================================= */
  .gender-group {
    display: flex;
    gap: 10px;

    margin-top: 4px;
  }

  .gender-label {
    flex: 1;
    cursor: pointer;
  }

  .gender-label input {
    display: none;
  }

  .gender-box {
    display: block;

    text-align: center;

    padding: 10px;

    border: 1.5px solid #eee;
    border-radius: 13px;

    font-size: 13px;
    font-weight: 700;

    color: #888;

    transition: 0.2s;
  }

  .gender-label input:checked + .gender-box {
    border-color: #ff6b81;

    background: #fff0f2;

    color: #ff6b81;
  }

  /* =========================================================
     🐶 이미지 미리보기
  ========================================================= */
  .img-preview-box {
    width: 85px;
    height: 85px;

    border-radius: 14px;

    background: #f8f9fa;

    border: 1px dashed #ddd;

    margin-bottom: 10px;

    display: flex;
    align-items: center;
    justify-content: center;

    overflow: hidden;
  }

  .img-preview-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* =========================================================
     🐶 버튼 그룹
  ========================================================= */
  .btn-group-area {
    display: flex;
    justify-content: center;
    align-items: center;

    gap: 10px;

    margin-top: 24px;
  }

  /* =========================================================
     🐶 등록 버튼
  ========================================================= */
  .submit-btn {
    flex: 1;

    max-width: 130px;

    padding: 10px 12px;

    border: none;
    border-radius: 14px;

    background: linear-gradient(45deg, #ff6b81, #ff9a9e);

    color: white;

    font-size: 13px;
    font-weight: 700;

    cursor: pointer;

    transition: 0.2s;

    box-shadow: 0 4px 12px rgba(255,107,129,0.18);
  }

  .submit-btn:hover {
    transform: translateY(-2px);
  }

  /* =========================================================
     🐶 취소 버튼
  ========================================================= */
  .cancel-btn {
    flex: 1;

    max-width: 130px;

    padding: 10px 12px;

    border-radius: 14px;

    background: #f1f3f5;

    color: #666;

    text-decoration: none;

    text-align: center;

    font-size: 13px;
    font-weight: 700;

    transition: 0.2s;
  }

  .cancel-btn:hover {
    background: #e9ecef;
    color: #333;
  }

  /* =========================================================
     🐶 모달
  ========================================================= */
  .paws-modal-content {
    border-radius: 20px;
    border: none;
  }

  .paws-modal-btn-confirm {
    background: #ff6b81;
    color: #fff;

    border-radius: 12px;

    font-weight: 700;

    border: none;

    padding: 10px;

    font-size: 13px;
  }

  /* =========================================================
     📱 모바일
  ========================================================= */
  @media (max-width: 768px) {

    .create-dog-wrapper {
      margin: 45px auto;
      padding: 0 10px;
    }
.modal-dialog {
    margin: 1rem auto !important;
    width: calc(100% - 24px);
    max-width: 300px;
  }

  .modal-content {
    width: 100%;
  }

  .modal.fade .modal-dialog {
    transform: none !important;
  }

  body.modal-open {
    padding-right: 0 !important;
    overflow-x: hidden;
  }
    .form-card {
      padding: 22px 16px;
      border-radius: 18px;
    }

    .form-card h2 {
      font-size: 18px;
      margin-bottom: 18px;
    }

    .form-label {
      font-size: 12px;
    }

    .form-control {
      padding: 9px 12px;
      font-size: 12px;
      border-radius: 10px;
    }

    .gender-box {
      padding: 8px;
      font-size: 12px;
      border-radius: 10px;
    }

    .img-preview-box {
      width: 70px;
      height: 70px;
    }

    .btn-group-area {
      gap: 8px;
      margin-top: 18px;
    }

    .submit-btn,
    .cancel-btn {

      max-width: 110px;

      padding: 8px 10px;

      font-size: 11px;

      border-radius: 10px;
    }
  }

</style>

<script>

  /* =========================================================
     🐶 이미지 미리보기
  ========================================================= */
  function readURL(input) {

    if (input.files && input.files[0]) {

      const reader = new FileReader();

      reader.onload = function(e) {

        document.getElementById('preview').src =
          e.target.result;

        document.getElementById('preview').style.display =
          'block';

        document.getElementById('preview-icon').style.display =
          'none';
      };

      reader.readAsDataURL(input.files[0]);
    }
  }

  /* =========================================================
     🐶 유효성 검사
  ========================================================= */
  function validateForm(e) {

    const name =
      document.frm.name.value.trim();

    const breed =
      document.frm.breed.value.trim();

    const age =
      document.frm.age.value.trim();

    if (
      name === "" ||
      breed === "" ||
      age === ""
    ) {

      e.preventDefault();

      const modal =
        new bootstrap.Modal(
          document.getElementById('validationModal')
        );

      modal.show();

      return false;
    }

    return true;
  }

</script>

</head>

<body>

<div layout:fragment="content">

  <!-- =====================================================
       🐶 등록 카드
  ====================================================== -->
  <div class="create-dog-wrapper">

    <form name="frm"
          action="/dog/create.do"
          method="post"
          enctype="multipart/form-data"
          class="form-card"
          onsubmit="return validateForm(event)">

      <!-- 제목 -->
      <h2>

        🐶 내 강아지 <b>등록</b>

      </h2>

      <!-- 이름 -->
      <div class="form-group">

        <label class="form-label">
          이름
        </label>

        <input type="text"
               name="name"
               class="form-control"
               placeholder="예: 초코">

      </div>

      <!-- 품종 -->
      <div class="form-group">

        <label class="form-label">
          품종
        </label>

        <input type="text"
               name="breed"
               class="form-control"
               placeholder="예: 말티즈">

      </div>

      <!-- 나이 -->
      <div class="form-group">

        <label class="form-label">
          나이
        </label>

        <input type="number"
               name="age"
               class="form-control"
               placeholder="살"
               min="0">

      </div>

      <!-- 성별 -->
      <div class="form-group">

        <label class="form-label">
          성별
        </label>

        <div class="gender-group">

          <!-- 수컷 -->
          <label class="gender-label">

            <input type="radio"
                   name="gender"
                   value="M"
                   checked>

            <span class="gender-box">
              수컷 ♂
            </span>

          </label>

          <!-- 암컷 -->
          <label class="gender-label">

            <input type="radio"
                   name="gender"
                   value="F">

            <span class="gender-box">
              암컷 ♀
            </span>

          </label>

        </div>

      </div>

      <!-- 사진 -->
      <div class="form-group">

        <label class="form-label">
          프로필 사진 📷
        </label>

        <!-- 미리보기 -->
        <div class="img-preview-box">

          <div id="preview-icon"
               style="color:#ccc; font-size:20px;">

            📸

          </div>

          <img id="preview"
               src="#"
               style="display:none;">

        </div>

        <!-- 파일 -->
        <input type="file"
               name="file1MF"
               class="form-control"
               accept="image/*"
               onchange="readURL(this);">

        <p style="
            font-size:11px;
            color:#999;
            margin-top:6px;
        ">

          * 우리 아이의 예쁜 사진을 등록해 주세요

        </p>

      </div>

      <!-- 버튼 -->
      <div class="btn-group-area">

        <!-- 등록 -->
        <button type="submit"
                class="submit-btn">

          등록

        </button>

        <!-- 취소 -->
        <a th:href="@{/dog/list.do}"
           class="cancel-btn">

          취소

        </a>

      </div>

    </form>

  </div>

  <!-- =====================================================
       🐶 필수값 모달
  ====================================================== -->
  <div class="modal fade"
       id="validationModal"
       tabindex="-1"
       aria-hidden="true">

    <div class="modal-dialog modal-dialog-centered"
         style="max-width:300px;">

      <div class="modal-content paws-modal-content">

        <div class="modal-body text-center p-4">

          <div class="mb-3"
               style="font-size:34px;">

            ⚠️

          </div>

          <h5 class="fw-bold"
              style="font-size:16px;">

            정보를 입력해주세요!

          </h5>

          <p class="text-muted small">

            이름, 품종, 나이는<br>
            꼭 필요한 정보예요 🐶

          </p>

          <button type="button"
                  class="paws-modal-btn-confirm w-100 mt-3"
                  data-bs-dismiss="modal">

            확인

          </button>

        </div>

      </div>

    </div>

  </div>

</div>

</body>
</html>
