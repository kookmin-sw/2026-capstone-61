<!DOCTYPE html>
<html layout:decorate="~{layout}">
<div layout:fragment="content">

<head>
  <meta charset="UTF-8">
  <title>강아지 소식 등록</title>
</head>

<style>
  body {
    background: #f8f9fa;
    font-family: 'Pretendard', sans-serif;
  }

  /* 🔥 카드 컨테이너 */
  .form-container {
    max-width: 700px;
    margin: 70px auto 100px auto;
    background: #fff;
    border-radius: 25px;
    padding: 35px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
  }

  .form-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 25px;
    color: #333;
  }

  /* 🔥 입력 그룹 */
  .form-group {
    margin-bottom: 20px;
  }

  .form-group label {
    display: block;
    font-weight: 600;
    margin-bottom: 6px;
    color: #555;
  }

  /* 🔥 input / select / textarea 통일 */
  .form-control {
    width: 100%;
    padding: 10px 14px;
    border-radius: 12px;
    border: 1.5px solid #ffe3e8;
    background: #fffafb;
    font-size: 14px;
    outline: none;
    transition: all 0.2s;
  }

  .form-control:focus {
    border-color: #ffb6c1;
    box-shadow: 0 0 0 3px rgba(255,182,193,0.15);
  }

  textarea.form-control {
    resize: none;
  }

  /* 🔥 파일 업로드 카드 */
  .upload-box {
    background: #fff7f8;
    border: 1.5px dashed #ffd6dc;
    border-radius: 15px;
    padding: 15px;
  }

  .upload-box input {
    margin-top: 10px;
  }

  .upload-desc {
    font-size: 12px;
    color: #ff8e99;
    margin-top: 5px;
  }

  /* 🔥 버튼 */
  .btn-area {
    text-align: center;
    margin-top: 30px;
  }

  .btn-main {
    padding: 10px 30px;
    border-radius: 20px;
    border: none;
    background: linear-gradient(135deg, #ff9a9e, #ffb6c1);
    color: white;
    font-weight: 600;
    cursor: pointer;
    margin-right: 10px;
    transition: 0.2s;
  }

  .btn-main:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(255,182,193,0.4);
  }

  .btn-sub {
    padding: 10px 30px;
    border-radius: 20px;
    border: none;
    background: #eee;
    color: #666;
    cursor: pointer;
  }

  /* 🔥 모바일 */
  @media (max-width: 768px) {
    .form-container {
      margin: 40px;
      padding: 25px;
    }

    .form-title {
      font-size: 18px;
    }

    .form-control {
      font-size: 13px;
    }
    	.form-control option {
	  font-size: 13px;
	  color: #444;
	  background: white;
	}
	/* 모바일 input 확대 방지 */
input,
textarea,
select {
    font-size: 16px !important;
}
  }
</style>

<div class="form-container">

  <div class="form-title">🐾 새로운 강아지 소식 등록</div>

  <form name="frm"
      th:action="@{/community/create}"method="post" enctype="multipart/form-data" onsubmit="return validateForm();">

    <input type="hidden" name="cat_no" th:value="${cat_no}">

    <div class="form-group">
      <label style="font-size: 15px;">게시판 분류</label>
      <select name="cateno" class="form-control">
        <option value="1">자유 게시판</option>
        <option value="2">정보 공유</option>
        <option value="3">질문/답변</option>
        <option value="4">입양 후기</option>
      </select>
    </div>

    <div class="form-group">
      <label style="font-size: 15px;">제목</label>
      <input type="text" name="title" class="form-control">
    </div>

    <div class="form-group">
      <label style="font-size: 15px;">내용</label>
      <textarea name="content" rows="10" class="form-control"></textarea>
    </div>

    <div class="form-group upload-box">
      <label style="font-size: 15px;">📸 강아지 사진 첨부</label>
      <input style="font-size: 15px;" type="file" name="fnamesMF" multiple accept="image/*">
      <div style="font-size: 15px;" class="upload-desc">
        * 여러 장 선택 가능 (첫 번째 이미지가 썸네일)
      </div>
    </div>

    <div class="form-group">
      <label style="font-size: 15px;">비밀번호</label>
      <input type="password" name="passwd"  
             placeholder="수정/삭제 시 필요합니다." 
             class="form-control">
    </div>

    <div class="btn-area">
      <button style="font-size: 15px;" type="submit" class="btn-main">저장</button>
      <button style="font-size: 15px;" type="button" 
              th:onclick="|location.href='/community/list?cat_no=${cat_no}'|" 
              class="btn-main">취소</button>
    </div>

  </form>

</div>
<script>
document.addEventListener("DOMContentLoaded", function () {

    window.validateForm = function () {

        const title = document.querySelector('input[name="title"]').value.trim();
        const content = document.querySelector('textarea[name="content"]').value.trim();
        const passwd = document.querySelector('input[name="passwd"]').value.trim();

        if (title === '') {
            alert('제목을 입력해주세요.');
            document.querySelector('input[name="title"]').focus();
            return false;
        }

        if (content === '') {
            alert('내용을 입력해주세요.');
            document.querySelector('textarea[name="content"]').focus();
            return false;
        }

        if (passwd === '') {
            alert('비밀번호를 입력해주세요.');
            document.querySelector('input[name="passwd"]').focus();
            return false;
        }

        return true;
    }

});
</script>
</div>

</html>
