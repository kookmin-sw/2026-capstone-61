<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
<meta charset="UTF-8">
<title>게시글 수정</title>

<style>
  /* 🔥 컨텐츠 레이아웃 설정 */
  .update-container {
    max-width: 850px;
    margin: 80px auto 100px auto;
    padding: 40px;
    background: #fff;
    border-radius: 25px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.05);
  }

  .update-header {
    border-bottom: 2px solid #fff5f6;
    padding-bottom: 20px;
    margin-bottom: 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .update-title {
    font-size: 24px;
    font-weight: 800;
    color: #333;
  }

  .update-title b { color: #ff8e99; }

  .form-group { margin-bottom: 25px; }

  .form-label {
    display: block;
    font-weight: 700;
    color: #555;
    margin-bottom: 10px;
    font-size: 15px;
  }

  .form-control {
    width: 100%;
    padding: 12px 15px;
    border: 1.5px solid #eee;
    border-radius: 12px;
    outline: none;
    transition: 0.3s;
    font-size: 15px;
  }

  .form-control:focus {
    border-color: #ffb6c1;
    box-shadow: 0 0 8px rgba(255,182,193,0.2);
  }

  .btn-group {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 40px;
  }

  .btn-action {
    padding: 12px 40px;
    border-radius: 30px;
    font-weight: 700;
    font-size: 15px;
    border: none;
    cursor: pointer;
    transition: 0.3s;
    text-decoration: none;
  }

  .btn-submit { background: #ff8e99; color: white; }
  .btn-cancel { background: #f1f3f5; color: #495057; }

  /* 🔥 커스텀 모달 스타일 및 모바일 강제 중앙 정렬 */
  .paws-modal-dialog {
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    min-height: calc(100% - 3.5rem) !important;
    margin: 0 auto !important;
    padding: 0 20px !important;
    max-width: 100% !important;
  }

  .paws-modal-content {
    width: 320px !important;
    max-width: 100% !important;
    border-radius: 25px !important;
    border: none !important;
    box-shadow: 0 10px 40px rgba(255, 182, 193, 0.2) !important;
    background-color: #fff !important;
  }

  .paws-modal-btn-confirm {
    background: #ff6b81;
    color: #fff;
    border-radius: 15px;
    font-weight: 700;
    border: none;
    padding: 12px;
    width: 100%;
    cursor: pointer;
  }

  .paws-modal-btn-cancel {
    background: #f1f3f5;
    color: #495057;
    border-radius: 15px;
    font-weight: 700;
    border: none;
    padding: 12px;
    width: 100%;
    cursor: pointer;
  }

  @media (max-width: 768px) {
    .update-container { margin: 130px 15px 80px 15px; padding: 25px; }
    .update-title { font-size: 20px; }
    .btn-action { width: 100%; padding: 12px 0; text-align: center; }
  }
</style>

<script th:inline="javascript">
  // 🔥 중복 생성을 막고 안전하게 모달을 띄우는 공통 함수
  function showPawsModal(id) {
    const modalEl = document.getElementById(id);
    if (!modalEl) return;
    
    let modalInstance = bootstrap.Modal.getInstance(modalEl);
    if (!modalInstance) {
      modalInstance = new bootstrap.Modal(modalEl);
    }
    modalInstance.show();
  }

  function validateAndConfirm(e) {
    e.preventDefault(); // 기본 제출 막기
    
    const title = document.frm.title.value.trim();
    const content = document.frm.content.value.trim();
    
    if (title === "" || content === "") {
      showPawsModal('emptyFieldModal');
      return false;
    }
    
    // 수정 확인 모달 띄우기
    showPawsModal('updateConfirmModal');
  }

  function executeSubmit() {
    document.frm.submit();
  }
</script>
</head>

<body>
<div layout:fragment="content">

  <div class="update-container">
    <div class="update-header">
      <div class="update-title">🐾 게시글 <b>수정하기</b></div>
      <a th:href="@{|/community/read?communityno=${communityVO.communityno}|}" style="text-decoration:none; color:#bbb; font-size:13px;">뒤로가기</a>
    </div>

    <form name="frm" method="post" th:action="@{/community/update}" enctype="multipart/form-data" onsubmit="validateAndConfirm(event)">
      <input type="hidden" name="communityno" th:value="${communityVO.communityno}">
      <input type="hidden" name="cat_no" th:value="${communityVO.cat_no}">
      <input type="hidden" name="memberno" th:value="${communityVO.memberno}">

      <div class="form-group">
        <label class="form-label">게시판 분류</label>
        <select name="cateno" class="form-control" required>
          <option value="1" th:selected="${communityVO.cateno == 1}">자유게시판</option>
          <option value="2" th:selected="${communityVO.cateno == 2}">정보게시판</option>
          <option value="3" th:selected="${communityVO.cateno == 3}">질문게시판</option>
          <option value="4" th:selected="${communityVO.cateno == 4}">입양게시판</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">제목</label>
        <input type="text" name="title" th:value="${communityVO.title}" 
               class="form-control" placeholder="제목을 입력해주세요">
      </div>

      <div class="form-group">
        <label class="form-label">내용</label>
        <textarea name="content" class="form-control" rows="10" 
                  placeholder="반려동물과의 소중한 이야기를 들려주세요" 
                  th:text="${communityVO.content}"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">태그 (🏷️)</label>
        <input type="text" name="word" th:value="${communityVO.word}" 
               class="form-control" placeholder="예: #강아지, #산책, #사료추천">
      </div>

      <div class="form-group">
        <label class="form-label">기존 등록된 사진</label>
        <div class="existing-images" style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px;">
          <div th:each="file : ${fileList}" class="thumb-item">
            <img th:src="@{|/community/storage/${file.thumb}|}" 
                 style="width: 100px; height: 100px; object-fit: cover; border-radius: 10px; border: 1px solid #eee;">
          </div>
          <div th:if="${fileList == null or fileList.size() == 0}" style="color:#ccc; font-size:13px;">등록된 사진이 없습니다.</div>
        </div>
      
        <label class="form-label">새로운 사진 추가 (여러 장 가능)</label>
        <p style="color: #ff6b81; font-size: 13px; margin-bottom: 8px;">* 새로 선택한 사진들이 게시글에 추가로 등록됩니다.</p>
        <input type="file" name="fnamesMF" class="form-control" multiple>
      </div>

      <div class="btn-group">
        <button type="submit" class="btn-action btn-submit">완료</button>
        <a th:href="@{|/community/read?communityno=${communityVO.communityno}|}" class="btn-action btn-cancel">취소</a>
      </div>
    </form>
  </div>

  <!-- 🔥 수정 확인 모달 -->
  <div class="modal fade" id="updateConfirmModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog paws-modal-dialog">
      <div class="modal-content paws-modal-content">
        <div class="modal-body text-center p-4">
          <div class="mb-3" style="font-size: 40px;">📝</div>
          <h5 class="fw-bold" style="color:#222;">수정 내용을 저장할까요?</h5>
          <p class="text-muted small">작성하신 내용으로 업데이트됩니다.</p>
          <div class="d-flex flex-column gap-2 mt-4">
            <button type="button" class="paws-modal-btn-confirm" onclick="executeSubmit()">수정하기</button>
            <button type="button" class="paws-modal-btn-cancel" data-bs-dismiss="modal">취소</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 🔥 필수값 미입력 알림 모달 -->
  <div class="modal fade" id="emptyFieldModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog paws-modal-dialog">
      <div class="modal-content paws-modal-content">
        <div class="modal-body text-center p-4">
          <div class="mb-3" style="font-size: 40px;">⚠️</div>
          <h5 class="fw-bold" style="color:#222;">빈칸이 있어요!</h5>
          <p class="text-muted small">제목과 내용을 모두 입력해주세요.</p>
          <button type="button" class="paws-modal-btn-confirm mt-3" data-bs-dismiss="modal">확인</button>
        </div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
