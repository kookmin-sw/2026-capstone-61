<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
<meta charset="UTF-8">
<title th:text="${communityVO.title}">게시글 상세보기</title>

<style>
  /* 🔥 컨텐츠 레이아웃 설정 */
  .read-container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 70px auto 100px auto; 
    padding: 30px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  }

  .read-header {
    border-bottom: 2px solid #fcefee;
    padding-bottom: 20px;
    margin-bottom: 25px;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .tag {
    background: #fff0f2;
    color: #ff6b81;
    padding: 4px 12px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 13px;
  }

  .btn-group {
    display: flex;
    gap: 6px;
  }

  .btn-group a, .btn-group button {
    padding: 6px 14px;
    border-radius: 15px;
    font-size: 12px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    transition: 0.2s;
    text-decoration: none;
  }

  .btn-list { background: #f1f3f5; color: #495057; }
  .btn-edit { background: #ff8e99; color: #fff; }
  .btn-delete { background: #ff6b81; color: #fff; }

  .title-info-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 20px;
  }

  .read-title {
    font-size: 26px;
    font-weight: 800;
    color: #222;
    margin: 0;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .read-info {
    font-size: 14px;
    color: #999;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .read-info b { color: #ff6b81; }

  .stats-group {
    display: flex;
    gap: 10px;
    padding-left: 12px;
    border-left: 1px solid #eee;
  }

  .read-images { margin: 25px 0; }
  .read-img-item {
    margin-bottom: 20px;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
  }
  .read-img-item img { width: 100%; display: block; }

  .read-content {
    line-height: 1.8;
    font-size: 16px;
    color: #333;
    padding: 20px 0;
    white-space: pre-wrap;
    min-height: 200px;
  }

  .extra-info { margin-top: 20px; font-size: 13px; color: #999; }

  /* --- 댓글 섹션 스타일 --- */
  .comments-section {
    margin-top: 50px;
    border-top: 1px solid #eee;
    padding-top: 30px;
  }

  .comment-item {
    padding: 15px 0;
    border-bottom: 1px solid #f8f9fa;
  }

  .comment-input-area textarea {
    width: 100%;
    height: 80px;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 10px;
    resize: none;
    font-size: 14px;
  }

  .btn-comment-submit {
    background: #ff6b81;
    color: #fff;
    border: none;
    padding: 8px 20px;
    border-radius: 20px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
  }

  /* --- 커스텀 모달 스타일 --- */
  .paws-modal-content {
    border-radius: 25px;
    border: none;
    box-shadow: 0 10px 40px rgba(255, 182, 193, 0.2);
  }
  .paws-modal-btn-confirm {
    background: #ff6b81;
    color: #fff;
    border-radius: 15px;
    font-weight: 700;
    border: none;
    padding: 10px;
  }
  .paws-modal-btn-cancel {
    background: #f1f3f5;
    color: #495057;
    border-radius: 15px;
    font-weight: 700;
    border: none;
    padding: 10px;
  }

  @media (max-width: 768px) {
    .read-container { margin: 130px 15px 80px 15px; padding: 20px; }
    .title-info-row { flex-direction: column; align-items: flex-start; gap: 12px; }
    .read-title { font-size: 20px; white-space: normal; width: 100%; }
    .read-info { flex-wrap: wrap; gap: 8px; }
    .stats-group { border-left: none; padding-left: 0; }
  }
</style>

<script th:inline="javascript">
  // 전역 모달 제어 함수
  function showPawsModal(id) {
    const modal = new bootstrap.Modal(document.getElementById(id));
    modal.show();
  }

  // 게시글 삭제 시 모달 띄우기
  function delete_confirm() {
    showPawsModal('deletePostModal');
  }

  function executePostDelete() {
    document.getElementById("deleteFrm").submit();
  }

  // --- 댓글 AJAX 기능 ---
  document.addEventListener("DOMContentLoaded", function() {
    list_by_community();
  });

  // 1. 댓글 목록 조회
  function list_by_community() {
    // 빨간 줄 방지를 위해 주석 처리 방식 사용
    let communityno = /*[[${communityVO.communityno}]]*/ 0;
    let current_memberno = /*[[${session.memberno}]]*/ null; 

    fetch("/comments/list_by_community?communityno=" + communityno)
      .then(response => response.json())
      .then(data => {
        let list = data.res || [];
        
        // 🔥 댓글 무조건 최신순 (배열 뒤집기)
        list.reverse();

        let html = "";
        let rootCount = list.filter(vo => !vo.parent_no || vo.parent_no == 0).length;

        if (list.length > 0) {
          list.forEach(vo => {
            let isReply = vo.parent_no && vo.parent_no > 0;
            let style = isReply ? "margin-left: 40px; border-left: 2px solid #f1f3f5; padding-left: 15px;" : "";
            let prefix = isReply ? "↳ " : "";

            html += `
              <div class="comment-item" id="comment_${vo.comment_no}" style="${style}">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                  <span style="font-weight: 700; color: #333;">${prefix}${vo.nickname}</span>
                  <span style="font-size: 12px; color: #bbb;">${vo.rdate}</span>
                </div>
                <div style="padding: 10px 0; color: #555; font-size: 15px; white-space: pre-wrap;">${vo.content}</div>
                <div style="text-align: right;">
                  ${current_memberno != null && current_memberno == vo.memberno ? 
                    `<button onclick="askDeleteComment(${vo.comment_no})" style="background:none; border:none; color:#ff6b81; font-size:12px; cursor:pointer; font-weight:600;">삭제</button>` 
                    : ''}
                </div>
              </div>`;
          });
        } else {
          html = "<div style='text-align:center; color:#ccc; padding:40px 0;'>작성된 댓글이 없습니다.</div>";
        }

        document.getElementById("comment_list").innerHTML = html;
        document.getElementById("comment_cnt").innerText = rootCount;
        document.getElementById("comment_cnt_top").innerText = rootCount;
      })
      .catch(err => console.error("Fetch Error:", err));
  }

  // 2. 댓글 등록
  function create_comment() {
    let content = document.getElementById("comment_content").value;
    let communityno = /*[[${communityVO.communityno}]]*/ 0;
    
    if (content.trim() == "") {
      showPawsModal('commentEmptyModal');
      document.getElementById("comment_content").focus();
      return;
    }

    let params = {
      communityno: communityno,
      content: content
    };

    fetch("/comments/create", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(params)
    })
    .then(response => response.json())
    .then(data => {
      if (data.res > 0) {
        document.getElementById("comment_content").value = ""; 
        list_by_community(); 
      } else {
        showPawsModal('loginRequiredModal');
      }
    });
  }

  // 3. 댓글 삭제
  let targetCommentNo = null;
  function askDeleteComment(comment_no) {
    targetCommentNo = comment_no;
    showPawsModal('deleteCommentModal');
  }

  function executeCommentDelete() {
    if(!targetCommentNo) return;
    let current_memberno = /*[[${session.memberno}]]*/ null;
    
    let params = {
      comment_no: targetCommentNo,
      memberno: current_memberno
    };

    fetch("/comments/delete", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(params)
    })
    .then(response => response.json())
    .then(data => {
      if (data.res > 0) {
        list_by_community(); 
      } else {
        alert("삭제 중 오류가 발생했습니다.");
      }
    });
  }
</script>
</head>

<body>
<div layout:fragment="content">

  <div class="read-container">
    <div class="read-header">
      <div class="top-bar">
        <span class="tag" th:switch="${communityVO.cateno}">
          <span th:case="1">자유게시판</span>
          <span th:case="2">정보게시판</span>
          <span th:case="3">질문게시판</span>
          <span th:case="4">입양게시판</span>
        </span>

        <div class="btn-group">
          <a th:href="@{|/community/list?cat_no=${communityVO.cat_no}&cateno=${communityVO.cateno}|}" class="btn-list">목록</a>
          <div th:if="${session.memberno == communityVO.memberno or session.grade == 'admin'}" style="display:flex; gap:6px;">
            <a th:href="@{|/community/update?communityno=${communityVO.communityno}|}" class="btn-edit">수정</a>
            <button type="button" class="btn-delete" onclick="delete_confirm()">삭제</button>
          </div>
        </div>
      </div>

      <div class="title-info-row">
        <div class="read-title" th:text="${communityVO.title}">게시글 제목</div>
        <div class="read-info">
          <span>작성자: <b th:text="${communityVO.nickname}">닉네임</b></span>
          <span th:text="${communityVO.rdate.substring(0, 16)}">날짜</span>
          
          <div class="stats-group">
            <span>👁️ <span th:text="${communityVO.viewcnt}">0</span></span>
            <span>❤️ <span th:text="${communityVO.recom}">0</span></span>
            <span>💬 <span id="comment_cnt_top" th:text="${communityVO.replycnt}">0</span></span>
          </div>
        </div>
      </div>
    </div>

    <div class="read-images" th:if="${fileList != null and fileList.size() > 0}">
      <div th:each="attachfileVO : ${fileList}" class="read-img-item">
        <img th:src="@{|/community/storage/${attachfileVO.fupname}|}">
      </div>
    </div>

    <div class="read-content" th:text="${communityVO.content}"></div>

    <div class="extra-info" th:if="${communityVO.word != null and communityVO.word != ''}">
      🏷️ <span th:text="${communityVO.word}">태그</span>
    </div>

    <div class="comments-section">
      <h4 style="margin-bottom: 20px;">댓글 <span id="comment_cnt" style="color: #ff6b81;">0</span></h4>

      <div th:if="${session.memberno != null}" class="comment-input-area">
        <textarea id="comment_content" placeholder="댓글을 입력해주세요."></textarea>
        <div style="text-align: right;">
          <button type="button" class="btn-comment-submit" onclick="create_comment()">등록</button>
        </div>
      </div>

      <div th:unless="${session.memberno != null}" 
           style="background: #f8f9fa; padding: 20px; border-radius: 10px; text-align: center; color: #666; margin-bottom: 20px;">
        댓글을 작성하려면 <a href="/member/login" style="color: #ff6b81; font-weight: bold;">로그인</a>이 필요합니다.
      </div>

      <div id="comment_list"></div>
    </div>

    <form id="deleteFrm" method="post" th:action="@{/community/delete}">
      <input type="hidden" name="communityno" th:value="${communityVO.communityno}">
      <input type="hidden" name="cat_no" th:value="${communityVO.cat_no}">
    </form>
  </div>

<!-- 🔥 게시글 삭제 확인 모달 -->
  <div class="modal fade" id="deletePostModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered d-flex justify-content-center" style="max-width: 100%; margin: 0 auto; padding: 0 20px;">
      <div class="modal-content paws-modal-content" style="width: 320px; max-width: 100%;">
        <div class="modal-body text-center p-4">
          <div class="mb-3" style="font-size: 40px;">😢</div>
          <h5 class="fw-bold">게시글을 삭제할까요?</h5>
          <p class="text-muted small">삭제된 게시글은 복구할 수 없어요.</p>
          <div class="d-flex flex-column gap-2 mt-4">
            <button type="button" class="paws-modal-btn-confirm" onclick="executePostDelete()">삭제하기</button>
            <button type="button" class="paws-modal-btn-cancel" data-bs-dismiss="modal">취소</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 🔥 댓글 내용 없음 알림 모달 -->
  <div class="modal fade" id="commentEmptyModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered d-flex justify-content-center" style="max-width: 100%; margin: 0 auto; padding: 0 20px;">
      <div class="modal-content paws-modal-content" style="width: 320px; max-width: 100%;">
        <div class="modal-body text-center p-4">
          <div class="mb-3" style="font-size: 40px;">🐾</div>
          <h5 class="fw-bold">내용을 입력해주세요!</h5>
          <p class="text-muted small">댕댕이 친구에게 전할 말을 적어주세요.</p>
          <button type="button" class="paws-modal-btn-confirm w-100 mt-3" data-bs-dismiss="modal">확인</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 🔥 댓글 삭제 확인 모달 -->
  <div class="modal fade" id="deleteCommentModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered d-flex justify-content-center" style="max-width: 100%; margin: 0 auto; padding: 0 20px;">
      <div class="modal-content paws-modal-content" style="width: 320px; max-width: 100%;">
        <div class="modal-body text-center p-4">
          <div class="mb-3" style="font-size: 40px;">🦴</div>
          <h5 class="fw-bold">댓글을 삭제하시겠어요?</h5>
          <div class="d-flex flex-column gap-2 mt-4">
            <button type="button" class="paws-modal-btn-confirm" onclick="executeCommentDelete()" data-bs-dismiss="modal">삭제</button>
            <button type="button" class="paws-modal-btn-cancel" data-bs-dismiss="modal">취소</button>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
