<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<div layout:fragment="content">
<style>

    /* =========================================================
       🐶 전체 레이아웃
    ========================================================= */
    .test-wrapper {
        margin-top: 70px;
        margin-bottom: 90px;
        max-width: 760px;
    }

    /* =========================================================
       🐶 상단 탭
    ========================================================= */
    .nav-pills .nav-link {
        border-radius: 40px;
        color: #888;

        padding: 8px 18px;

        font-size: 12px;
        font-weight: 700;

        background: #f8f9fa;

        margin: 0 4px;

        border: 1px solid #eee;

        transition: all 0.25s;
    }

    .nav-pills .nav-link.active {
        background-color: #ff6b81 !important;
        color: white !important;

        transform: scale(1.03);

        box-shadow: 0 5px 12px rgba(255, 107, 129, 0.25);
    }

    /* =========================================================
       🐶 반려견 등록 버튼
    ========================================================= */
    .create-btn {
        display: inline-flex;
        align-items: center;

        padding: 8px 16px;

        background: #fff;

        color: #ff6b81;

        border: 1.5px dashed #ff6b81;
        border-radius: 40px;

        text-decoration: none;

        font-size: 12px;
        font-weight: 700;

        transition: 0.2s;
    }

    .create-btn:hover {
        background: #fff5f6;
        color: #ff4757;
        transform: translateY(-2px);
    }

    /* =========================================================
       🐶 메인 버튼
    ========================================================= */
    .btn-pudding {
        background: #ff6b81;
        color: white;

        border: none;
        border-radius: 40px;

        font-weight: 800;
        font-size: 16px;

        padding: 12px 28px;

        box-shadow: 0 5px 0 #e05263;

        transition: all 0.1s;

        cursor: pointer;
    }

    .btn-pudding:hover {
        transform: translateY(2px);
        box-shadow: 0 3px 0 #e05263;
        color: white;
    }

    .btn-pudding:active {
        transform: translateY(5px);
        box-shadow: 0 0 0 #e05263;
    }

    /* =========================================================
       🐶 강아지 카드
    ========================================================= */
    .dog-card {
        border-radius: 18px !important;

        transition: all 0.25s ease;

        border: 1px solid #eee !important;

        background: #fff;

        overflow: hidden;
    }

    .dog-card:hover {
        transform: translateY(-5px);

        border-color: #ff6b81 !important;

        box-shadow: 0 10px 20px rgba(255,107,129,0.12) !important;
    }

    /* =========================================================
       🐶 강아지 이미지
    ========================================================= */
    .dog-img-container {
        width: 70px;
        height: 70px;

        margin: 0 auto 10px;

        overflow: hidden;

        border-radius: 50%;

        border: 3px solid #fff5f6;

        transition: 0.25s;
    }

    .dog-card:hover .dog-img-container {
        border-color: #ff6b81;
    }

    /* =========================================================
       🐶 검사하기 버튼
    ========================================================= */
    .btn-mini-pudding {
        background: #ffccd5;
        color: #ff6b81;

        border-radius: 14px;

        font-size: 11px;
        font-weight: 700;

        padding: 5px 12px;

        border: none;

        margin-top: 8px;
    }

    /* =========================================================
       🐶 질문 카드
    ========================================================= */
    .q-card {
        border-radius: 22px !important;

        padding: 22px !important;

        border: 2px solid transparent !important;

        box-shadow: 0 5px 18px rgba(0,0,0,0.03) !important;

        margin-bottom: 18px;
    }

    .q-card.unanswered {
        border-color: #ff6b81 !important;
        background-color: #fff5f6;
    }

    /* =========================================================
       🐶 질문 텍스트
    ========================================================= */
    .q-card p {
        font-size: 15px !important;
        line-height: 1.5;
        margin-bottom: 20px !important;
    }

    /* =========================================================
       🐶 척도
    ========================================================= */
    .scale-container {
        display: flex;
        justify-content: space-between;
        align-items: center;

        margin-top: 12px;
    }

    .scale-item {
        text-align: center;
        flex: 1;
    }

    .scale-radio {
        width: 18px;
        height: 18px;

        cursor: pointer;

        accent-color: #ff6b81;
    }

    .scale-label {
        font-size: 10px;

        display: block;

        margin-top: 5px;

        color: #999;

        font-weight: 600;
    }

    .scale-hint {
        display: flex;
        justify-content: space-between;

        font-size: 11px;

        color: #ff6b81;

        font-weight: 700;

        margin-bottom: 8px;

        padding: 0 5px;
    }

    /* =========================================================
       🐶 프로그레스바
    ========================================================= */
    .sticky-progress {
        top: 15px;

        z-index: 1020;

        border-radius: 18px;

        border: 1px solid #ffeef0;
    }

    /* =========================================================
       📱 모바일
    ========================================================= */
    @media (max-width: 768px) {

        .test-wrapper {
            margin-top: 60px;
            margin-bottom: 70px;
        }

        .display-5 {
            font-size: 24px !important;
        }

        .fs-5 {
            font-size: 13px !important;
        }

        .nav-pills .nav-link {
            padding: 6px 14px;
            font-size: 11px;
        }

        .create-btn {
            padding: 6px 12px;
            font-size: 11px;
        }

        /* 🔥 카드 2개 */
        .row-cols-md-3 > * {
            width: 50%;
        }

        .dog-card {
            padding: 12px !important;
            border-radius: 14px !important;
        }

        .dog-img-container {
            width: 55px;
            height: 55px;
            margin-bottom: 8px;
        }

        .dog-card h4 {
            font-size: 13px;
        }

        .dog-card p {
            font-size: 10px;
            margin-bottom: 6px !important;
        }

        .btn-mini-pudding {
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 10px;
        }

        .q-card {
            padding: 16px !important;
            border-radius: 16px !important;
        }

        .q-card p {
            font-size: 12px !important;
            margin-bottom: 14px !important;
        }

        .scale-radio {
            width: 15px;
            height: 15px;
        }

        .scale-label {
            font-size: 8px;
        }

        .scale-hint {
            font-size: 10px;
        }

        .btn-pudding {
            font-size: 13px !important;
            padding: 10px 22px;
            border-radius: 20px;
        }

        .sticky-progress {
            padding: 14px !important;
            border-radius: 14px;
        }

        .sticky-progress .fs-5 {
            font-size: 12px !important;
        }

        .sticky-progress small {
            font-size: 10px;
        }

        .progress {
            height: 10px !important;
        }
    }

</style>

    <div class="container test-wrapper">
        <!-- 헤더 섹션 -->
        <div class="text-center mb-5">
            <h1 class="display-5 fw-bold">🐾 <span style="color: #ff6b81;">DBTI</span> 성향 정밀 검사</h1>
            <p class="text-muted fs-5">아이의 행동을 떠올리며 솔직하게 체크!</p>
        </div>

        <!-- 1단계: 강아지 선택 섹션 -->
        <div id="selection-section">
            <div class="d-flex justify-content-center align-items-center mb-5 gap-3">
                <ul class="nav nav-pills" id="dogTab">
                    <li class="nav-item">
                        <button class="nav-link active fw-bold" id="list-tab" data-bs-toggle="tab" data-bs-target="#list-content" type="button">내 강아지 목록</button>
                    </li>
                </ul>
                <a th:href="@{/dog/create.do}" class="create-btn">
                    반려견 등록
                </a>
            </div>

            <div class="tab-content">
                <div class="tab-pane fade show active" id="list-content">
                    <!-- 강아지 목록이 있을 때 -->
                    <div class="row row-cols-1 row-cols-md-3 g-4" th:if="${dogList != null and not #lists.isEmpty(dogList)}">
                        <div class="col" th:each="dog : ${dogList}">
                            <div class="card h-100 dog-card text-center p-4 shadow-sm"
                                 th:onclick="startTest([[${dog.dogno}]], [[${dog.name}]])" style="cursor:pointer;">
                                <div class="dog-img-container shadow-sm">
                                    <img th:src="${(dog.thumb1 != null and dog.thumb1 != '') ? '/dog/storage/' + dog.thumb1 : '/images/default_dog.png'}" 
                                         class="w-100 h-100" style="object-fit: cover;">
                                </div>
                                <h4 class="fw-bold mb-1" th:text="${dog.name}">이름</h4>
                                <p class="text-muted small mb-2" th:text="${dog.breed}">견종</p>
                                <button class="btn-mini-pudding">검사하기</button>
                            </div>
                        </div>
                    </div>
                    <!-- 목록이 비었을 때 -->
                    <div th:if="${dogList == null or #lists.isEmpty(dogList)}" class="text-center py-5 bg-white rounded-4 border shadow-sm">
                        <p class="text-muted fs-5">등록된 강아지가 없어요.<br>아이 정보를 먼저 등록해 주세요! 🐶</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 2단계: 실제 검사 문항 섹션 -->
        <div id="test-section" style="display: none;">
<!-- 상단 고정 진행 바 -->
<div class="sticky-top bg-white p-4 shadow-sm mb-5 sticky-progress border"
     style="top: 30px;">

    <div class="d-flex justify-content-between align-items-center mb-2">
        <span class="fw-bold fs-5" style="color: #ff6b81;">
            🐶 <span id="selectedDogName"></span> 분석 중...
        </span>

        <small id="progressText" class="fw-bold text-muted">
            0 / 20 완료 (0%)
        </small>
    </div>

    <div class="progress"
         style="height: 16px; border-radius: 10px; background: #ffeef0;">

        <div id="progressBar"
             class="progress-bar progress-bar-striped progress-bar-animated"
             style="width: 0%; background-color: #ff6b81;">
        </div>

    </div>
</div>

            <form name="frm" id="frm" method="post" action="/dog_dbti/create.do">
                <!-- 데이터 전송용 Hidden 필드 -->
                <input type="hidden" name="dogno" id="dogNoHidden">
                <input type="hidden" name="ePer" id="ePer">
                <input type="hidden" name="sPer" id="sPer">
                <input type="hidden" name="aPer" id="aPer">
                <input type="hidden" name="oPer" id="oPer">

                <div id="question-container">
                    <!-- JS로 문항이 렌더링됩니다 -->
                </div>

                <div class="text-center mt-5 py-5">
                    <button type="button" id="submitBtn" onclick="send()" class="btn-pudding fs-4">
                        분석 결과🐾
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script th:inline="javascript">
        const questions = [
            { type: 'E', text: '산책 가자는 말에 현관문까지 번개처럼 달려가나요?' },
            { type: 'E', text: '집안에서도 쉬지 않고 장난감을 물어오며 놀자고 하나요?' },
            { type: 'E', text: '낯선 장소에 가면 겁먹기보다 냄새 맡으며 탐색하기 바쁜가요?' },
            { type: 'E', text: '잠시도 가만히 있지 못하고 주변의 움직임에 즉각 반응하나요?' },
            { type: 'E', text: '다른 강아지를 보면 먼저 다가가서 인사를 건네는 편인가요?' },
            { type: 'S', text: '가족이 아닌 낯선 사람이 만져도 꼬리를 흔들며 좋아하나요?' },
            { type: 'S', text: '초인종 소리나 밖에서 나는 소리에 예민하게 짖지 않는 편인가요?' },
            { type: 'S', text: '애견 카페 등 친구들이 많은 곳에서 금방 적응하고 노나요?' },
            { type: 'S', text: '혼자 집에 있어도 사고를 치지 않고 평온하게 기다리나요?' },
            { type: 'S', text: '병원이나 미용실에서도 공격성 없이 얌전하게 있나요?' },
            { type: 'A', text: '쉴 때 항상 주인 몸 어딘가에 밀착해서 있으려 하나요?' },
            { type: 'A', text: '주인의 감정(슬픔, 기쁨)을 예민하게 포착하고 다가오나요?' },
            { type: 'A', text: '외출 후 돌아오면 세상이 떠나가라 격하게 반겨주나요?' },
            { type: 'A', text: '잠을 잘 때 주인의 침대나 바로 옆자리에서 자려 하나요?' },
            { type: 'A', text: '혼내거나 무관심하면 금방 풀 죽어하며 애교를 부리나요?' },
            { type: 'O', text: '간식을 앞에 두고 "기다려"를 10초 이상 완벽히 수행하나요?' },
            { type: 'O', text: '멀리서 이름을 불렀을 때 하던 일을 멈추고 즉시 달려오나요?' },
            { type: 'O', text: '새로운 개인기나 규칙을 가르치면 빠르게 습득하는 편인가요?' },
            { type: 'O', text: '산책 중에 줄을 당기지 않고 주인의 속도에 맞춰 걷나요?' },
            { type: 'O', text: '하지 말라는 행동(입질, 벽지 뜯기 등)을 금방 멈추나요?' }
        ];

        function startTest(dogNo, dogName) {
            document.getElementById('dogNoHidden').value = dogNo;
            document.getElementById('selectedDogName').innerText = dogName;
            document.getElementById('selection-section').style.display = 'none';
            document.getElementById('test-section').style.display = 'block';
            renderQuestions();
            window.scrollTo(0, 0);
        }

        function renderQuestions() {
            const container = document.getElementById('question-container');
            container.innerHTML = '';
            questions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'card q-card shadow-sm border-0';
                card.id = `q-card-${index}`;
                
                let scaleHtml = '<div class="scale-hint"><span>전혀 아니다</span><span>매우 그렇다</span></div><div class="scale-container">';
                for(let i=1; i<=10; i++) {
                    scaleHtml += `
                        <div class="scale-item">
                            <input type="radio" name="q${index}" value="${i}" data-type="${q.type}" class="scale-radio" onchange="handleRadioChange(${index})" required>
                            <span class="scale-label">${i}</span>
                        </div>`;
                }
                scaleHtml += '</div>';

                card.innerHTML = `
                    <p class="fw-bold mb-4 fs-5"><span style="color: #ff6b81;">Q${index + 1}.</span> ${q.text}</p>
                    ${scaleHtml}
                `;
                container.appendChild(card);
            });
        }

        function handleRadioChange(index) {
            document.getElementById(`q-card-${index}`).classList.remove('unanswered');
            updateProgress();
        }

        function updateProgress() {
            const checkedCount = document.querySelectorAll('#question-container input[type="radio"]:checked').length;
            const percent = Math.round((checkedCount / questions.length) * 100);
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressText').innerText = `${checkedCount} / ${questions.length} 완료 (${percent}%)`;
        }

        function send() {
            const checkedRadios = document.querySelectorAll('#question-container input[type="radio"]:checked');
            
            if (checkedRadios.length < questions.length) {
                alert("답변하지 않은 문항이 있습니다! 확인해 주세요.");
                const allCards = document.querySelectorAll('.q-card');
                for (let card of allCards) {
                    if (!card.querySelector('input[type="radio"]:checked')) {
                        card.classList.add('unanswered');
                        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        break;
                    }
                }
                return;
            }

            const rawScores = { E: 0, S: 0, A: 0, O: 0 };
            checkedRadios.forEach(radio => {
                rawScores[radio.getAttribute('data-type')] += parseInt(radio.value);
            });

            // 5문항 합산(최대 50점)을 100점 만점으로 환산
            document.getElementById('ePer').value = Math.round((rawScores.E / 50) * 100);
            document.getElementById('sPer').value = Math.round((rawScores.S / 50) * 100);
            document.getElementById('aPer').value = Math.round((rawScores.A / 50) * 100);
            document.getElementById('oPer').value = Math.round((rawScores.O / 50) * 100);

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 분석 중...';
            
            document.getElementById('frm').submit();
        }
    </script>
</div>
</html>
