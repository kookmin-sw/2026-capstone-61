<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paws | 아이디 찾기</title>

  <style>
    /* =========================================================
       기본 설정 (로그인 페이지 스타일 동기화)
    ========================================================= */
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f8f9fa;
      margin: 0; padding: 0;
    }

    .form-wrapper {
      display: flex; justify-content: center; align-items: center;
      min-height: 85vh; padding: 20px;
    }

    /* =========================================================
       카드 및 제목 (로그인 페이지 규격: 400px)
    ========================================================= */
    .find-card {
      width: 100%; max-width: 400px; background: #ffffff;
      padding: 30px 25px; border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      box-sizing: border-box;
    }

    .title-center {
      text-align: center; font-size: 24px; font-weight: 800;
      color: #ff6b81; margin-bottom: 25px;
    }

    /* =========================================================
       입력창 및 그룹 (로그인 페이지 규격: padding 11px)
    ========================================================= */
    .input-group { margin-bottom: 15px; }

    .form-control {
      width: 100%; padding: 11px 16px; border-radius: 10px;
      border: 1.5px solid #e1e1e1; background-color: #fafafa;
      font-size: 14px; transition: all 0.3s ease; box-sizing: border-box;
    }

    .form-control:focus {
      outline: none; border-color: #ff6b81; background-color: #ffffff;
      box-shadow: 0 0 0 3px rgba(255, 107, 129, 0.1);
    }

    /* =========================================================
       버튼 및 링크 (로그인 페이지 스타일)
    ========================================================= */
    .action-buttons { display: flex; gap: 10px; margin-top: 25px; margin-bottom: 20px; }

    .btn {
      flex: 1; border: none; border-radius: 10px; padding: 12px;
      font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s ease;
    }

    .btn-primary { background: #ff6b81; color: white; }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

    .btn-secondary { background: #f1f3f5; color: #495057; }
    .btn-secondary:hover { background: #e9ecef; }

    /* 하단 링크 (구분선 스타일 적용) */
    .text-links {
      text-align: center; font-size: 12px; display: flex;
      justify-content: center; align-items: center; gap: 8px;
    }

    .text-links a { color: #888; text-decoration: none; transition: color 0.2s; }
    .text-links a:hover { color: #ff6b81; }

    .text-links .divider { width: 1px; height: 10px; background-color: #dee2e6; }

    /* =========================================================
       커스텀 모달
    ========================================================= */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4); display: none; justify-content: center;
      align-items: center; z-index: 1000;
    }
    .modal-content {
      background: white; padding: 24px; border-radius: 20px;
      width: 90%; max-width: 320px; text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      animation: modalFadeIn 0.3s ease;
    }
    @keyframes modalFadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .modal-text { font-size: 15px; color: #333; margin-bottom: 20px; line-height: 1.5; word-break: keep-all; }
    .modal-btn {
      width: 100%; padding: 12px; border-radius: 12px;
      border: none; background: #ff6b81; color: white;
      font-weight: 700; cursor: pointer;
    }

    @media (max-width: 480px) {
      .action-buttons { flex-direction: column; }
    }
  </style>

  <script>
    function showModal(msg, focusId = null) {
      const modal = document.getElementById('customModal');
      const modalText = document.getElementById('modalText');
      modalText.innerHTML = msg;
      modal.style.display = 'flex';
      
      document.getElementById('modalConfirm').onclick = function() {
        modal.style.display = 'none';
        if (focusId) {
          const el = document.getElementById(focusId);
          if(el) el.focus();
        }
      };
    }

    window.onload = () => {
      document.querySelector('#mname').addEventListener('keypress', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          document.getElementById('tel').focus();
        }
      });

      document.querySelector('#tel').addEventListener('keypress', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          send();
        }
      });
    }

    function send() {
      const f = document.getElementById('frm');

      if (f.mname.value.trim().length === 0) {
        showModal("🐾 <b>이름</b>을 입력해주세요.", "mname");
        return;
      }

      if (f.tel.value.trim().length === 0) {
        showModal("🐾 <b>전화번호</b>를 입력해주세요.", "tel");
        return;
      }

      if (!/^\d{10,11}$/.test(f.tel.value)) {
        showModal("🐾 전화번호는 <b>숫자만 10~11자</b> 입력해주세요.", "tel");
        return;
      }

      f.submit();
    }
  </script>
</head>

<body>
  <div layout:fragment="content">
    <div class="form-wrapper">
      <div class="find-card">
        <div class="title-center">🔍 아이디 찾기</div>

        <form id="frm" method="post" action="/member/find_id">
          <!-- 이름 -->
          <div class="input-group">
            <input type="text" id="mname" name="mname" placeholder="이름" class="form-control">
          </div>

          <!-- 전화번호 -->
          <div class="input-group">
            <input type="text" id="tel" name="tel" placeholder="전화번호 (- 제외)" class="form-control"
                   maxlength="11" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
          </div>

          <!-- 버튼 -->
          <div class="action-buttons">
            <button type="button" class="btn btn-secondary" onclick="history.back()">취소</button>
            <button type="button" class="btn btn-primary" onclick="send()">아이디 찾기</button>
          </div>

          <!-- 하단 링크 -->
          <div class="text-links">
            <a href="/member/create">회원가입</a>
            <span class="divider"></span>
            <a href="/member/login">로그인</a>
            <span class="divider"></span>
            <a href="/member/find_passwd_form">비밀번호 찾기</a>
          </div>
        </form>
      </div>
    </div>

    <!-- 커스텀 모달 구조 -->
    <div id="customModal" class="modal-overlay">
      <div class="modal-content">
        <div id="modalText" class="modal-text">메시지 내용</div>
        <button id="modalConfirm" class="modal-btn">확인</button>
      </div>
    </div>
  </div>
</body>
</html>
