<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
<meta charset="UTF-8">
<title>Paws - 회원정보 수정</title>
<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

<style>

/* =========================================================
   🐾 기본 설정
========================================================= */
body{
  font-family:'Pretendard',sans-serif;

  background:
    linear-gradient(
      135deg,
      #fff1f3,
      #f8f9fa);

  margin:0;
}

/* =========================================================
   🐾 전체 래퍼
========================================================= */
.form-wrapper{

  display:flex;
  justify-content:center;

  padding:60px 20px 120px 20px;
}

/* =========================================================
   🐾 카드
========================================================= */
.update-card{

  width:100%;
  max-width:620px;

  background:#fff;

  border-radius:32px;

  padding:45px;

  box-shadow:
    0 15px 40px
    rgba(0,0,0,0.08);

  position:relative;

  overflow:hidden;
}

/* =========================================================
   🐾 제목
========================================================= */
.title-center{

  text-align:center;

  font-size:30px;
  font-weight:900;

  color:#ff6b81;

  margin-bottom:35px;
}

/* =========================================================
   🐾 프로필 요약
========================================================= */
.profile-summary{

  display:flex;
  align-items:center;

  gap:20px;

  padding:22px;

  border-radius:24px;

  background:
    linear-gradient(
      135deg,
      #fff5f6,
      #ffffff);

  margin-bottom:35px;

  box-shadow:
    0 5px 20px
    rgba(255,107,129,0.08);
}

/* =========================================================
   🐾 프로필 이미지
========================================================= */
.profile-img-sm{

  width:90px;
  height:90px;

  border-radius:50%;

  object-fit:cover;

  border:4px solid #fff;

  box-shadow:
    0 5px 15px
    rgba(0,0,0,0.12);
}

/* =========================================================
   🐾 아이디
========================================================= */
.user-id-value{

  font-size:21px;
  font-weight:800;

  color:#333;
}

.user-id-text,
.manner-temp{

  font-size:13px;

  color:#777;
}

/* =========================================================
   🐾 입력 섹션
========================================================= */
.input-section{

  margin-bottom:22px;
}

/* =========================================================
   🐾 라벨
========================================================= */
.input-label{

  display:block;

  margin-bottom:9px;
  margin-left:5px;

  font-size:13px;
  font-weight:700;

  color:#666;
}

/* =========================================================
   🐾 입력창
========================================================= */
.form-control{

  width:100%;

  padding:15px 18px;

  border-radius:16px;

  border:1px solid #f0f0f0;

  background:#fafafa;

  box-sizing:border-box;

  font-size:14px;

  transition:all 0.25s ease;
}

.form-control:focus{

  outline:none;

  border-color:#ffb6c1;

  box-shadow:
    0 0 10px
    rgba(255,182,193,0.15);
}

/* =========================================================
   🐾 인증 필드
========================================================= */
.auth-field{

  border:2px solid #ffe3e8 !important;

  background:#fff5f7 !important;
}

/* =========================================================
   🐾 주소 영역
========================================================= */
.flex-row{

  display:flex;

  gap:10px;
}

/* =========================================================
   🐾 주소 버튼
========================================================= */
.btn-side{

  border:none;

  background:#ff6b81;

  color:white;

  border-radius:14px;

  padding:0 16px;

  font-size:13px;
  font-weight:700;

  cursor:pointer;

  white-space:nowrap;

  transition:0.2s;
}

.btn-side:hover{

  background:#ff5470;
}

/* =========================================================
   🐾 버튼 그룹
========================================================= */
.btn-group{

  margin-top:35px;

  display:flex;

  gap:12px;
}

/* =========================================================
   🐾 수정 버튼
========================================================= */
.btn-submit{

  flex:2;

  padding:16px;

  border:none;

  border-radius:18px;

  background:
    linear-gradient(
      135deg,
      #ff6b81,
      #ff8fa3);

  color:#fff;

  font-size:16px;
  font-weight:800;

  cursor:pointer;

  transition:0.2s;
}

.btn-submit:hover{

  transform:translateY(-2px);
}

/* =========================================================
   🐾 취소 버튼
========================================================= */
.btn-cancel{

  flex:1;

  padding:16px;

  border-radius:18px;

  border:1px solid #e8e8e8;

  background:#fff;

  color:#777;

  font-size:15px;
  font-weight:700;

  cursor:pointer;

  transition:0.2s;
}

.btn-cancel:hover{

  background:#f8f9fa;
}

/* =========================================================
   📱 모바일 최적화
========================================================= */
@media (max-width: 768px) {

  /* 전체 */
  .form-wrapper {

    padding: 18px 8px 90px 8px;
  }

  /* 카드 */
  .update-card {

    width: 100%;
    max-width: 100%;

    padding: 22px 14px;

    border-radius: 20px;
  }

  /* 제목 */
  .title-center {

    font-size: 22px;

    margin-bottom: 22px;
  }

  .title-center small {

    font-size: 10px !important;
  }

  /* 프로필 */
  .profile-summary {

    gap: 12px;

    padding: 14px;

    border-radius: 16px;

    margin-bottom: 22px;
  }

  /* 이미지 */
  .profile-img-sm {

    width: 68px;
    height: 68px;

    border-width: 3px;
  }

  /* 아이디 */
  .user-id-value {

    font-size: 15px;
  }

  .user-id-text,
  .manner-temp {

    font-size: 11px;
  }

  /* 입력 */
  .input-section {

    margin-bottom: 16px;
  }

  /* 라벨 */
  .input-label {

    font-size: 11px;

    margin-bottom: 5px;
  }

  /* 입력창 */
  .form-control {

    padding: 11px 12px;

    border-radius: 12px;

    font-size: 12px;
  }

  textarea.form-control {

    min-height: 90px;
  }

  /* 주소 */
  .flex-row {

    display:flex;

    gap:6px;
  }

  /* 주소 버튼 */
  .btn-side {

    min-width:80px;

    padding:0 10px;

    border-radius:10px;

    font-size:11px;
  }

  /* 버튼 그룹 */
  .btn-group {

    gap:8px;

    margin-top:24px;
  }

  /* 버튼 */
  .btn-submit,
  .btn-cancel {

    padding:11px;

    border-radius:12px;

    font-size:12px;
  }

  /* iOS 확대 방지 */
  input,
  textarea,
  select {

    font-size:16px !important;
  }
}

</style>

<script th:inline="javascript">
/* JS에서 관리자 여부를 확인하기 위해 Thymeleaf 변수 활용 */
const isAdmin = [[${session.grade == 'admin'}]];

let origin = {};

window.onload = function(){
  origin = {
    mname:document.getElementById('mname').value,
    nickname:document.getElementById('nickname').value,
    tel:document.getElementById('tel').value,
    intro:document.getElementById('intro').value,
    zipcode:document.getElementById('zipcode').value,
    address1:document.getElementById('address1').value,
    address2:document.getElementById('address2').value
  };
}

function execDaumPostcode(){
  new daum.Postcode({
    oncomplete:function(data){
      let addr = (data.userSelectedType === 'R') ? data.roadAddress : data.jibunAddress;
      document.getElementById('zipcode').value = data.zonecode;
      document.getElementById('address1').value = addr;
      document.getElementById('address2').focus();
    }
  }).open();
}

function validateAndSend(){
  const oldPasswd = document.getElementById('old_passwd');
  const newPasswd = document.getElementById('passwd');
  const newPasswd2 = document.getElementById('passwd2');

  /* ✅ 수정: 관리자가 아닐 때만 현재 비밀번호 입력 필수 체크 */
  if(!isAdmin) {
    if(oldPasswd.value.trim() === ''){
      alert('본인 확인을 위해 현재 비밀번호를 입력해주세요.');
      oldPasswd.focus();
      return;
    }
  }

  /* 변경 여부 확인 */
  const now = {
    mname:document.getElementById('mname').value,
    nickname:document.getElementById('nickname').value,
    tel:document.getElementById('tel').value,
    intro:document.getElementById('intro').value,
    zipcode:document.getElementById('zipcode').value,
    address1:document.getElementById('address1').value,
    address2:document.getElementById('address2').value
  };

  const isDataChanged = JSON.stringify(origin) !== JSON.stringify(now);
  const isPasswdChanged = newPasswd.value.trim() !== '';

  if(!isDataChanged && !isPasswdChanged){
    alert('수정된 내용이 없습니다.');
    return;
  }

  /* 새 비밀번호 검사 (입력했을 경우만) */
  if(isPasswdChanged){
    const reg = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&]).{8,}$/;
    if(!reg.test(newPasswd.value)){
      alert('비밀번호는 영문/숫자/특수문자 포함 8자 이상이어야 합니다.');
      newPasswd.focus();
      return;
    }
    if(newPasswd.value !== newPasswd2.value){
      alert('새 비밀번호 확인이 일치하지 않습니다.');
      newPasswd2.focus();
      return;
    }
  }

  if(confirm('회원 정보를 수정하시겠습니까?')){
    document.getElementById('frm').submit();
  }
}
</script>
</head>

<body>
<div layout:fragment="content">
<div class="form-wrapper">
<div class="update-card">

<div class="title-center">
  🐾 회원정보 수정 <small th:if="${session.grade == 'admin'}" style="font-size: 14px; color: #999;">(관리자 모드)</small>
</div>

<!-- 프로필 요약 -->
<div class="profile-summary" th:object="${memberVO}">
  <img th:if="*{sizes > 0}" th:src="@{|/member/storage/${memberVO.thumbs}|}" class="profile-img-sm">
  <img th:if="*{sizes == 0}" src="/images/none.jpg" class="profile-img-sm">
  <div>
    <div class="user-id-text">내 아이디</div>
    <div class="user-id-value" th:text="*{id}"></div>
    <div class="manner-temp">🌡 매너온도 <span th:text="*{manner_temp}"> </span>℃</div>
  </div>
</div>

<form id="frm" method="post" action="/member/update_proc" th:object="${memberVO}">
  <input type="hidden" name="memberno" th:value="*{memberno}">

  <!-- ✅ 수정: 관리자가 아닐 때만 '현재 비밀번호' 입력란 출력 -->
  <div class="input-section" th:if="${session.grade != 'admin'}">
    <label class="input-label" style="color:#ff4757;">현재 비밀번호 (본인 확인)</label>
    <input type="password" id="old_passwd" name="old_passwd" class="form-control auth-field" placeholder="현재 비밀번호 입력">
    <hr style="border:0;height:1px;background:#eee;margin:30px 0;">
  </div>

  <!-- 이름 -->
  <div class="input-section">
    <label class="input-label">성명</label>
    <input type="text" id="mname" name="mname" th:value="*{mname}" class="form-control">
  </div>

  <!-- 닉네임 -->
  <div class="input-section">
    <label class="input-label">닉네임</label>
    <input type="text" id="nickname" name="nickname" th:value="*{nickname}" class="form-control">
  </div>

  <!-- 자기소개 -->
  <div class="input-section">
    <label class="input-label">자기소개</label>
    <textarea id="intro" name="intro" class="form-control" placeholder="반려견과 함께하는 일상을 소개해보세요!" th:text="*{intro}"></textarea>
  </div>

  <!-- 새 비밀번호 -->
  <div class="input-section">
    <label class="input-label">새 비밀번호 <span th:if="${session.grade == 'admin'}" style="color: #ff6b81;">(관리자가 직접 변경 가능)</span></label>
    <input type="password" id="passwd" name="passwd" class="form-control" placeholder="변경할 경우만 입력">
    <input type="password" id="passwd2" class="form-control" placeholder="새 비밀번호 확인" style="margin-top:10px;">
  </div>

  <!-- 전화번호 -->
  <div class="input-section">
    <label class="input-label">전화번호</label>
    <input type="text" id="tel" name="tel" th:value="*{tel}" class="form-control">
  </div>

  <!-- 주소 -->
  <div class="input-section">
    <label class="input-label">주소</label>
    <div class="flex-row">
      <input type="text" id="zipcode" name="zipcode" th:value="*{zipcode}" class="form-control" placeholder="우편번호" readonly>
      <button type="button" class="btn-side" onclick="execDaumPostcode()">주소찾기</button>
    </div>
    <input type="text" id="address1" name="address1" th:value="*{address1}" class="form-control" placeholder="기본 주소" readonly style="margin-bottom:10px;">
    <input type="text" id="address2" name="address2" th:value="*{address2}" class="form-control" placeholder="상세 주소 입력">
  </div>

  <!-- 버튼 -->
  <div class="btn-group">
  <button type="button" class="btn-cancel" onclick="history.back()">취소</button>
    <button type="button" class="btn-submit" onclick="validateAndSend()">수정</button>
    
  </div>
</form>

</div>
</div>
</div>
</body>
</html>
