<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paws 로그인</title>

<style>
/* =========================================================
   기본 및 폰트 설정
   ========================================================= */
body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: #f8f9fa;
  margin: 0;
  padding: 0;
}

/* =========================================================
   전체 래퍼
   ========================================================= */
.form-wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 80vh;
  padding: 20px;
}

/* =========================================================
   로그인 카드
   ========================================================= */
.login-card {
  width: 100%;
  max-width: 400px;
  background: #ffffff;
  padding: 30px 25px; /* 상하 패딩 축소 */
  border-radius: 24px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
  box-sizing: border-box;
}

.title-center {
  text-align: center;
  font-size: 24px; /* 크기 약간 축소 */
  font-weight: 800;
  margin-bottom: 20px; /* 간격 축소 */
  color: #ff6b81;
}

/* =========================================================
   입력 그룹 (높이 및 간격 줄임)
   ========================================================= */
.input-group {
  margin-bottom: 2px; /* 간격 축소 */
}

.form-control {
  width: 100%;
  padding: 11px 16px; /* 높이 축소 (14px -> 11px) */
  border-radius: 10px;
  border: 1.5px solid #e1e1e1;
  font-size: 14px;
  transition: all 0.3s ease;
  box-sizing: border-box;
  background-color: #fafafa;
}

.form-control:focus {
  border-color: #ff6b81;
  background-color: #ffffff;
  box-shadow: 0 0 0 3px rgba(255, 107, 129, 0.1);
  outline: none;
}

.span_warning {
  display: block;
  min-height: 16px; /* 높이 축소 */
  padding-left: 4px;
  margin-bottom: 6px; /* 하단 간격 축소 */
  color: #ff4757;
  font-size: 11px;
  font-weight: 500;
}

/* =========================================================
   체크박스 영역
   ========================================================= */
.options-area {
  display: flex;
  justify-content: flex-start;
  gap: 14px;
  margin-bottom: 18px; /* 간격 축소 */
  padding-left: 4px;
}

.checkbox-label {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px; /* 폰트 축소 */
  color: #666;
  cursor: pointer;
}

.checkbox-label input[type="checkbox"] {
  width: 14px;
  height: 14px;
  accent-color: #ff6b81;
  cursor: pointer;
}

/* =========================================================
   버튼 영역 (컴팩트하게)
   ========================================================= */
.login_btn {
  display: flex;
  flex-direction: row;
  gap: 10px;
  margin-bottom: 20px;
}

.btn {
  flex: 1;
  padding: 12px; /* 버튼 높이 축소 */
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-primary {
  color: white;
  background: #ff6b81;
}

.btn-secondary {
  background: #f1f3f5;
  color: #495057;
}

/* =========================================================
   하단 링크
   ========================================================= */
.text-links {
  text-align: center;
  font-size: 12px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
}

.text-links a {
  color: #888;
  text-decoration: none;
}

.text-links .divider {
  width: 1px;
  height: 10px;
  background-color: #dee2e6;
}

/* 반응형 */
@media (max-width: 480px) {
  .login-card { padding: 25px 15px; }
}
</style>

<script>
window.onload = () => {
  document.querySelector('#id').addEventListener('keypress', (event) => {
    if (event.key === 'Enter') {
      event.preventDefault();
      document.getElementById('passwd').focus();
    }
  });

  document.querySelector('#passwd').addEventListener('keypress', (event) => {
    if (event.key === 'Enter') {
      event.preventDefault();
      send();
    }
  });
}

function send() {
  let id = document.getElementById('id');
  let passwd = document.getElementById('passwd');
  let id_msg = document.getElementById('id_msg');
  let passwd_msg = document.getElementById('passwd_msg');

  id_msg.innerHTML = '';
  passwd_msg.innerHTML = '';

  if (id.value.trim() === '') {
    id_msg.innerHTML = '아이디를 입력해주세요.';
    id.focus();
    return;
  }

  if (passwd.value.trim() === '') {
    passwd_msg.innerHTML = '비밀번호를 입력해주세요.';
    passwd.focus();
    return;
  }

  document.getElementById('frm').submit();
}
</script>

</head>

<body>

<div layout:fragment="content">
  <div class="form-wrapper">
    <div class="login-card">

      <div class="title-center">🐾 Paws 로그인</div>

      <form id="frm" th:object="${memberVO}" method="post" action="/member/login">

        <!-- 아이디 -->
        <div class="input-group">
          <input type="text" id="id" name="id" th:value="${ck_id}" placeholder="아이디" class="form-control" autocomplete="username">
        </div>
        <span id="id_msg" class="span_warning"></span>

        <!-- 비밀번호 -->
        <div class="input-group">
          <input type="password" id="passwd" name="passwd" placeholder="비밀번호" class="form-control" autocomplete="current-password">
        </div>
        <span id="passwd_msg" class="span_warning"></span>

        <!-- 체크박스 -->
        <div class="options-area">
          <label class="checkbox-label">
            <input type="checkbox" name="id_save" th:checked="${ck_id_save == 'Y'}" value="Y">
            <span>아이디 저장</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" name="passwd_save" th:checked="${ck_passwd_save == 'Y'}" value="Y">
            <span>비밀번호 저장</span>
          </label>
        </div>

        <!-- 버튼 영역  -->
        <div class="login_btn">
          <button type="button" class="btn btn-secondary" onclick="history.back()">취소</button>
          <button type="button" class="btn btn-primary" onclick="send()">로그인</button>
        </div>

        <!-- 하단 링크 -->
        <div class="text-links">
          <a href="/member/create">회원가입</a>
          <span class="divider"></span>
          <a href="/member/find_id_form">아이디 찾기</a>
          <span class="divider"></span>
          <a href="/member/find_passwd_form">비밀번호 찾기</a>
        </div>

      </form>
    </div>
  </div>
</div>

</body>
</html>
