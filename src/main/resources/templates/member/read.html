<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Paws | 회원 상세정보</title>

<style>

/* =========================================================
   기본 설정
========================================================= */
body {
  font-family: 'Pretendard',
               'Arial',
               sans-serif;

  background:
      linear-gradient(
          135deg,
          #fff1f3,
          #f8f9fa);

  margin: 0;
  padding: 0;
}

/* =========================================================
   전체 래퍼
========================================================= */
.form-wrapper {
  display: flex;
  justify-content: center;
  align-items: center;

  min-height: 100vh;

  padding: 60px 20px;
}

/* =========================================================
   카드
========================================================= */
.small-form {
  width: 100%;
  max-width: 720px;

  background: #ffffff;

  padding: 45px 38px;

  border-radius: 32px;

  box-shadow:
      0 15px 40px
      rgba(255, 107, 129, 0.12);
}

/* =========================================================
   제목
========================================================= */
.title-center {
  text-align: center;

  font-size: 30px;
  font-weight: 800;

  color: #ff6b81;

  margin-bottom: 40px;

  letter-spacing: -1px;
}

/* =========================================================
   프로필 섹션
========================================================= */
.profile-section {
  display: flex;
  flex-direction: column;
  align-items: center;

  gap: 30px;
}

/* =========================================================
   프로필 이미지
========================================================= */
.image-container {
  position: relative;
}

.profile-img,
.default-img {
  width: 140px;
  height: 140px;

  border-radius: 50%;

  object-fit: cover;

  border: 5px solid #fff;

  box-shadow:
      0 12px 25px
      rgba(255, 107, 129, 0.18);

  cursor: pointer;

  transition: all 0.3s ease;
}

.profile-img:hover,
.default-img:hover {
  transform:
      scale(1.05)
      rotate(2deg);

  box-shadow:
      0 15px 35px
      rgba(255, 107, 129, 0.25);
}

/* =========================================================
   회원 통계
========================================================= */
.stats-grid {
  width: 100%;

  display: grid;

  grid-template-columns:
      repeat(3, 1fr);

  gap: 12px;

  margin-top: 10px;
}

.stat-box {
  background: #fff5f7;

  border-radius: 18px;

  padding: 18px 12px;

  text-align: center;

  border: 1px solid #ffe3e8;
}

.stat-value {
  font-size: 22px;
  font-weight: 800;

  color: #ff6b81;

  margin-bottom: 6px;
}

.stat-label {
  font-size: 13px;
  color: #777;
}

/* =========================================================
   정보 영역
========================================================= */
.profile-info {
  width: 100%;
}

/* =========================================================
   정보 Row
========================================================= */
.profile-row {
  display: flex;
  justify-content: space-between;
  align-items: center;

  gap: 20px;

  padding: 16px 8px;

  border-bottom: 1px solid #f1f3f5;
}

.profile-row:last-child {
  border-bottom: none;
}

/* =========================================================
   라벨
========================================================= */
.label {
  display: flex;
  align-items: center;
  gap: 8px;

  font-size: 15px;
  font-weight: 600;

  color: #888;
}

/* =========================================================
   값
========================================================= */
.value {
  text-align: right;

  font-size: 16px;
  font-weight: 700;

  color: #444;

  word-break: break-word;
}

/* =========================================================
   강조
========================================================= */
.grade-highlight {
  color: #ff6b81;
}

/* =========================================================
   자기소개
========================================================= */
.intro-box {

  width: 100%;

  box-sizing: border-box;

  margin-top: 25px;

  background: #fff7f9;

  border-radius: 20px;

  padding: 22px;

  border: 1px solid #ffe3e8;
}

.intro-title {
  font-size: 16px;
  font-weight: 800;

  color: #ff6b81;

  margin-bottom: 12px;
}

.intro-content {
  font-size: 14px;
  line-height: 1.7;

  color: #555;

  white-space: pre-wrap;
}

/* =========================================================
   버튼 영역
========================================================= */
.action-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;

  margin-top: 40px;
}

/* =========================================================
   버튼
========================================================= */
.action-buttons a {
  flex: 1;

  min-width: 140px;

  text-align: center;

  text-decoration: none;

  padding: 14px 18px;

  border-radius: 16px;

  font-size: 14px;
  font-weight: 700;

  color: white;

  background:
      linear-gradient(
          135deg,
          #ff6b81,
          #ff8fa3);

  box-shadow:
      0 6px 16px
      rgba(255, 107, 129, 0.25);

  transition: all 0.25s ease;
}

.action-buttons a:hover {
  transform: translateY(-2px);

  box-shadow:
      0 10px 22px
      rgba(255, 107, 129, 0.35);
}

/* =========================================================
   📱 모바일
========================================================= */
@media (max-width: 768px) {

  .form-wrapper {
    padding: 50px 8px 100px 8px;
    min-height: auto;
  }

  .small-form {

    width: 100%;
    max-width: 100%;

    padding: 18px 12px;

    border-radius: 18px;

    overflow: hidden;
  }

  /* =========================================================
     📱 제목
  ========================================================= */
  .title-center {

    font-size: 20px;

    margin-bottom: 20px;
  }

  /* =========================================================
     📱 프로필
  ========================================================= */
  .profile-section {
    gap: 16px;
  }

  .profile-img,
  .default-img {

    width: 90px;
    height: 90px;

    border-width: 3px;
  }

  /* =========================================================
     📱 통계
  ========================================================= */
  .stats-grid {

    grid-template-columns: repeat(2, 1fr);

    gap: 7px;
  }

  .stat-box {

    padding: 10px 5px;

    border-radius: 12px;
  }

  .stat-value {

    font-size: 15px;

    margin-bottom: 2px;
  }

  .stat-label {

    font-size: 9px;
  }

  /* =========================================================
     📱 정보
  ========================================================= */
  .profile-row {

    padding: 9px 2px;

    gap: 4px;
  }

  .label {

    font-size: 11px;
  }

  .value {

    font-size: 11px;

    line-height: 1.3;
  }

  /* =========================================================
     📱 자기소개
  ========================================================= */
  .intro-box {

    width: 100%;

    padding: 14px;

    border-radius: 14px;

    margin-top: 16px;
  }

  .intro-title {

    font-size: 12px;

    margin-bottom: 6px;
  }

  .intro-content {

    font-size: 10px;

    line-height: 1.5;
  }

  /* =========================================================
     📱 버튼
  ========================================================= */
  .action-buttons {

    display: grid;

    grid-template-columns: repeat(2, 1fr);

    gap: 7px;

    margin-top: 18px;

    width: 100%;
  }

  .action-buttons a {

    width: 100%;

    min-width: 0;

    padding: 9px 4px;

    border-radius: 10px;

    font-size: 10px;

    font-weight: 700;

    line-height: 1.2;

    text-align: center;

    word-break: keep-all;

    box-sizing: border-box;

    overflow: hidden;

    text-overflow: ellipsis;

    white-space: nowrap;

    box-shadow:
      0 3px 8px
      rgba(255, 107, 129, 0.12);
  }

  .action-buttons a:hover {
    transform: none;
  }
}

</style>
</head>

<body>

<div layout:fragment="content">

<div class="form-wrapper">

<div class="small-form"
     th:object="${memberVO}">

<!-- 제목 -->
<div class="title-center">
👤 회원 상세 정보
</div>

<div class="profile-section">

<!-- 프로필 -->
<div class="image-container">

<div th:if="${memberVO.sizes > 0}"
     th:onclick="|location.href='/member/update_profile_form?memberno=${memberVO.memberno}'|">

<img th:if="${memberVO.thumbs.endsWith('jpg')
          or memberVO.thumbs.endsWith('png')
          or memberVO.thumbs.endsWith('gif')}"

     th:src="@{|/member/storage/${memberVO.thumbs}|}"

     class="profile-img"
     alt="프로필">

</div>

<div th:if="${memberVO.sizes == 0}"
     th:onclick="|location.href='/member/update_profile_form?memberno=${memberVO.memberno}'|">

<img src="/images/none.jpg"
     class="default-img"
     alt="기본 프로필">

</div>

</div>

<!-- 매너온도 / 매칭 -->
<div class="stats-grid">
<div class="stat-box">

  <div class="stat-value"
       th:text="${avg_dog_score != null ? avg_dog_score : '0.0'}">
  </div>

  <div class="stat-label">
    🐶 강아지 평점
  </div>

</div>
<div class="stat-box">

  <div class="stat-value"
       th:text="${avg_owner_score != null ? avg_owner_score : '0.0'}">
  </div>

  <div class="stat-label">
    ⭐ 보호자 평점
  </div>

</div>
<div class="stat-box">
  <div class="stat-value"
       th:text="*{manner_temp}"></div>

  <div class="stat-label">
    🌡️ 매너온도
  </div>
</div>

<div class="stat-box">
  <div class="stat-value"
       th:text="*{match_cnt}"></div>

  <div class="stat-label">
    🤝 매칭 성공
  </div>
</div>

<div class="stat-box">
  <div class="stat-value"
       th:text="*{grade}"></div>

  <div class="stat-label">
    ⭐ 회원등급
  </div>
</div>

</div>

<!-- 정보 -->
<div class="profile-info">

<div class="profile-row">
  <span class="label">
    👤 성명
  </span>

  <span class="value"
        th:text="*{mname}"></span>
</div>

<div class="profile-row">
  <span class="label">
    🐾 닉네임
  </span>

  <span class="value"
        th:text="*{nickname}"></span>
</div>

<div class="profile-row">
  <span class="label">
    📧 아이디
  </span>

  <span class="value"
        th:text="*{id}"></span>
</div>

<div class="profile-row">
  <span class="label">
    🎂 생년월일
  </span>

  <span class="value"
        th:text="*{birth}"></span>
</div>

<div class="profile-row">
  <span class="label">
    🚻 성별
  </span>

  <span class="value"
        th:text="*{sex}"></span>
</div>

<div class="profile-row">
  <span class="label">
    📱 전화번호
  </span>

  <span class="value"
        th:text="*{tel}"></span>
</div>

<div class="profile-row">
  <span class="label">
    📮 우편번호
  </span>

  <span class="value"
        th:text="*{zipcode != null and zipcode != '' ? zipcode : '미등록'}"></span>
</div>

<div class="profile-row">
  <span class="label">
    🏠 기본 주소
  </span>

  <span class="value"
        th:text="*{address1}"></span>
</div>

<div class="profile-row">
  <span class="label">
    🧭 상세 주소
  </span>

  <span class="value"
        th:text="*{address2}"></span>
</div>

<div class="profile-row">
  <span class="label">
    📅 가입일
  </span>

  <span class="value"
        th:text="*{mdate != null and mdate.length() >= 10 ? mdate.substring(0, 10) : mdate}"></span>
</div>

<div class="profile-row">
  <span class="label">
    👑 회원 등급
  </span>

  <span class="value grade-highlight">

    <th:block th:switch="*{grade}">

      <span th:case="0">
        관리자 👑
      </span>

      <span th:case="1">
        일반회원 😊
      </span>

      <span th:case="2">
        정지회원 🚫
      </span>

      <span th:case="3">
        탈퇴회원 ❌
      </span>

      <span th:case="*">
        기타
      </span>

    </th:block>

  </span>
</div>

</div>

<!-- 자기소개 -->
<div class="intro-box">

<div class="intro-title">
💬 자기소개
</div>

<div class="intro-content"
     th:text="*{intro != null and intro != '' ? intro : '등록된 자기소개가 없습니다.'}">
</div>

</div>

<!-- 버튼 -->
<div class="action-buttons">

<a th:href="@{|/mlogin/mlogin_insert_form?memberno=${memberVO != null ? memberVO.memberno : session.memberno}|}">
로그인 내역
</a>

<a href="/dog/list.do">
Puppy 🐾
</a>

<a th:href="@{|/member/update_form?memberno=${memberVO != null ? memberVO.memberno : session.memberno}|}">
정보 수정
</a>

<a th:href="@{|/member/reset_passwd_form?memberno=${memberVO.memberno}|}">
비밀번호 변경
</a>


</div>

</div>
</div>
</div>

</body>
</html>
