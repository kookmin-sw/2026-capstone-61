<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<body>

<div layout:fragment="content">

  <script>
    window.onload = () => {
      document.getElementById('btn_send').addEventListener('click', send);
    }

    function send() {
      let url = './passwd_check';
      let current_passwd = document.getElementById("current_passwd").value;

      fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({current_passwd: current_passwd})
      })
      .then(response => response.json())
      .then(rdata => {
        if (rdata.cnt == 0) {
          current_passwd_msg.innerHTML= '현재 패스워드가 일치하지 않습니다.';
          return false;
        } else {
          document.getElementById('frm').submit();
        }
      });
    }
  </script>

  <div class="title_line">
    패스워드 변경 >
    <span th:text="|${memberVO.mname} (${memberVO.id})|"></span>
  </div>

  <div style="width: 30%; margin: 0px auto ">
    <form name="frm" id="frm" method="post" action="/member/passwd_update_proc">
      
      <input type="hidden" name="memberno" th:value="${memberVO.memberno}">

      <div class="form-group">
        <label>현재 패스워드*</label>
        <input type='password' id='current_passwd' class="form-control form-control-sm">
        <div id='current_passwd_msg'></div>
      </div>

      <div class="form-group">
        <label>새로운 패스워드*</label>
        <input type='password' id='passwd' class="form-control form-control-sm">
      </div>

      <div class="form-group">
        <label>새로운 패스워드 확인*</label>
        <input type='password' id='passwd2' class="form-control form-control-sm">
        <span id='passwd2_msg'></span>
      </div>

      <div>
        <button type="button" id='btn_send'>저장</button>
        <button type="button" onclick="history.back();">취소</button>
      </div>

    </form>
  </div>

</div>

</body>
</html>
