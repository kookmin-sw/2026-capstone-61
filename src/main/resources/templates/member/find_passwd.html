<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paws | 비밀번호 찾기</title>

  <style>
    /* =========================================================
       기본 설정 (로그인 페이지 스타일)
    ========================================================= */
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f8f9fa;
      margin: 0; padding: 0;
    }

    .form-wrapper {
      display: flex; justify-content: center; align-items: center;
      min-height: 85vh; padding: 20px;
    }

    /* =========================================================
       카드 및 제목 (로그인 페이지 규격: 400px)
    ========================================================= */
    .find-card {
      width: 100%; max-width: 400px; background: #ffffff;
      padding: 30px 25px; border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      box-sizing: border-box;
    }

    .title-center {
      text-align: center; font-size: 24px; font-weight: 800;
      color: #ff6b81; margin-bottom: 20px;
    }

    /* =========================================================
       입력창 (로그인 페이지 규격: padding 11px)
    ========================================================= */
    .input-group { margin-bottom: 2px; }

    .form-control {
      width: 100%; padding: 11px 16px; border-radius: 10px;
      border: 1.5px solid #e1e1e1; background-color: #fafafa;
      font-size: 14px; transition: all 0.3s ease; box-sizing: border-box;
    }

    .form-control:focus {
      outline: none; border-color: #ff6b81; background-color: #ffffff;
      box-shadow: 0 0 0 3px rgba(255, 107, 129, 0.1);
    }

    /* 경고 메시지 (로그인 페이지 규격: 11px) */
    .span_warning {
      display: block; min-height: 16px; padding-left: 4px;
      margin-bottom: 6px; color: #ff4757; font-size: 11px; font-weight: 500;
    }

    /* =========================================================
       버튼 영역 (로그인 페이지 규격)
    ========================================================= */
    .action-buttons { display: flex; gap: 10px; margin-top: 10px; margin-bottom: 20px; }

    .btn {
      flex: 1; padding: 12px; border-radius: 10px;
      font-size: 14px; font-weight: 700; border: none;
      cursor: pointer; transition: all 0.2s ease;
    }

    .btn-primary { background: #ff6b81; color: white; }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

    .btn-secondary { background: #f1f3f5; color: #495057; }
    .btn-secondary:hover { background: #e9ecef; }

    /* =========================================================
       하단 링크 (로그인 페이지 구분선 스타일)
    ========================================================= */
    .text-links {
      text-align: center; font-size: 12px; display: flex;
      justify-content: center; align-items: center; gap: 8px;
    }

    .text-links a { color: #888; text-decoration: none; transition: color 0.2s; }
    .text-links a:hover { color: #ff6b81; }

    .text-links .divider { width: 1px; height: 10px; background-color: #dee2e6; }

    @media (max-width: 480px) {
      .find-card { padding: 25px 15px; }
    }
  </style>

  <script>
    window.onload = () => {
      // 엔터 키 흐름 제어
      document.querySelector('#id').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); document.getElementById('mname').focus(); }
      });
      document.querySelector('#mname').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); document.getElementById('tel').focus(); }
      });
      document.querySelector('#tel').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); send(); }
      });
    }

    function send() {
      const f = document.getElementById('frm');
      const id = document.getElementById('id');
      const mname = document.getElementById('mname');
      const tel = document.getElementById('tel');
      
      const id_msg = document.getElementById('id_msg');
      const mname_msg = document.getElementById('mname_msg');
      const tel_msg = document.getElementById('tel_msg');

      id_msg.innerHTML = '';
      mname_msg.innerHTML = '';
      tel_msg.innerHTML = '';

      if (id.value.trim() === '') {
        id_msg.innerHTML = '아이디를 입력해주세요.';
        id.focus(); return;
      }
      if (mname.value.trim() === '') {
        mname_msg.innerHTML = '이름을 입력해주세요.';
        mname.focus(); return;
      }
      if (tel.value.trim() === '') {
        tel_msg.innerHTML = '전화번호를 입력해주세요.';
        tel.focus(); return;
      }
      if (!/^\d{10,11}$/.test(tel.value)) {
        tel_msg.innerHTML = '숫자만 10~11자 입력 가능합니다.';
        tel.focus(); return;
      }

      f.submit();
    }
  </script>
</head>

<body>
  <div layout:fragment="content">
    <div class="form-wrapper">
      <div class="find-card">
        <div class="title-center">🔑 비밀번호 찾기</div>

        <form id="frm" method="post" action="/member/find_passwd">
          
          <!-- 아이디 -->
          <div class="input-group">
            <input type="text" id="id" name="id" placeholder="아이디" class="form-control">
          </div>
          <span id="id_msg" class="span_warning"></span>

          <!-- 이름 -->
          <div class="input-group">
            <input type="text" id="mname" name="mname" placeholder="이름" class="form-control">
          </div>
          <span id="mname_msg" class="span_warning"></span>

          <!-- 전화번호 -->
          <div class="input-group">
            <input type="text" id="tel" name="tel" placeholder="전화번호 (- 제외)" class="form-control"
                   maxlength="11" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
          </div>
          <span id="tel_msg" class="span_warning"></span>

          <!-- 버튼 영역 -->
          <div class="action-buttons">
            <button type="button" class="btn btn-secondary" onclick="history.back()">취소</button>
            <button type="button" class="btn btn-primary" onclick="send()">비밀번호 찾기</button>
          </div>

          <!-- 하단 링크 -->
          <div class="text-links">
            <a href="/member/create">회원가입</a>
            <span class="divider"></span>
            <a href="/member/login">로그인</a>
            <span class="divider"></span>
            <a href="/member/find_id_form">아이디 찾기</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
