<!DOCTYPE html>
<html layout:decorate="~{layout}">
<head>
<style>
/* 전체 배경 */
body {
  font-family: 'Pretendard', 'Arial', sans-serif;
  background: linear-gradient(135deg, #fcefee, #f8f9fa);
  margin: 70px auto 100px auto;
}

/* 중앙 정렬 */
.form-wrapper {
  display: flex;
  justify-content: center;
  margin-top: 60px;
}

/* 카드 */
.small-form {
  width: 90%;
  max-width: 650px;
  background: #ffffff;
  padding: 30px;
  border-radius: 22px;
  box-shadow: 0 14px 30px rgb(255, 191, 223);
}

/* 제목 */
.title-center {
  text-align: center;
  font-size: 26px;
  font-weight: 700;
  margin-bottom: 25px;
  color: #ff6b81;
}

/* 프로필 영역 */
  .profile-section {
    flex-direction: column;
    text-align: center;
  }
/* 이미지 */
.profile-img, .default-img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  object-fit: cover;
  box-shadow: 0 8px 18px rgba(0,0,0,0.15);
  transition: 0.2s;
}

/* hover */
.profile-img:hover, .default-img:hover {
  transform: scale(1.05);
}

/* 정보 */
.profile-info {
  flex: 1;
}

/* 정보 줄 */
.profile-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #f1f1f1;
  font-size: 14px;
}

.profile-row span:first-child {
  color: #888;
  font-size: 16px;
}

.profile-row .value {
  color: #ff6b81;
  font-weight: 500;
  font-size: 16px;
}

/* 🔥 파일 업로드 영역 */
.file-row {
  margin-top: 15px;
}

/* 숨김 input */
.file-row input[type="file"] {
  display: none;
}

/* 커스텀 버튼 */
.file-label {
  display: inline-block;
  padding: 8px 15px;
  border-radius: 20px;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  color: white;
  font-size: 13px;
  cursor: pointer;
  transition: 0.2s;
}

.file-label:hover {
  transform: scale(1.05);
}

/* 파일명 */
.file-name {
  font-size: 12px;
  color: #999;
  margin-top: 5px;
}

/* 버튼 */
.action-buttons {
  margin-top: 30px;
  display: flex;
  justify-content: center;
  gap: 10px;
}

.action-buttons button {
  padding: 10px 18px;
  border-radius: 20px;
  font-size: 14px;
  border: none;
  cursor: pointer;
  color: white;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  transition: 0.2s;
}

.action-buttons button:hover {
  transform: scale(1.07);
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
}

/* 반응형 */
@media (max-width: 768px) {
  .profile-section {
    flex-direction: column;
    text-align: center;
  }
}
</style>

<script>
/* 🔥 이미지 미리보기 */
function previewImage(input) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('preview').src = e.target.result;
  };
  reader.readAsDataURL(file);

  // 파일명 표시
  document.getElementById('fileName').innerText = file.name;
}
</script>

</head>

<body>
<div layout:fragment="content">

  <div class="form-wrapper">
    <div class="small-form">

      <div class="title-center">📸 프로필 사진 수정</div>

      <form name="frm" method="POST" th:action="@{/member/update_profile}" enctype="multipart/form-data">

        <input type="hidden" name="memberno" th:value="${memberVO.memberno}">

        <div class="profile-section">

          <!-- 이미지 -->
          <div th:Object="${memberVO}">
            <img id="preview"
                 th:src="${memberVO.profile != null and memberVO.profile != ''} 
                          ? @{'/member/storage/' + ${memberVO.profilesaved}} 
                          : '/images/none.jpg'"
                 class="profile-img">
          </div>

          <!-- 정보 -->
          <div class="profile-info">

            <div class="profile-row"><span>아이디</span><span class="value" th:text="${memberVO.id}"></span></div>
            <div class="profile-row"><span>이름</span><span class="value" th:text="${memberVO.mname}"></span></div>
            <div class="profile-row"><span>닉네임</span><span class="value" th:text="${memberVO.nickname}"></span></div>
            <div class="profile-row"><span>전화번호</span><span class="value" th:text="${memberVO.tel}"></span></div>
            <div class="profile-row"><span>가입일</span><span class="value" th:text="${memberVO.mdate.substring(0, 10)}"></span></div>

            <!-- 🔥 업로드 -->
            <div class="file-row">
              <label for="files1MF" class="file-label">사진 선택</label>
              <input type="file" name="files1MF" id="files1MF" onchange="previewImage(this)">
              <div id="fileName" class="file-name">선택된 파일 없음</div>
            </div>

          </div>

        </div>

        <!-- 버튼 -->
        <div class="action-buttons">
          <button type="submit">변경</button>
          <button type="button" onclick="history.back()">취소</button>
        </div>

      </form>

    </div>
  </div>

</div>
</body>
</html>
