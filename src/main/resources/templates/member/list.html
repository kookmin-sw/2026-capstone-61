<html layout:decorate="~{layout}">
<head>
<style>
  body {
    font-family: 'Pretendard', 'Arial', sans-serif;
    background: linear-gradient(135deg, #fcefee, #f8f9fa);
  }

  .wrapper {
    display: flex;
    justify-content: center;
    margin: 70px auto 100px auto;
  }

  .card-box {
    width: 95%;
    max-width: 800px;
    background: #fff;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 12px 25px rgba(0,0,0,0.1);
  }

  /* 상단 */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .title {
    font-size: 22px;
    font-weight: 700;
    color: #ff6b81;
  }

.select-box {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  color: white;
  border: none;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  cursor: pointer;
  transition: 0.2s;

  /* 기본 select 스타일 제거 */
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;

  /* 화살표 커스텀 */
  padding-right: 30px;
  background-position: right 8px center;
  background-size: 16px;
}
.select-box:hover {
  transform: scale(1.05);
  
      padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    color: white;
    border: none;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    cursor: pointer;
    transition: 0.2s;
}
  /* 회원 카드 */
  .member-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 12px;
    background: #fff;
    box-shadow: 0 6px 12px rgba(0,0,0,0.05);
    transition: 0.2s;
  }

  .member-item:hover {
    transform: translateY(-3px);
  }

  /* 왼쪽 영역 */
  .member-left {
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .icon {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  }

  .member-info {
    display: flex;
    flex-direction: column;
  }

  .member-id {
    font-size: 14px;
    font-weight: 600;
  }

  .member-name {
    font-size: 13px;
    color: #888;
  }

  /* 등급 */
  .grade {
    font-size: 13px;
    font-weight: 500;
    color: #ff6b81;
  }

  /* 버튼 */
  .manage-btn {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    color: white;
    border: none;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    cursor: pointer;
    transition: 0.2s;
  }

  .manage-btn:hover {
    transform: scale(1.05);
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
  }

  .empty {
    text-align: center;
    padding: 20px;
    color: #aaa;
  }

</style>
</head>

<div layout:fragment="content">

<script>
window.onload = () => {
  let buttons = document.querySelectorAll('.manage-btn');

  buttons.forEach(function(button) {
    button.addEventListener('click', function() {
      let memberno = this.dataset.memberno;
      window.location.href = "/member/admin_read_form?memberno=" + memberno;
    });
  });
}

function grades() {
  var select = document.getElementById("select_bar");
  var value = select.value;
  if(value){
    window.location.href = "/member/list?word=" + value;
  }
}
</script>

<div class="wrapper">
  <div class="card-box">

    <!-- 상단 -->
    <div class="top-bar">
                                <!-- admin 전체 회원 목록 -->

      <div class="select-box" th:if="${session.grade == 'admin'}">
          <a class="select-box" href="/member/list">회원 관리</a>
      </div>

      <select id="select_bar" class="select-box" onchange="grades()">
        <option style="font-size: 14px; color:#ff758c" value="grade__0">관리자</option>
        <option style="font-size: 14px; color:#ff758c" value="grade__1">일반 회원</option>
        <option style="font-size: 14px; color:rgb(0, 0, 0)" value="grade__2">블랙 회원</option>
        <option style="font-size: 14px; color:rgb(0, 255, 255)" value="grade__3">탈퇴 회원</option>
      </select>
    </div>

    <!-- 리스트 -->
    <div th:each="memberVO : ${list}">

      <div class="member-item">

        <!-- 왼쪽 -->
        <div class="member-left">

          <!-- 아이콘 -->
          <div>
            <img th:if="${memberVO.grade == 0}" src="/member/images/admin1.png" class="icon">
            <img th:if="${memberVO.grade == 1}" src="/member/images/profile.gif" class="icon">
            <img th:if="${memberVO.grade == 2}" src="/member/images/pause.png" class="icon">
            <img th:if="${memberVO.grade == 3}" src="/member/images/x.png" class="icon">
          </div>

          <!-- 정보 -->
          <div class="member-info">
            <span class="member-id" th:text="${memberVO.id}"></span>
            <span class="member-name" th:text="${memberVO.mname}"></span>
          </div>

        </div>

        <!-- 등급 -->
        <div class="grade" th:switch="${memberVO.grade}">
          <span style="font-size: 16px;" th:case="0">관리자 👑</span>
          <span style="font-size: 16px;" th:case="1">일반회원 😊</span>
          <span style="font-size: 16px;" th:case="2">블랙리스트 🚫</span>
          <span style="font-size: 16px;" th:case="3">탈퇴회원 ❌</span>
        </div>

        <!-- 버튼 -->
        <button class="manage-btn" 
                th:attr="data-memberno=${memberVO.memberno}">
          관리
        </button>

      </div>

    </div>

    <!-- 비어있을 때 -->
    <div th:if="${list.size() == 0}" class="empty">
      회원 목록이 없습니다.
    </div>

    <!-- 페이징 -->
    <div class="bottom_menu" th:utext="${paging}"></div>

  </div>
</div>

</div>
</html>
