<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">
<head>
<meta charset="UTF-8">
<title>회원 정보</title>
<style>
  body {
    font-family: 'Pretendard', 'Arial', sans-serif;
    background: linear-gradient(135deg, #fcefee, #f8f9fa);
  }

  .wrapper {
    display: flex;
    justify-content: center;
    margin-top: 60px;
    margin-bottom: 60px; /* 하단 여백 추가 */
  }

  .card-box {
    width: 90%;
    max-width: 650px;
    background: #fff;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 12px 25px rgba(0,0,0,0.1);
  }

  /* 제목 */
  .title {
    text-align: center;
    font-size: 24px;
    font-weight: 700;
    color: #ff6b81;
    margin-bottom: 20px;
  }

  /* 프로필 */
  .profile-img, .default-img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    display: block;
    margin: 0 auto 20px;
  }

  /* 상단 버튼 */
  .top-actions {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  /* 버튼 공통 */
  .btn-pink {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    color: white;
    border: none;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    cursor: pointer;
    text-decoration: none;
    transition: 0.2s;
  }

  .btn-pink:hover {
    transform: scale(1.05);
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
  }

  /* 통계 영역 (누락된 스타일 추가) */
  .stats-container {
    display: flex;
    justify-content: space-between;
    background: #fff0f3;
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 20px;
  }

  .stat-box {
    flex: 1;
    text-align: center;
    border-right: 1px solid #ffccd5;
  }
  
  .stat-box:last-child {
    border-right: none;
  }

  .stat-value {
    font-size: 18px;
    font-weight: 700;
    color: #ff6b81;
  }

  .stat-label {
    font-size: 12px;
    color: #888;
    margin-top: 5px;
  }

  /* 정보 */
  .row-line {
    display: flex;
    justify-content: space-between;
    padding: 10px 5px;
    border-bottom: 1px solid #eee;
    font-size: 15px;
  }

  .label {
    color: #888;
    font-size: 16px;
  }

  .value {
    color: #ff6b81;
    font-weight: 500;
    font-size: 15px;
  }

  /* 등급 변경 영역 */
  .grade-box {
    display: flex;
    gap: 10px;
    margin: 20px 0;
  }

  .select-box {
    flex: 1;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    color: white;
    border: none;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    appearance: none;
    text-align: center;
  }

  .select-box option {
    color: black;
  }
</style>
</head>

<body>
<div layout:fragment="content">

  <script>
  function sendFormData() {
    let grade = document.querySelector('select[name="grade"]').value;

    if (grade === "") {
      alert("등급을 선택해주세요.");
      return;
    }

    document.getElementById("roleChangeForm").submit();
  }
  </script>

  <div class="wrapper">
    <div class="card-box">

      <!-- 제목 -->
      <div class="title">회원 정보</div>

      <!-- 프로필 -->
      <div th:object="${memberVO}">
        <img th:if="${memberVO.profile.endsWith('jpg') or memberVO.profile.endsWith('png') or memberVO.profile.endsWith('gif')}"
             th:src="@{|/member/storage/${memberVO.thumbs}|}" class="profile-img">

        <img th:if="${memberVO.sizes == 0}" src="/images/none.jpg" class="default-img">
      </div>

      <!-- 상단 버튼 -->
      <div class="top-actions">
        <a th:if="${session.grade == 'admin'}" href="/member/list" class="btn-pink">회원 목록</a>
        <a th:href="@{/member/update_form(memberno=${memberVO.memberno})}" class="btn-pink">수정</a>
      </div>

      <!-- 통계 (구조 복구 및 정렬) -->
      <div class="stats-container" th:object="${memberVO}">
        <div class="stat-box">
          <div class="stat-value" th:text="${avg_dog_score != null ? avg_dog_score : '0.0'}"></div>
          <div class="stat-label">🐶 강아지 평점</div>
        </div>

        <div class="stat-box">
          <div class="stat-value" th:text="${avg_owner_score != null ? avg_owner_score : '0.0'}"></div>
          <div class="stat-label">⭐ 보호자 평점</div>
        </div>

        <div class="stat-box">
          <!-- memberVO 내부의 값인 경우 *{} 문법 작동을 위해 위 div에서 th:object 적용 -->
          <div class="stat-value" th:text="*{manner_temp}"></div>
          <div class="stat-label">🌡️ 매너온도</div>
        </div>

        <div class="stat-box">
          <div class="stat-value" th:text="*{match_cnt}"></div>
          <div class="stat-label">🤝 매칭 성공</div>
        </div>
      </div>

      <!-- 정보 -->
      <div class="row-line"><span class="label">아이디</span><span class="value" th:text="${memberVO.id}"></span></div>
      <div class="row-line"><span class="label">이름</span><span class="value" th:text="${memberVO.mname}"></span></div>
      <div class="row-line"><span class="label">닉네임</span><span class="value" th:text="${memberVO.nickname}"></span></div>
      <div class="row-line"><span class="label">전화번호</span><span class="value" th:text="${memberVO.tel}"></span></div>
      <div class="row-line"><span class="label">주소</span><span class="value" th:text="${memberVO.address1}"></span></div>
      <div class="row-line"><span class="label">상세주소</span><span class="value" th:text="${memberVO.address2}"></span></div>
      <div class="row-line"><span class="label">가입일</span><span class="value" th:text="${memberVO.mdate.substring(0,10)}"></span></div>
      <div class="row-line"><span class="label">생년월일</span><span class="value" th:text="${memberVO.birth}"></span></div>
      <div class="row-line"><span class="label">성별</span><span class="value" th:text="${memberVO.sex}"></span></div>

      <!-- 현재 등급 -->
      <div class="row-line">
        <span class="label">현재 등급</span>
        <span class="value">
          <span style="font-size: 14px; color:rgb(128, 128, 255)" th:if="${memberVO.grade == 0}">관리자 👑</span>
          <span style="font-size: 14px; color:#ff758c" th:if="${memberVO.grade == 1}">일반회원 😊</span>
          <span style="font-size: 14px; color:rgb(0, 0, 0)" th:if="${memberVO.grade == 2}">블랙리스트 🚫</span>
          <span style="font-size: 14px; color:rgb(0, 255, 255)" th:if="${memberVO.grade == 3}">탈퇴회원 ❌</span>
        </span>
      </div>

      <!-- 등급 변경 (맨 아래로 이동시켜 깔끔하게 배치) -->
      <form id="roleChangeForm" method="post" action="/member/admin_update">
        <input type="hidden" id="memberno" name="memberno" th:value="${memberVO.memberno}">

        <div class="grade-box">
          <select name="grade" class="select-box">
            <option style="font-size: 14px; color:rgb(255, 0, 0)" value="">등급 변경</option>
            <option style="font-size: 14px; color:rgb(128, 128, 255)" value="0">관리자</option>
            <option style="font-size: 14px; color:#ff758c" value="1">일반 회원</option>
            <option style="font-size: 14px; color:rgb(0, 0, 0)" value="2">블랙리스트</option>
            <option style="font-size: 14px; color:rgb(0, 255, 255)" value="3">탈퇴회원</option>
          </select>
          <button type="button" class="btn-pink" onclick="sendFormData()">변경</button>
        </div>
      </form>

    </div>
  </div>

</div>
</body>
</html>
