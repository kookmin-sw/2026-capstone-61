<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:th="http://www.thymeleaf.org">
<div layout:fragment="content">
<head>
    <meta charset="UTF-8">
    <title>Paws Market - 상품 등록</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        /* 1. 레이아웃 및 배경 */
        .market-container {
            max-width: 800px;
            margin: 80px auto 120px auto;
            background: #fff;
            padding: 40px 50px;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.05);
            border: 1px solid #f0f0f0;
        }

        h2 { text-align: center; margin-bottom: 40px; color: #ff914d; font-size: 28px; font-weight: 800; letter-spacing: -1px; }

        /* 2. 폼 섹션 및 입력창 (푸딩 스타일) */
        .form-section { margin-bottom: 25px; }
        label { display: block; font-weight: 700; margin-bottom: 10px; color: #333; font-size: 15px; }

        input[type="text"], input[type="number"], select, textarea {
            width: 100%;
            padding: 13px 18px;
            border: 2px solid #f0f0f0;
            border-radius: 15px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
            background-color: #fafafa;
        }

        input:focus, select:focus, textarea:focus { 
            border-color: #ff914d; 
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(255, 145, 77, 0.1);
        }

        .grid-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        textarea { height: 180px; resize: none; line-height: 1.6; }

        /* 3. 버튼 그룹 (크기 축소 및 입체감) */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 40px;
        }

        .btn-paws {
            padding: 12px 35px; /* 크기 축소 */
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.1s;
        }

        .btn-submit { 
            background-color: #ff914d; 
            color: #fff; 
            box-shadow: 0 4px 0 #e8803d; /* 푸딩 입체감 */
        }
        .btn-submit:active { transform: translateY(3px); box-shadow: 0 1px 0 #e8803d; }

        .btn-cancel { 
            background-color: #eee; 
            color: #777; 
            box-shadow: 0 4px 0 #ddd;
        }
        .btn-cancel:active { transform: translateY(3px); box-shadow: 0 1px 0 #ddd; }

        input[readonly] { background-color: #f1f1f1; color: #999; border-color: #eee; cursor: not-allowed; }

        /* 4. 이미지 업로드 & 미리보기 */
        .file-upload-box {
            border: 2px dashed #ddd;
            padding: 30px;
            background: #fdfdfd;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .file-upload-box:hover { border-color: #ff914d; background: #fff9f5; }

        #preview-container {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .preview-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
        }
        .preview-img {
            width: 100%; height: 100%; object-fit: cover;
            border-radius: 12px; border: 2px solid #eee;
        }
        .main-badge {
            position: absolute; top: -5px; left: -5px;
            background: #ff914d; color: white;
            font-size: 10px; padding: 2px 8px;
            border-radius: 20px; font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* 5. 모달 커스텀 */
        .modal-content { border-radius: 25px; border: none; overflow: hidden; }
        .modal-body { padding: 35px !important; }
        #alertIcon { font-size: 50px; margin-bottom: 10px; display: block; }
        #alertTitle { font-weight: 800; color: #333; margin-bottom: 8px; }
        .btn-modal-confirm {
            background: #333; color: white; border: none;
            padding: 10px 30px; border-radius: 50px;
            font-weight: bold; margin-top: 15px;
        }

        @media (max-width: 600px) {
            .market-container { padding: 30px 20px; margin: 40px 15px; }
            .btn-paws { width: 100%; }
            .btn-group { flex-direction: column-reverse; }
        }
    </style>
</head>
<body>

<div class="market-container">
    <h2>🐾 Paws 상품 등록</h2>
    
    <form name="frm" method="POST" th:action="@{/market/create.do}" enctype="multipart/form-data">
        
        <div class="form-section">
            <label>판매자 정보</label>
            <input type="text" name="sellerId" th:value="${session.id}" readonly>
        </div>

        <div class="form-section">
            <label>카테고리</label>
            <select name="className" id="className" required>
                <option value="">카테고리를 선택해 주세요</option>
                <option value="사료">건강한 사료</option>
                <option value="간식">맛있는 간식</option>
                <option value="장난감">즐거운 장난감</option>
                <option value="의류">예쁜 의류/액세서리</option>
                <option value="위생">깔끔한 배변/위생</option>
            </select>
        </div>

        <div class="form-section">
            <label>상품명</label>
            <input type="text" name="productName" id="productName" placeholder="아이들이 좋아할 상품 이름을 지어주세요!" required>
        </div>

        <div class="grid-row">
            <div class="form-section">
                <label>판매 가격 (원)</label>
                <input type="number" name="price" id="price" placeholder="0" min="0" required>
            </div>
            <div class="form-section">
                <label>배송비 (원)</label>
                <input type="number" name="deliveryFee" value="3000" min="0">
            </div>
            <div class="form-section">
                <label>재고 수량</label>
                <input type="number" name="stock" value="10" min="1" required>
            </div>
        </div>

        <div class="form-section">
            <label>상품 이미지</label>
            <div class="file-upload-box" onclick="document.getElementById('filesMF').click()">
                <i class="bi bi-camera-fill" style="font-size: 24px; color: #ff914d;"></i>
                <p class="mb-0 mt-2" style="font-size: 14px; color: #777;">클릭하여 사진을 등록하세요 (여러 장 가능)</p>
                <input type="file" id="filesMF" name="filesMF" accept="image/*" multiple onchange="previewImages(this)" style="display: none;">
            </div>
            <p style="font-size: 12px; color: #ff914d; margin-top: 8px;">* 첫 번째 사진이 대표 이미지가 됩니다.</p>
            
            <div id="preview-container"></div>
        </div>

        <div class="form-section">
            <label>상세 설명</label>
            <textarea name="productDesc" placeholder="상품의 특징이나 장점을 자세히 적어주세요."></textarea>
        </div>

        <div class="btn-group">
            <button type="button" class="btn-paws btn-cancel" th:onclick="|location.href='@{/market/list.do}'|">취소</button>
            <button type="submit" class="btn-paws btn-submit">등록</button>
        </div>
    </form>
</div>

<!-- 커스텀 알림 모달 -->
<div class="modal fade" id="alertModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width: 320px;">
        <div class="modal-content">
            <div class="modal-body text-center">
                <span id="alertIcon"></span>
                <h5 id="alertTitle">알림</h5>
                <p id="alertMessage" style="font-size: 14px; color: #666;"></p>
                <button type="button" class="btn-modal-confirm" data-bs-dismiss="modal">확인</button>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    let alertModal;

    document.addEventListener("DOMContentLoaded", function() {
        alertModal = new bootstrap.Modal(document.getElementById('alertModal'));
    });

    function showAlert(title, message, icon) {
        document.getElementById('alertTitle').innerText = title;
        document.getElementById('alertMessage').innerHTML = message;
        document.getElementById('alertIcon').innerText = icon;
        alertModal.show();
    }

    function previewImages(input) {
        const container = document.getElementById('preview-container');
        container.innerHTML = ""; 

        if (input.files) {
            Array.from(input.files).forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'preview-wrapper';
                    
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'preview-img';
                    
                    wrapper.appendChild(img);
                    
                    if(index === 0) {
                        const badge = document.createElement('span');
                        badge.className = 'main-badge';
                        badge.innerText = '대표';
                        wrapper.appendChild(badge);
                    }
                    container.appendChild(wrapper);
                }
                reader.readAsDataURL(file);
            });
        }
    }

    document.querySelector('form[name="frm"]').addEventListener('submit', function(e) {
        const sellerId = this.sellerId.value;
        const files = document.getElementById('filesMF').files;

        if (!sellerId || sellerId === 'null') {
            e.preventDefault();
            showAlert("로그인 필요", "상품 등록을 위해<br>로그인이 필요해요! 🐾", "🔒");
            return;
        }

        if (files.length === 0) {
            e.preventDefault();
            showAlert("사진 미등록", "상품 사진을 1장 이상<br>꼭 등록해주세요! 📸", "🖼️");
            return;
        }
    });
</script>

</body>
</div>
</html>
