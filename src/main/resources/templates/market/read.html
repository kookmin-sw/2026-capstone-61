<!DOCTYPE html>
<html layout:decorate="~{layout}" xmlns:th="http://www.thymeleaf.org">
<div layout:fragment="content">
<head>
    <meta charset="UTF-8">
    <title>Paws Market - 상품 상세</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        /* ---------------- 기본 컨테이너 ---------------- */
        .container { max-width: 900px; margin: 70px auto 100px auto; background: #fff; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; }
        .header-title { color: #333; font-size: 26px; font-weight: bold; text-decoration: none; }
        
        .btn-cart-head { padding: 8px 18px; background-color: #fff; color: #ff914d; border: 2px solid #ff914d; border-radius: 25px; text-decoration: none; font-weight: bold; transition: 0.3s; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .btn-cart-head:hover { background-color: #fff8f4; transform: translateY(-2px); color: #e8803d; }
        
        /* ---------------- 상품 상단 정보 ---------------- */
        .product-top { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; margin-bottom: 50px; }
        .main-image { width: 100%; border-radius: 15px; background: #f8f8f8; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #eee; }
        .main-image img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .main-image:hover img { transform: scale(1.03); }
        
        .info-area { display: flex; flex-direction: column; justify-content: center; }
        .category { color: #ff914d; font-weight: bold; margin-bottom: 10px; font-size: 14px; }
        .product-title { font-size: 30px; font-weight: 900; margin-bottom: 15px; color: #222; word-break: keep-all; }
        
        .summary-rating { margin-bottom: 25px; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; padding: 5px 10px; background: #fffcf9; border-radius: 8px; border: 1px solid #ffeada; transition: 0.2s; }
        .summary-rating:hover { background: #fff5ed; }
        .avg-stars { color: #f39c12; font-weight: bold; font-size: 1.1em; }
        
        .price-tag { font-size: 34px; font-weight: 800; color: #111; margin-bottom: 25px; display: flex; align-items: baseline; gap: 10px; }
        .price-tag span:first-child { font-size: 16px; color: #888; font-weight: normal; }
        
        .detail-row { display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid #f5f5f5; color: #555; font-size: 15px; }
        .detail-row span:last-child { font-weight: bold; color: #222; }

        /* ---------------- 수량 조절 바 ---------------- */
        .qty-control-wrapper { display: flex; align-items: center; justify-content: space-between; background: #f8f8f8; padding: 15px 20px; border-radius: 12px; margin-top: 20px; }
        .qty-btn { width: 35px; height: 35px; border: 1px solid #ddd; background: #fff; cursor: pointer; border-radius: 10px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .qty-btn:hover { background: #ff914d; color: #fff; border-color: #ff914d; }
        .qty-num { margin: 0 20px; font-weight: 800; font-size: 18px; color: #333; min-width: 25px; text-align: center; }

        /* ---------------- 구매 & 장바구니 버튼 ---------------- */
        .action-btn-group { display: flex; gap: 15px; margin-top: 15px; }
        .action-btn-group .btn-cart { flex: 1; padding: 18px 0; background: #fff; color: #ff914d; border: 2px solid #ff914d; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .action-btn-group .btn-cart:hover { background: #fff8f4; transform: translateY(-2px); }
        
        .action-btn-group form { flex: 1.5; display: flex; }
        .action-btn-group .btn-buy { width: 100%; padding: 18px 0; background: linear-gradient(135deg, #ff914d 0%, #ff7315 100%); color: #fff; border-radius: 12px; font-size: 18px; border: none; box-shadow: 0 6px 20px rgba(255, 145, 77, 0.3); font-weight: bold; cursor: pointer; transition: 0.3s; }
        .action-btn-group .btn-buy:hover { box-shadow: 0 8px 25px rgba(255, 145, 77, 0.4); transform: translateY(-2px); }

        /* ---------------- 장바구니 미리보기 영역 ---------------- */
        .cart-preview-area { background: #fff; padding: 25px; border-radius: 15px; border: 2px solid #ff914d; margin-top: 30px; box-shadow: 0 5px 15px rgba(255,145,77,0.1); }

        /* ---------------- 상세 설명 & 리뷰 공통 박스 ---------------- */
        .content-box { background: #fff; padding: 40px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.03); margin-top: 50px; border: 1px solid #f0f0f0; }
        .section-title { font-size: 20px; font-weight: 900; margin-bottom: 25px; color: #222; display: flex; align-items: center; gap: 10px; border-bottom: 2px solid #222; padding-bottom: 15px; }
        
        .product-desc-text { white-space: pre-wrap; line-height: 1.8; color: #444; font-size: 16px; padding: 20px; background: #fafafa; border-radius: 12px; border: 1px solid #eee; }
        .detail-img { width: 100%; margin-bottom: 20px; border-radius: 15px; }

        /* ---------------- 리뷰 스타일 개선 ---------------- */
        .btn-more-review { font-size: 13px; color: #777; text-decoration: none; margin-left: auto; font-weight: normal; background: #eee; padding: 5px 12px; border-radius: 20px; transition: 0.2s; }
        .btn-more-review:hover { background: #ff914d; color: #fff; }
        
        .btn-order-list { padding: 8px 15px; color: #666; text-decoration: none; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        .btn-order-list:hover { color: #ff914d; }
        .review-item { padding: 15px 20px; background: #fafafa; border-radius: 12px; margin-bottom: 15px; border: 1px solid #eee; transition: 0.3s; }
        .review-item:hover { box-shadow: 0 3px 10px rgba(0,0,0,0.05); transform: translateY(-2px); background: #fff; border-color: #ffeada; }
        .review-stars { color: #f39c12; font-weight: bold; font-size: 1em; letter-spacing: 1px; }
        .review-user-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px dashed #ddd; padding-bottom: 10px; }
        
        .review-img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; cursor: zoom-in; transition: 0.2s; }
        .review-img:hover { transform: scale(1.05); border-color: #ff914d; }
        
        .review-text-area { flex: 1; cursor: pointer; padding: 5px 10px; border-radius: 8px; transition: 0.2s; }
        .review-text-area:hover { background: #fff9f5; }
        .review-text { white-space: pre-wrap; color: #444; margin: 0; line-height: 1.5; font-size: 14px; }

        /* ---------------- 이미지 크게 보기 모달 ---------------- */
        .img-modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .img-modal-content { max-width: 85%; max-height: 85vh; border-radius: 10px; box-shadow: 0 5px 25px rgba(0,0,0,0.5); animation: zoomIn 0.3s ease-out; }
        .modal-close { position: absolute; top: 25px; right: 40px; color: #fff; font-size: 45px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .modal-close:hover { color: #ff914d; transform: scale(1.1); }
        @keyframes zoomIn { from {transform: scale(0.8); opacity: 0;} to {transform: scale(1); opacity: 1;} }

        /* ---------------- 하단 관리자/목록 버튼 ---------------- */
        .bottom-btn-group { display: flex; justify-content: center; gap: 15px; margin-top: 50px; }
        .bottom-btn-group .btn { padding: 12px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; text-decoration: none; transition: 0.3s; font-size: 15px; }
        .bottom-btn-group .btn-list { background: #f1f1f1; color: #555; }
        .bottom-btn-group .btn-list:hover { background: #e1e1e1; }
        .bottom-btn-group .btn-edit { border: 1px solid #ccc; color: #555; background: #fff; }
        .bottom-btn-group .btn-edit:hover { background: #f9f9f9; border-color: #999; }
        .bottom-btn-group .btn-del { border: 1px solid #ff4d4d; color: #ff4d4d; background: #fff; }
        .bottom-btn-group .btn-del:hover { background: #ff4d4d; color: #fff; }

        /* 커스텀 Alert & Confirm 모달 스타일 */
        .custom-modal-content { border-radius: 25px; border: none; box-shadow: 0 15px 35px rgba(0,0,0,0.2); overflow: hidden; }
        .custom-modal-body { padding: 40px 30px !important; text-align: center; }
        .custom-modal-icon { font-size: 60px; margin-bottom: 15px; display: inline-block; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .custom-modal-title { color: #333; font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        .custom-modal-message { font-size: 15px; line-height: 1.6; color: #666; margin-bottom: 0; }
        .modal-btn-wrapper { display: flex; gap: 10px; margin-top: 25px; }
        .btn-modal-confirm { background: #ff914d; color: white; border: none; padding: 14px; border-radius: 15px; font-weight: bold; width: 100%; font-size: 16px; transition: all 0.3s ease; cursor: pointer; }
        .btn-modal-confirm:hover { background: #e8803d; transform: translateY(-2px); }
        .btn-modal-cancel { background: #f1f1f1; color: #555; border: none; padding: 14px; border-radius: 15px; font-weight: bold; width: 100%; font-size: 16px; transition: all 0.3s ease; cursor: pointer; }
        .btn-modal-cancel:hover { background: #e1e1e1; transform: translateY(-2px); }

        @media (max-width: 768px) {
            .container { margin: 50px auto; padding: 20px; border-radius: 0; }
            .product-top { grid-template-columns: 1fr; gap: 20px; }
            .product-title { font-size: 24px; }
            .price-tag { font-size: 26px; }
            .qty-control-wrapper { padding: 10px 15px; }

            .action-btn-group { display: flex; flex-direction: row; gap: 8px; margin-top: 20px; }
            .action-btn-group .btn-cart { flex: 1; padding: 12px 0; font-size: 14px; }
            .action-btn-group form { flex: 1; }
            .action-btn-group .btn-buy { padding: 12px 0; font-size: 15px; }

            .bottom-btn-group { gap: 8px; }
            .bottom-btn-group .btn { flex: 1; padding: 10px 0; font-size: 13px; text-align: center; }
            .img-modal-content { max-width: 95%; }
            
            /* 📱 모바일 환경 모달 정중앙 정렬 보완 */
            .modal-dialog-centered {
                display: flex !important;
                align-items: center !important;
                justify-content: center !important;
                margin: 0 auto !important;
                width: 90% !important;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <a th:href="@{/market/list.do}" class="header-title">🐾 Paws 마켓</a>
        <div class="header-btns">
            <a href="javascript:void(0);" onclick="checkLoginCart()" class="btn-cart-head">
                <i class="bi bi-cart3"></i> <span>장바구니</span>
            </a>
        </div>
    </div>

    <div class="product-top">
        <div class="main-image">
            <th:block th:if="${marketVO.thumbnailName != null and marketVO.thumbnailName != ''}">
                <img th:src="@{|/product/storage/${marketVO.thumbnailName}|}" alt="대표 이미지">
            </th:block>
            <th:block th:unless="${marketVO.thumbnailName != null and marketVO.thumbnailName != ''}">
                <img src="/images/no_image.png" style="width:50%; opacity:0.3;">
            </th:block>
        </div>
        
        <div class="info-area">
            <div class="category" th:text="${marketVO.className}">분류</div>
            <h1 class="product-title" th:text="${marketVO.productName}">상품명</h1>
            
            <div class="summary-rating" onclick="document.querySelector('#review-section').scrollIntoView({behavior:'smooth'})">
                <span id="avg-stars-top" class="avg-stars">☆☆☆☆☆</span>
                <span id="avg-score-top" style="font-weight: bold; color:#222;">0.0</span>
                <span style="color: #888; font-size: 0.9em;">(<span id="review-count-top">0</span>건의 리뷰)</span>
            </div>

            <div class="price-tag">
                <span>판매가</span>
                <span th:text="${#numbers.formatInteger(marketVO.price, 0, 'COMMA')}">0</span>원
            </div>
            
            <div class="detail-row">
                <span>배송비</span>
                <span th:text="${marketVO.deliveryFee == 0 ? '무료배송' : #numbers.formatInteger(marketVO.deliveryFee, 0, 'COMMA') + '원'}"></span>
            </div>
            <div class="detail-row">
                <span>재고현황</span>
                <span th:text="${marketVO.stock > 0 ? marketVO.stock + '개 남음' : '품절'}" th:style="${marketVO.stock == 0 ? 'color:#ff4d4d' : 'color:#2e7d32'}"></span>
            </div>

            <!-- 수량 조절 인터페이스 -->
            <div class="qty-control-wrapper">
                <span style="font-weight: bold; color: #555;">주문 수량</span>
                <div style="display: flex; align-items: center;">
                    <button type="button" class="qty-btn" onclick="changeQty(-1)"><i class="bi bi-dash"></i></button>
                    <span id="display-qty" class="qty-num">1</span>
                    <button type="button" class="qty-btn" onclick="changeQty(1)"><i class="bi bi-plus"></i></button>
                </div>
            </div>

            <div class="action-btn-group">
                <button type="button" onclick="add_to_cart()" class="btn-cart">
                    <i class="bi bi-cart-plus"></i> 장바구니
                </button>
                <form th:action="@{/market_order/create.do}" method="get" onsubmit="return check_login_for_buy()">
                    <input type="hidden" name="product_id" th:value="${marketVO.productId}" />
                    <input type="hidden" name="quantity" id="form-quantity" value="1" />
                    <button type="submit" class="btn-buy">바로 구매하기</button>
                </form>
            </div>
        </div>
    </div>

    <!-- 실시간 장바구니 리스트 미리보기 -->
    <div id="cart-preview-area" class="cart-preview-area" style="display: none;">
        <div style="font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #ff914d;">
            <i class="bi bi-check2-circle"></i> 장바구니에 담긴 내역
        </div>
        <table style="width:100%; border-collapse: collapse;">
            <tbody id="cart-list-body"></tbody>
        </table>
        <div style="text-align: right; margin-top: 15px; font-weight: 900; font-size: 20px; padding-top:15px; border-top:1px dashed #ddd;">
            총 결제 금액: <span id="cart-total-price" style="color: #ff914d;">0</span>원
        </div>
    </div>

    <!-- 상품 상세 설명 섹션 -->
    <div class="content-box">
        <h3 class="section-title"><i class="bi bi-card-text"></i> PRODUCT STORY</h3>
        <div class="story-section text-center">
            <div th:each="file : ${fileList}">
                <img th:src="@{|/product/storage/${file.file_name}|}" class="detail-img shadow-sm">
            </div>
        </div>
        <div style="margin-top: 40px;" th:if="${marketVO.productDesc != null and marketVO.productDesc != ''}">
            <h4 style="font-size: 16px; font-weight:bold; margin-bottom:15px; color:#555;">상세 설명</h4>
            <div class="product-desc-text" th:text="${marketVO.productDesc}"></div>
        </div>
    </div>

    <!-- 리뷰 섹션 -->
    <div id="review-section" class="content-box">
        <div class="section-title">
            <div><i class="bi bi-chat-square-text"></i> 실제 구매 후기 <span id="review-count" style="color: #ff914d; font-size: 18px;">0</span></div>
            <a th:href="@{|/market_review/list_by_product_all.do?product_id=${marketVO.productId}|}" class="btn-more-review">전체보기 <i class="bi bi-chevron-right" style="font-size:12px;"></i></a>
        </div>
        <div id="reviewList">
            <div style="text-align: center; padding: 40px; color: #999;">
                <div class="spinner-border text-warning" role="status"></div>
                <div class="mt-2">리뷰를 불러오는 중입니다...</div>
            </div>
        </div>
    </div>

    <!-- 하단 관리 버튼 -->
    <div class="bottom-btn-group">
        <a th:href="@{/market/list.do}" class="btn btn-list">목록</a>
        <th:block th:if="${session.grade == 'admin' or session.id == marketVO.sellerId}">
            <a th:href="@{/market/update.do(productId=${marketVO.productId})}" class="btn btn-edit">수정</a>
            <a href="javascript:delete_product();" class="btn btn-del">삭제</a>
        </th:block>
    </div>
</div>

<!-- 알림용 모달 -->
<div class="modal fade" id="alertModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width: 350px;">
        <div class="modal-content custom-modal-content">
            <div class="custom-modal-body">
                <div id="alertIcon" class="custom-modal-icon"></div>
                <h5 id="alertTitle" class="custom-modal-title"></h5>
                <p id="alertMessage" class="custom-modal-message"></p>
                <div class="modal-btn-wrapper">
                    <!-- 기존 data-bs-dismiss="modal" 속성을 지우고 자바스크립트에서 닫거나 로그인 창으로 보냅니다 -->
                    <button type="button" class="btn-modal-confirm" id="btnAlertConfirm">확인했어요</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 확인 모달 -->
<div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width: 350px;">
        <div class="modal-content custom-modal-content">
            <div class="custom-modal-body">
                <div id="confirmIcon" class="custom-modal-icon"></div>
                <h5 id="confirmTitle" class="custom-modal-title"></h5>
                <p id="confirmMessage" class="custom-modal-message"></p>
                <div class="modal-btn-wrapper">
                    <button type="button" class="btn-modal-cancel" data-bs-dismiss="modal">취소</button>
                    <button type="button" class="btn-modal-confirm" id="btnConfirmAction">확인</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 이미지 확대 모달 -->
<div id="imageModal" class="img-modal" onclick="closeModal()">
    <span class="modal-close">&times;</span>
    <img class="img-modal-content" id="expandedImg" src="">
</div>

<script th:inline="javascript">
/*<![CDATA[*/
let cartData = [];
const productId = /*[[${marketVO.productId}]]*/ 0;
const productName = /*[[${marketVO.productName}]]*/ "상품명";
const price = /*[[${marketVO.price}]]*/ 0;
const maxStock = /*[[${marketVO.stock}]]*/ 0;
const memberId = /*[[${session.id}]]*/ null;

let currentQty = 1;
let alertModal, confirmModal, alertRedirectUrl, confirmActionCallback;

document.addEventListener('DOMContentLoaded', function() {
    if (productId > 0) loadReviews(productId);
    alertModal = new bootstrap.Modal(document.getElementById('alertModal'));
    confirmModal = new bootstrap.Modal(document.getElementById('confirmModal'));

    // 알림 모달 전용 확인 버튼 클릭 이벤트 핸들러
    document.getElementById('btnAlertConfirm').addEventListener('click', function() {
        alertModal.hide();
        if (alertRedirectUrl) { 
            location.href = alertRedirectUrl; 
            alertRedirectUrl = null; 
        }
    });

    document.getElementById('btnConfirmAction').addEventListener('click', function() {
        confirmModal.hide();
        if (confirmActionCallback) confirmActionCallback();
    });
});

function changeQty(amount) {
    const nextQty = currentQty + amount;
    if (nextQty < 1) {
        showAlert("수량 확인", "최소 1개 이상 구매해야 합니다.", "⚠️");
        return;
    }
    if (nextQty > maxStock) {
        showAlert("재고 부족", `현재 남은 재고는 ${maxStock}개입니다.`, "📦");
        return;
    }
    currentQty = nextQty;
    document.getElementById('display-qty').innerText = currentQty;
    document.getElementById('form-quantity').value = currentQty;
}

function showAlert(title, message, icon, redirectUrl = null) {
    document.getElementById('alertTitle').innerText = title;
    document.getElementById('alertMessage').innerHTML = message;
    document.getElementById('alertIcon').innerText = icon || '💡';
    alertRedirectUrl = redirectUrl; // 이동할 URL 바인딩
    alertModal.show();
}

function showConfirm(title, message, icon, callback) {
    document.getElementById('confirmTitle').innerText = title;
    document.getElementById('confirmMessage').innerHTML = message;
    document.getElementById('confirmIcon').innerText = icon || '❓';
    confirmActionCallback = callback;
    confirmModal.show();
}

function loadReviews(p_id) {
    fetch('/market_review/list_by_product.do?product_id=' + p_id)
    .then(res => res.json())
    .then(list => {
        const listBody = document.getElementById('reviewList');
        const total = list.length;
        document.getElementById('review-count-top').innerText = total;
        document.getElementById('review-count').innerText = total;
        
        if (total > 0) {
            let sum = 0;
            list.forEach(vo => sum += vo.rating);
            const avg = (sum / total).toFixed(1);
            document.getElementById('avg-score-top').innerText = avg;
            document.getElementById('avg-stars-top').innerText = '★'.repeat(Math.round(avg)) + '☆'.repeat(5 - Math.round(avg));

            let html = '';
            list.slice(0, 5).forEach(vo => {
                const s = '★'.repeat(vo.rating) + '☆'.repeat(5 - vo.rating);
                html += `
                <div class="review-item">
                    <div class="review-user-info">
                        <div>
                            <span class="review-stars">${s}</span> 
                            <span style="font-weight:bold; margin-left:8px; color:#222; font-size:13px;">${vo.id}</span>
                        </div>
                        <span style="color:#999; font-size:12px;">${vo.reg_date.substring(0, 10)}</span>
                    </div>
                    <div style="display: flex; gap: 15px; align-items: flex-start;">
                        ${vo.review_img ? `<img src="/market_review/storage/${vo.review_img}" class="review-img" onclick="openModal(this.src)">` : ''}
                        <div class="review-text-area" onclick="location.href='/market_review/read.do?review_id=${vo.review_id}'">
                            <p class="review-text">${vo.review_content}</p>
                            <div style="margin-top: 8px; font-size: 12px; color: #ff914d; font-weight: bold;">자세히 보기 <i class="bi bi-arrow-right"></i></div>
                        </div>
                    </div>
                </div>`;
            });
            listBody.innerHTML = html;
        } else {
            listBody.innerHTML = '<div style="text-align:center; padding:50px 0; color:#bbb;">아직 등록된 리뷰가 없어요. 첫 리뷰를 남겨보세요!</div>';
        }
    });
}

function checkLoginCart() {
    if (!memberId) showAlert("로그인이 필요해요", "장바구니를 확인하시려면<br>로그인이 필요합니다. 🐾", "🔑", "/member/login");
    else location.href = '/market_cart/list.do?member_id=' + memberId;
}

function check_login_for_buy() {
    if (!memberId) { showAlert("로그인이 필요해요", "로그인 후 구매가 가능합니다.", "🔑", "/member/login"); return false; }
    if (maxStock <= 0) { showAlert("앗, 품절이에요", "재고가 부족합니다.", "📦"); return false; }
    return true;
}

function add_to_cart() {
    if (!memberId) { showAlert("로그인이 필요해요", "장바구니에 담으시려면 로그인이 필요합니다.", "🔑", "/member/login"); return; }
    
    fetch('/market_cart/create.do', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ product_id: productId, quantity: currentQty, member_id: memberId })
    })
    .then(res => res.json())
    .then(data => {
        if(data.res === "success") {
            showAlert("장바구니 성공", "상품이 장바구니에 담겼습니다. 🐾", "🛒");
            let found = cartData.find(i => i.id === productId);
            if(found) { 
                if(found.qty + currentQty > maxStock) { found.qty = maxStock; }
                else { found.qty += currentQty; }
            } else { cartData.push({ id: productId, name: productName, price: price, qty: currentQty, max: maxStock }); }
            updateCartUI();
        }
    });
}

function updateCartUI() {
    const area = document.getElementById('cart-preview-area');
    const body = document.getElementById('cart-list-body');
    if(cartData.length === 0) { area.style.display = 'none'; return; }
    area.style.display = 'block';
    body.innerHTML = ''; 
    let total = 0;
    cartData.forEach(item => {
        let sum = item.price * item.qty;
        total += sum;
        body.innerHTML += `<tr style="border-bottom:1px solid #eee;">
            <td style="padding:15px 0;">${item.name} (x${item.qty})</td>
            <td style="text-align:right; font-weight:bold; color:#ff914d;">${sum.toLocaleString()}원</td>
        </tr>`;
    });
    document.getElementById('cart-total-price').innerText = total.toLocaleString();
}

function delete_product() {
    showConfirm("상품 삭제", "정말 삭제하시겠습니까?", "⚠️", function() {
        let f = document.createElement('form'); f.method = 'post'; f.action = '/market/delete.do';
        let i = document.createElement('input'); i.type = 'hidden'; i.name = 'productId'; i.value = productId;
        f.appendChild(i); document.body.appendChild(f); f.submit();
    });
}

function openModal(src) {
    const modal = document.getElementById('imageModal');
    document.getElementById('expandedImg').src = src;
    modal.style.display = "flex";
    document.body.style.overflow = "hidden";
}

function closeModal() {
    document.getElementById('imageModal').style.display = "none";
    document.body.style.overflow = "auto";
}
