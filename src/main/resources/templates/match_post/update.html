<!DOCTYPE html>
<html layout:decorate="~{layout}"
      xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Paws - 산책 매칭 수정</title>

  <!-- 부트스트랩 아이콘 -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <style>
    :root {
      --paws-pink: #ff6b81;
      --paws-light: #fff0f3;
      --paws-gray: #f8f9fa;
      --paws-border: #e9ecef;
    }

    body {
      background: linear-gradient(180deg, #fff9fb 0%, #ffffff 100%);
    }

    /* =========================
        전체 컨테이너
    ========================= */
    .update-container {
      max-width: 800px; /* 조금 더 슬림하게 조절 */
      margin: 40px auto;
      padding: 35px;
      border-radius: 24px;
      background: #fff;
      box-shadow: 0 15px 35px rgba(0,0,0,0.05);
      border: 1px solid #f1f3f5;
    }

    .form-header {
      text-align: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid #f8f9fa;
    }

    .form-title { font-size: 28px; font-weight: 800; color: #212529; }

    /* =========================
        레이아웃 그리드 (PC 버전 한 줄 2개)
    ========================= */
    .info-grid-pc {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .input-section { margin-bottom: 20px; }
    .full-width { grid-column: span 2; } /* 제목, 장소, 내용은 전체 너비 */

    .section-card {
      background: #f8f9fa;
      border-radius: 18px;
      padding: 20px;
      border: 1px solid transparent;
      height: 100%;
    }

    .input-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 700;
      color: var(--paws-pink);
      margin-bottom: 10px;
    }

    .form-control-custom {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #dee2e6;
      padding: 12px 14px;
      font-size: 14px;
      transition: 0.2s;
    }

    .form-control-custom:focus {
      outline: none;
      border-color: var(--paws-pink);
      box-shadow: 0 0 0 3px rgba(255,107,129,0.1);
    }

    textarea.form-control-custom { min-height: 150px; }

    /* =========================
        장소 및 이미지
    ========================= */
    .location-box {
      background: #fff8fa;
      border-radius: 18px;
      padding: 20px;
      border: 1px solid #ffe0e6;
    }

    .preview-img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    /* =========================
        버튼 (크기 축소 및 최적화)
    ========================= */
    .btn-group-custom {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 35px;
      padding-top: 25px;
      border-top: 1px solid #f1f3f5;
    }

    .btn-custom {
      border: none;
      border-radius: 12px;
      padding: 12px 25px; /* 패딩 축소 */
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      min-width: 120px; /* 최소 너비 제한 */
    }

    .btn-cancel { background: #f1f3f5; color: #495057; }
    .btn-submit {
      background: var(--paws-pink);
      color: white;
      box-shadow: 0 4px 12px rgba(255,107,129,0.2);
    }

    .btn-custom:hover { transform: translateY(-1px); opacity: 0.9; }

    /* =========================
        모바일 최적화
    ========================= */
    @media (max-width: 576px) {
      .update-container { margin: 15px; padding: 20px; }
      .info-grid-pc { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .full-width { grid-column: span 2; }
      
      .btn-group-custom { flex-direction: row; }
      .btn-custom { flex: 1; padding: 10px 0; min-width: 0; }
      .form-title { font-size: 22px; }
    }
  </style>
</head>

<body>

<div layout:fragment="content">
  <div class="update-container">
    <div class="form-header">
      <h2 class="form-title">🐾 산책 매칭 수정</h2>
    </div>

    <form id="updateForm">
      <input type="hidden" name="matchno" th:value="${matchPostVO.matchno}">
      <input type="hidden" name="cat_no" th:value="${matchPostVO.cat_no}">

      <div class="info-grid-pc">
        <!-- 제목 (Full) -->
        <div class="input-section full-width">
          <label class="input-label"><i class="bi bi-pencil-square"></i> 제목</label>
          <input type="text" name="title" class="form-control-custom" th:value="${matchPostVO.title}">
        </div>

        <!-- 일시 (1/2) -->
        <div class="input-section">
          <label class="input-label"><i class="bi bi-clock-fill"></i> 산책 일시</label>
          <input type="datetime-local" name="mdate" class="form-control-custom"
                 th:value="${matchPostVO.mdate.substring(0,16).replace(' ', 'T')}">
        </div>

        <!-- 마감 (1/2) -->
        <div class="input-section">
          <label class="input-label"><i class="bi bi-hourglass-split"></i> 모집 마감</label>
          <input type="datetime-local" name="close_date" class="form-control-custom"
                 th:value="${matchPostVO.close_date != null ? matchPostVO.close_date.substring(0,16).replace(' ', 'T') : ''}">
        </div>

        <!-- DMTI (1/2) -->
        <div class="input-section">
          <div class="section-card">
            <label class="input-label"><i class="bi bi-heart-fill"></i> 내 강아지 성향</label>
            <input type="text" name="dmti" class="form-control-custom" style="background:#eee" th:value="${matchPostVO.dmti}" readonly>
          </div>
        </div>

        <!-- 모집 인원 (1/2) -->
        <div class="input-section">
          <div class="section-card">
            <label class="input-label"><i class="bi bi-people-fill"></i> 모집 인원</label>
            <input type="number" name="max_member" class="form-control-custom" min="2" th:value="${matchPostVO.max_member}">
          </div>
        </div>

        <!-- 장소 (Full) -->
        <div class="input-section full-width">
          <div class="location-box">
            <label class="input-label"><i class="bi bi-geo-alt-fill"></i> 만날 장소</label>
            <input type="text" name="mplace" class="form-control-custom mb-2" th:value="${matchPostVO.mplace}">
            <input type="text" name="mplace_detail" class="form-control-custom" th:value="${matchPostVO.mplace_detail}">
          </div>
        </div>

        <!-- 상태 (Full) -->
        <div class="input-section full-width">
          <label class="input-label"><i class="bi bi-check-circle-fill"></i> 모집 상태</label>
          <select name="status" class="form-control-custom">
            <option value="1" th:selected="${matchPostVO.status == 1}">모집중</option>
            <option value="2" th:selected="${matchPostVO.status == 2}">모집마감</option>
            <option value="3" th:selected="${matchPostVO.status == 3}">산책중</option>
            <option value="4" th:selected="${matchPostVO.status == 4}">산책완료</option>
          </select>
        </div>

        <!-- 이미지 (Full) -->
        <div class="input-section full-width">
          <label class="input-label"><i class="bi bi-image-fill"></i> 기존 이미지</label>
          <div class="preview-container d-flex gap-2" th:if="${matchPostVO.dog_img != null and matchPostVO.dog_img != ''}">
            <img class="preview-img" th:each="img : ${#strings.arraySplit(matchPostVO.dog_img, ',')}" 
                 th:src="@{|/match_post/storage/${img}|}">
          </div>
        </div>

        <!-- 상세 설명 (Full) -->
        <div class="input-section full-width">
          <label class="input-label"><i class="bi bi-chat-left-text-fill"></i> 상세 설명</label>
          <textarea name="content" class="form-control-custom" th:text="${matchPostVO.content}"></textarea>
        </div>
      </div>

      <!-- 버튼 영역 -->
      <div class="btn-group-custom">
        <button type="button" class="btn-custom btn-cancel"
                th:onclick="|location.href='/match_post/read?matchno=${matchPostVO.matchno}'|">취소</button>
        <button type="button" class="btn-custom btn-submit" onclick="submitUpdate()">수정 완료 ✨</button>
      </div>
    </form>
  </div>

  <!-- 알림 모달 생략 (기존 코드와 동일) -->

  <script th:inline="javascript">
    // JS 코드는 기존과 동일하므로 생략하거나 기존 코드를 그대로 사용하시면 됩니다.
    function submitUpdate() {
      const form = document.getElementById('updateForm');
      const formData = new FormData(form);
      fetch('/match_post/update_proc', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams(formData).toString()
      })
      .then(response => response.json())
      .then(data => {
        if (data.res === 'success') {
          location.href = `/match_post/read?matchno=[[${matchPostVO.matchno}]]`;
        }
      });
    }
  </script>
</div>

</body>
</html>
