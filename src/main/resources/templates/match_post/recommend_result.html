<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AI 산책 친구 추천</title>
    <!-- 부트스트랩 사용 예시 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .ai-card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .ai-header { background-color: #ffefef; border-radius: 15px 15px 0 0; padding: 20px; }
        .ai-response { background-color: #f9f9f9; padding: 20px; border-radius: 10px; white-space: pre-wrap; line-height: 1.6; }
    </style>
</head>
<body>
    

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-9">
                <div class="card ai-card">
                    <div class="ai-header text-center">
                        <h2 class="text-danger">🐾 AI 찰떡 산책 친구 추천</h2>
                        <p class="text-muted mb-0">우리 <strong><span th:text="${myDog.name}">강아지</span></strong>에게 꼭 맞는 친구를 찾았어요!</p>
                    </div>
                    <div class="card-body p-4">
                        <div class="ai-response shadow-sm">
                            <!-- AI 답변 출력 -->
                            <div th:utext="${aiAnswer.replaceAll('\n', '<br/>')}"></div>
                        </div>

                        <div class="text-center mt-4">
                            <a href="/match_post/list_all" class="btn btn-outline-secondary me-2">목록으로</a>
                            <button onclick="location.reload()" class="btn btn-danger">한 번 더 추천받기</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
